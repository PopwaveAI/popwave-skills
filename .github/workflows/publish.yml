name: Publish Skill Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-hub-publish
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: popwave-skills-dist
          path: dist

      # Runtime users in China should read from a domestic CDN, not GitHub Pages.
      # Configure these repository secrets for any S3-compatible object store
      # such as Aliyun OSS, Tencent COS, Volcengine TOS, Qiniu, or Upyun.
      #
      # Required placeholders:
      # - SKILL_HUB_S3_PROVIDER: Alibaba | TencentCOS | AWS | Minio | ...
      # - SKILL_HUB_S3_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
      # - SKILL_HUB_S3_REGION: cn-hangzhou
      # - SKILL_HUB_S3_BUCKET: popwave-skills
      # - SKILL_HUB_ACCESS_KEY_ID: <access-key-id>
      # - SKILL_HUB_SECRET_ACCESS_KEY: <secret-access-key>
      #
      # Optional:
      # - SKILL_HUB_CDN_REFRESH_WEBHOOK: https://example.com/refresh-cdn
      - name: Install rclone
        if: ${{ secrets.SKILL_HUB_S3_BUCKET != '' }}
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Sync dist to domestic object storage
        if: ${{ secrets.SKILL_HUB_S3_BUCKET != '' }}
        env:
          RCLONE_CONFIG_SKILLHUB_TYPE: s3
          RCLONE_CONFIG_SKILLHUB_PROVIDER: ${{ secrets.SKILL_HUB_S3_PROVIDER }}
          RCLONE_CONFIG_SKILLHUB_ACCESS_KEY_ID: ${{ secrets.SKILL_HUB_ACCESS_KEY_ID }}
          RCLONE_CONFIG_SKILLHUB_SECRET_ACCESS_KEY: ${{ secrets.SKILL_HUB_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_SKILLHUB_ENDPOINT: ${{ secrets.SKILL_HUB_S3_ENDPOINT }}
          RCLONE_CONFIG_SKILLHUB_REGION: ${{ secrets.SKILL_HUB_S3_REGION }}
          SKILL_HUB_S3_BUCKET: ${{ secrets.SKILL_HUB_S3_BUCKET }}
        run: |
          rclone sync dist "skillhub:${SKILL_HUB_S3_BUCKET}" --s3-acl public-read --checksum --fast-list

      - name: Refresh CDN
        if: ${{ secrets.SKILL_HUB_CDN_REFRESH_WEBHOOK != '' }}
        run: |
          curl -fsS -X POST "${{ secrets.SKILL_HUB_CDN_REFRESH_WEBHOOK }}"
