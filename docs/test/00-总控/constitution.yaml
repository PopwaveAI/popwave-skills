# constitution.yaml

> 从PRD提取的不可违背的创作原则

---

## 核心情绪基调

**热血**。不是悲愤的热血——是「我带着帝国走在正确的路上，每一步都有力量感」那种热血。

任何时候写出一段让读者感到"憋屈"的内容 → 检查是否符合核心基调。如果是"先抑后扬"的扬不够，那就是抑多了。

---

## 禁止清单

- ❌ 主角不可长时间保持弱势状态（超过5章连续被动就是虐文）
- ❌ 不可杀死重要友军角色制造情绪（那是严肃文学的手法，不是爽文）
- ❌ 不可使用复杂的D&D/cosmic设定术语不做解释——读者看不懂
- ❌ 不可出现"主角靠运气而非靠判断力"的关键转折（一次可以，两次以上就崩了）
- ❌ 不可让功勋系统的规则自相矛盾（读者会算账）

---

## 强制约束

- ✅ 每章必须有至少1个"读者想看到下一页"的锚点（战斗/反转/新信息/钩子）
- ✅ 金手指每次展示时必须附带一个"代价"或"限制"——不能白嫖
- ✅ 秦川的决策必须能回溯到人物动机（不能"因为编剧想让他这么做"）
- ✅ 所有设定决策可回溯到PRD——如果一个设定不服务于PRD的爽点，它就是多余的
