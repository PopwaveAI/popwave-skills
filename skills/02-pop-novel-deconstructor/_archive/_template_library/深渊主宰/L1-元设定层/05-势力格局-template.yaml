# Template: 势力格局
# @consumed_by: pop-novel-world Phase 1
# @source_book: 深渊主宰

major_factions:
  # 前期（琥珀城）
  early:
    - name: "琥珀城警卫队"; type: "官方"; scope: "琥珀城内"; note: "基本不管贫民区，ch10剥皮事件暴露了更大的阴谋"
    - name: "码头帮派"; type: "地下"; scope: "贫民区/码头区"; note: "ch5-9与索伦的对立逐步升级"
    - name: "晨曦神殿"; type: "宗教"; scope: "琥珀城及周边"; note: "安亚丽牧师是索伦的早期盟友"
    - name: "大盗萨沙"; type: "独立势力"; scope: "贫民区"; note: "ch5登场，觊觎薇薇安，ch9被索伦杀死"
  
  # 中期（剑湾）
  mid:
    - name: "冒险者工会"; type: "中立组织"; scope: "琥珀城→剑湾"; note: "ch22索伦登记成为冒险者"
    - name: "阴影集会"; type: "地下"; scope: "剑湾"; note: "刺客和盗贼的公会"
  
  # 后期（全书）
  late:
    - name: "摩多城"; type: "主角势力"; scope: "南海岸"; note: "索伦建立的领地，最终成为统治势力"
    - name: "深水城贵族"; type: "枢纽城市"; scope: "剑湾"; note: "多势力交汇的贸易/政治中心"

power_map:
  territory: "贫民区(无主)→琥珀城(警卫队)→剑湾(多方势力)→南海岸(摩多城)"
  resource_control: "初期靠偷(ch1-5)→中期靠冒险任务(ch22起)→后期靠领地(ch100+)"

faction_relations:
  - "晨曦神殿 vs 阴影集会: 对立(光明vs暗影)"
  - "[主角]索伦 vs 码头帮派: 对立(杀戮) → 吞并"
  - "摩多城 vs 剑湾贵族: 中立偏竞争"
