# Template: 文风参考（结构侧）
# @consumed_by: pop-novel-prose-render Step 3
# 注意：句法/词汇/感官等文风DNA由pop-dna独立执行

opening_chapter_pattern:
  first_line_type: "动作句(雨声+厨房动作)"
  hook_in_first_1000_words: 600
  pitfalls_avoided: [天气描写过多, 照镜子, 睡醒开场]

dialogue_pattern:
  vivian: "幼稚+渴求(符合8岁年龄)"
  solen: "冷静简洁"
  villain: "带威胁感"

narrative_pattern:
  sentence_mix: "中长句(日常沉浸) → 短句(战斗加速)"
  panel_insert: "关键时刻弹出不打断节奏"
  sensory_focus: "视觉50%+触觉25%>听觉15%>情绪10%"
