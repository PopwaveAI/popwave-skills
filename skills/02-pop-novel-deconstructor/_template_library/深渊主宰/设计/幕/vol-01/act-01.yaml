    for_reader: "让读者知道——这个主角有先知面板、这个世界残酷真实、妹妹是他唯一软肋"
  conflict:
    stakes: "索伦能否在濒死状态中苏醒并保护薇薇安？"
    escalation: "从内部认知冲突(这是现实还是游戏？) → 外部生存冲突(必须杀人才能活)"

chapters:
