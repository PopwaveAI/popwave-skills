    登场角色: [薇薇安]
    emotional_goal: "唤起读者对这个世界的同情——不是通过英雄，而是通过底层女孩的日常"
    payoff_note: "0——纯开篇建立，无payoff"
    end_hook:
      type: "情绪"
      drive: "米袋里粮食不多了——读者想知道她们怎么活"
