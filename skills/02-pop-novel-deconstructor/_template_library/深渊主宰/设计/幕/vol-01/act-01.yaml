      设定线: "贫民区底层生活质感"
      设线负载: 1
      主线1: "（暗示）世界的残酷不是通过战斗而是通过八岁女孩煮粥呈现";  主线1_payoff: "（暗示）"
      主线2: "主角未醒——面板尚未出现";  主线2_payoff: "0"
      主线3: "贫穷——银饰换糙米，粮食见底";  主线3_payoff: "0"
      支线1: "薇薇安：八岁，踮脚煮粥，依赖哥哥";  支线1_payoff: "0"
      支线2: "";  支线2_payoff: ""
