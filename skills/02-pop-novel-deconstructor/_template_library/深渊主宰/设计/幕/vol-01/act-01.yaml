# act-01.yaml — 幕纲骨架（深渊主宰版）
# @source_book: 深渊主宰（诸生浮屠）
# @对应写作端模板: 08-pop-novel-plot/templates/act-skeleton.yaml
# ⚠️ 原文证据规则：每章 canvas 中的剧情线推进必须标注原文事件 chXX。
# payoff_summary / 设线负载 必须来自 _temp/chapter-index.json 和 baseline-data.json。
# end_hook 必须从原文章尾提取，不得编造钩子。

_meta:
  version: "v6.3"
  volume_ref: "设计/卷/volume-01.md"
  act_number: 1
  chapter_range: [ch1, ch10]

act:
