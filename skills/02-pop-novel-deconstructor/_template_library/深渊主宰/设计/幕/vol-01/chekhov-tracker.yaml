# chekhov-tracker.yaml — 契诃夫枪追踪（深渊主宰·卷1）
# @source_book: 深渊主宰（诸生浮屠）
# @tracking: 所有在第一卷中设定但尚未引爆的"契诃夫枪"
# ⚠️ 只追踪"已设定但未回收"的物品/能力/信息——已回收的在fired中标注。

tracker:
  volume: 1
  chapter_range: [ch1, ch20]

  # —— 在第一卷ch1-10中设定，尚未回收 ——
  pending:
    - gun_id: "万能巧手"
      set_in: ch2
      description: "传奇盗贼技能——使用任何武器自动获得精通以上专长。封印状态——索伦醒来后发现封印，但不知封印原因和解除条件"
      expected_payoff: "封印解除——索伦恢复传奇盗贼的完整能力"
      estimated_chapter: "卷4（传奇领域）"
      status: "pending"
      evidence: "ch2 传奇盗贼万能巧手描述"

    - gun_id: "半神神格"
      set_in: ch2
      description: "阴影神殿的史诗级道具——前世索伦的任务目标。取得后可获得半神属性"
      expected_payoff: "索伦获取半神神格——力量从传奇跨越到半神"
      estimated_chapter: "卷4"
      status: "pending"
      evidence: "ch2 前世记忆"

    - gun_id: "万神殿陨落神位"
      set_in: ch3
      description: "魔法女神/秩序之主/黑夜女士/阴影主宰/恐惧魔王——五位以上的神灵在动荡之年陨落，其神座空缺"
      expected_payoff: "索伦（或其他角色）替代某个陨落神灵的位置"
      estimated_chapter: "卷4→终局"
      status: "pending"
      evidence: "ch3 万神殿陨落名单"

    - gun_id: "索伦精灵血脉"
      set_in: ch19
      description: "索伦有八分之一精灵血统（父亲四分之一半精灵）。ch19'血裔'章提及"
      expected_payoff: "可能解锁精灵相关的进阶路线（如半精灵游侠/银月行者/精灵国度的政治线）"
      estimated_chapter: "卷3-4"
      status: "pending"
      evidence: "ch19 血裔"

    - gun_id: "神之子"
      set_in: ch20
      description: "琥珀城剥皮事件与'神之子'的关联——神灵以圣者形态行走凡间期间产下的后代"
      expected_payoff: "揭示'神之子'的身份和剥皮事件的真相——可能连接更大的阴谋"
      estimated_chapter: "未知"
      status: "pending"
      evidence: "ch20 神之子 + 剥皮事件"

    - gun_id: "深渊入侵扩大化"
      set_in: ch14
      description: "ch14仅出现双臂蛇魔——但索伦知道四臂/六臂/八臂蛇魔存在。深渊渗透只是开始"
      expected_payoff: "更高阶深渊恶魔大量出现——四臂→六臂→八臂蛇魔逐级登场"
      estimated_chapter: "卷2-4持续升级"
      status: "pending"
      evidence: "baseline-data.json monsters[] + ch14"

    - gun_id: "薇薇安的术士天赋上限"
      set_in: ch27(卷2)
      description: "天生术士天赋远超普通术士——ch103'逆天的薇薇安'显示潜力极大"
      expected_payoff: "薇薇安成为顶级术士——可能与神性/龙脉方向关联"
      estimated_chapter: "卷3-4"
      status: "pending"
      evidence: "ch27-28 + ch103"

    - gun_id: "魔法女神陨落的影响"
      set_in: ch3
      description: "魔法女神死亡→魔网不稳定→法术学习门槛提高。这个影响可能在后续更大规模展现"
      expected_payoff: "魔网崩溃/新魔法女神上位/索伦可能继承魔法神职"
      estimated_chapter: "卷4"
      status: "pending"
      evidence: "ch3 + ch27"

    - gun_id: "游戏世界=真实世界之谜"
      set_in: ch2
      description: "索伦穿越的'真实世界'与前世的VR游戏《诸神之战》设定完全一致——为什么？"
      expected_payoff: "揭示穿越的本质——'游戏预测了世界'还是'世界就是游戏'？"
      estimated_chapter: "终局（核心谜题）"
      status: "pending"
      evidence: "ch2 前世记忆"

    - gun_id: "万象无常牌"
      set_in: ch13
      description: "藏宝洞中获得的三张宝物卡——DND经典随机魔法道具，在前150章未大规模展开功能"
      expected_payoff: "关键时刻使用万象无常牌产生随机重大效果"
      estimated_chapter: "卷2-3关键战斗"
      status: "pending"
      evidence: "ch13 万象无常牌"

    - gun_id: "元素祭坛"
      set_in: ch107(卷3)
      description: "触发进阶职业——可能提供特殊进阶路线"
      expected_payoff: "特殊职业解锁"
      estimated_chapter: "卷3"
      status: "pending"
      evidence: "ch107 元素祭坛"

  # —— 已回收 ——
  fired:
    - gun_id: "面板苏醒"
      set_in: ch1(ch2苏醒)
      fired_in: ch2+ch10
      description: "索伦的面板从模糊→ch10'超凡觉醒'完全解锁"
      evidence: "ch2 → ch10"

    - gun_id: "割喉者称号"
      set_in: ch7(ch8-9)
      fired_in: ch9
      description: "十字巷杀人后获得'割喉者－索伦'的街头称号"
      evidence: "ch9 标题"

    - gun_id: "盗贼进阶二阶"
      set_in: ch2(ch17)
      fired_in: ch17
      description: "从10级平民/1级盗贼→击杀蛇魔后→5级盗贼【二阶】——第一个完整升级弧"
      evidence: "ch17 盗贼进阶"

    - gun_id: "薇薇安术士觉醒"
      set_in: ch1(ch27)
      fired_in: ch27-28
      description: "薇薇安看一眼牧师施法学会0级光亮术——术士天赋首次展现"
      evidence: "ch27-28"
