<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__ · 四格漫画</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;color:#e6edf3;font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;min-height:100vh}
  .container{max-width:1400px;margin:0 auto;padding:32px 24px}
  .hero{text-align:center;padding:40px 0 32px}
  .hero h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#a855f7,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  .hero p{color:#8b949e;font-size:0.9rem}
  .comic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:1100px;margin:0 auto}
  @media(max-width:768px){.comic-grid{grid-template-columns:1fr}}
  .panel{background:#161b22;border:1px solid #21262d;border-radius:16px;overflow:hidden;transition:transform 0.2s,border-color 0.2s}
  .panel:hover{transform:translateY(-4px);border-color:#30363d}
  .panel-label{display:flex;align-items:center;gap:8px;padding:14px 18px 10px;font-size:0.95rem;font-weight:600;color:#c9d1d9}
  .panel-label .ch{font-size:0.75rem;color:#484f58;font-weight:400}
  .panel-img{width:100%;aspect-ratio:16/10;overflow:hidden;background:#0d1117}
  .panel-img img{width:100%;height:100%;object-fit:cover;display:block}
  .panel-dialogue{padding:14px 18px 18px;font-family:'Noto Serif SC','Songti SC','STSong',serif;font-size:0.85rem;line-height:1.7;color:#8b949e}
  .panel-dialogue p+ p{margin-top:4px}
  .panel-dialogue p:first-child{color:#e6edf3}
  .panel-dialogue p:first-child::before{content:"💬 ";font-size:0.75rem}
  .footer{text-align:center;padding:32px;color:#484f58;font-size:0.72rem}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>📖 名场面四格漫画</h1>
    <p>__TITLE__ · 每个场景一个关键瞬间</p>
  </div>
  <div class="comic-grid">
    __PANELS__
  </div>
  <div class="footer">Generated by PopwaveAI Multi-Modal Marketing Skill</div>
</div>
</body>
</html>
