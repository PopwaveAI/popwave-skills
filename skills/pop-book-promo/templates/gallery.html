<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;color:#e6edf3;font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
  .container{max-width:1200px;margin:0 auto;padding:32px 24px}
  .hero{text-align:center;padding:40px 0 32px}
  .hero h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#7c5cff,#58a6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  .hero p{color:#8b949e;font-size:0.9rem}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  @media(max-width:640px){.gallery-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:400px){.gallery-grid{grid-template-columns:1fr}}
  .gallery-card{background:#161b22;border:1px solid #21262d;border-radius:16px;overflow:hidden;transition:transform 0.2s,border-color 0.2s}
  .gallery-card:hover{transform:translateY(-4px);border-color:#30363d}
  .gallery-img{width:100%;aspect-ratio:3/4;overflow:hidden;background:#0d1117}
  .gallery-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s}
  .gallery-card:hover .gallery-img img{transform:scale(1.05)}
  .gallery-info{padding:16px 18px 20px}
  .gallery-name{font-size:1.1rem;font-weight:600;color:#e6edf3;margin-bottom:4px}
  .gallery-name::before{content:'';display:inline-block;width:4px;height:16px;background:var(--accent,#7c5cff);border-radius:2px;margin-right:8px;vertical-align:middle}
  .gallery-faction{font-size:0.72rem;padding:2px 8px;border-radius:4px;background:var(--accent,#7c5cff)22;color:var(--accent,#7c5cff);display:inline-block;margin-bottom:6px}
  .gallery-desc{font-size:0.8rem;color:#8b949e;line-height:1.5}
  .footer{text-align:center;padding:32px;color:#484f58;font-size:0.72rem}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>🎭 角色立绘画廊</h1>
    <p>__TITLE__ · 每个人物都鲜活立体</p>
  </div>
  <div class="gallery-grid">
    __CARDS__
  </div>
  <div class="footer">Generated by PopwaveAI Multi-Modal Marketing Skill</div>
</div>
</body>
</html>
