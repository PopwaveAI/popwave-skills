<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__ · 金句卡</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;color:#e6edf3;font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
  .container{max-width:1000px;margin:0 auto;padding:32px 24px}
  .hero{text-align:center;padding:40px 0 32px}
  .hero h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#e8d5b7,#f0a070);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  .hero p{color:#8b949e;font-size:0.9rem}
  .quote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:24px}
  @media(max-width:480px){.quote-grid{grid-template-columns:1fr}}
  .quote-card{display:flex;gap:0;background:#161b22;border:1px solid #21262d;border-radius:16px;overflow:hidden;transition:transform 0.2s,border-color 0.2s}
  .quote-card:hover{transform:translateY(-3px);border-color:#30363d}
  .quote-char-img{width:160px;min-height:200px;flex-shrink:0;overflow:hidden;background:#0d1117}
  .quote-char-img img{width:100%;height:100%;object-fit:cover;display:block}
  .quote-body{padding:24px;display:flex;flex-direction:column;justify-content:center;flex:1}
  .quote-text{font-family:'Songti SC','STSong','Noto Serif SC',serif;font-size:1rem;line-height:1.8;color:#e6edf3;font-style:italic;margin-bottom:16px;position:relative;padding-left:20px}
  .quote-text::before{content:'"';position:absolute;left:0;top:-4px;font-size:2rem;color:#c9a96e44;font-family:serif;line-height:1}
  .quote-char{font-size:0.85rem;font-weight:600;color:#c9a96e}
  .quote-chapter{font-size:0.72rem;color:#484f58;margin-top:4px}
  @media(max-width:500px){.quote-card{flex-direction:column}.quote-char-img{width:100%;height:200px}}
  .footer{text-align:center;padding:32px;color:#484f58;font-size:0.72rem}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>💬 金句分享卡</h1>
    <p>__TITLE__ · 每句台词都值得被记住</p>
  </div>
  <div class="quote-grid">
    __CARDS__
  </div>
  <div class="footer">Generated by PopwaveAI Multi-Modal Marketing Skill</div>
</div>
</body>
</html>
