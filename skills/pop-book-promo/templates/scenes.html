<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__ · 名场面</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;color:#e6edf3;font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
  .container{max-width:1100px;margin:0 auto;padding:32px 24px}
  .hero{text-align:center;padding:40px 0 32px}
  .hero h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#ff6b35,#ff2bd6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  .hero p{color:#8b949e;font-size:0.9rem}
  .scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:24px}
  @media(max-width:560px){.scene-grid{grid-template-columns:1fr}}
  .scene-card{background:#161b22;border:1px solid #21262d;border-radius:16px;overflow:hidden;transition:transform 0.2s,border-color 0.2s}
  .scene-card:hover{transform:translateY(-4px);border-color:#30363d}
  .scene-img{width:100%;aspect-ratio:16/9;overflow:hidden;background:#0d1117}
  .scene-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s}
  .scene-card:hover .scene-img img{transform:scale(1.03)}
  .scene-meta{display:flex;gap:12px;padding:14px 20px 0;flex-wrap:wrap}
  .emotion-tag,.chapter-tag{font-size:0.7rem;padding:3px 10px;border-radius:20px;background:#1a1a2e;color:#8b949e;border:1px solid #21262d}
  .scene-title{font-size:1.1rem;font-weight:600;padding:10px 20px 0;color:#e6edf3}
  .scene-dialogue{padding:10px 20px 20px;font-family:'Songti SC','STSong','Noto Serif SC',serif;font-size:0.85rem;line-height:1.7;color:#8b949e}
  .scene-dialogue p{color:#8b949e}
  .scene-dialogue p:first-child{color:#c9d1d9}
  .footer{text-align:center;padding:32px;color:#484f58;font-size:0.72rem}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>🎬 名场面高光帧</h1>
    <p>__TITLE__ · 全书关键瞬间</p>
  </div>
  <div class="scene-grid">
    __CARDS__
  </div>
  <div class="footer">Generated by PopwaveAI Multi-Modal Marketing Skill</div>
</div>
</body>
</html>
