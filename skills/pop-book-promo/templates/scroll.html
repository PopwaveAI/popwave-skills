<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__ · 人物画卷</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;color:#e6edf3;font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
  .scroll-wrap{max-width:900px;margin:0 auto;padding:0 20px}
  .hero-section{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 0}
  .hero-bg{position:absolute;inset:0;overflow:hidden;border-radius:0 0 40px 40px}
  .hero-bg img{width:100%;height:100%;object-fit:cover;filter:brightness(0.3) saturate(0.8)}
  .hero-content{position:relative;z-index:2;text-align:center;max-width:700px}
  .hero-content h1{font-size:3rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#e8d5b7,#c9a96e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:'Songti SC','STSong','Noto Serif SC',serif}
  .hero-content .subtitle{font-size:1.1rem;color:#8b949e;line-height:1.8;margin-top:16px}
  .hero-content .subtitle br{display:block;margin:8px 0}
  .section-title{font-size:1.6rem;font-weight:700;text-align:center;padding:60px 0 32px;color:#e8d5b7;font-family:'Songti SC','STSong','Noto Serif SC',serif}
  .section-title::after{content:'';display:block;width:60px;height:2px;background:linear-gradient(90deg,#c9a96e,transparent);margin:12px auto 0}
  .desc-section{max-width:680px;margin:0 auto;padding:0 20px 40px;line-height:2;color:#8b949e;font-size:0.95rem}
  .timeline{position:relative;padding:0 20px 40px}
  .timeline::before{content:'';position:absolute;left:40px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,#c9a96e44,#30363d)}
  .scroll-node{display:flex;gap:24px;margin-bottom:32px;position:relative}
  .scroll-node-img{width:120px;height:90px;border-radius:12px;overflow:hidden;flex-shrink:0;border:1px solid #21262d;background:#0d1117}
  .scroll-node-img img{width:100%;height:100%;object-fit:cover}
  .scroll-node-info{padding-top:4px}
  .scroll-node-info .ch{font-size:0.75rem;color:#c9a96e;font-weight:500}
  .scroll-node-info p{font-size:0.82rem;line-height:1.6}
  .quotes-section{padding:20px 20px 60px;max-width:680px;margin:0 auto}
  blockquote{position:relative;padding:20px 24px;margin-bottom:20px;background:#161b22;border-left:3px solid #c9a96e;border-radius:0 12px 12px 0;font-family:'Songti SC','STSong','Noto Serif SC',serif}
  blockquote p{font-size:1.05rem;line-height:1.8;color:#e6edf3;font-style:italic}
  blockquote cite{display:block;margin-top:8px;font-size:0.8rem;color:#484f58;font-style:normal}
  .footer{text-align:center;padding:32px;color:#484f58;font-size:0.72rem}
  @media(max-width:768px){
    .hero-content h1{font-size:2rem}
    .scroll-node{flex-direction:column;gap:12px}
    .scroll-node-img{width:100%;height:160px}
  }
</style>
</head>
<body>
<div class="scroll-wrap">
  <div class="hero-section">
    <div class="hero-bg"><img src="__HERO_IMG__" alt=""></div>
    <div class="hero-content">
      <h1>__NAME__</h1>
      <div class="subtitle">__DESCRIPTION__</div>
    </div>
  </div>
  <div class="section-title">📜 成长轨迹</div>
  <div class="timeline">__TIMELINE__</div>
  <div class="section-title">💬 经典语录</div>
  <div class="quotes-section">__QUOTES__</div>
</div>
<div class="footer">Generated by PopwaveAI Multi-Modal Marketing Skill</div>
</body>
</html>
