<style>
:root{--bg:#06070a;--card:#0c1018;--text:#e6e8ec;--muted:#8b949e;--dim:#565f6b;--border:#21262d;--blue:#58a6ff;--green:#34d399;--red:#ff3b48;--violet:#b89eff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC','Inter Tight',sans-serif;padding:24px;min-height:100vh}
button{font:inherit}
.page{max-width:1120px;margin:0 auto}

.top-card{border:1px solid var(--border);border-radius:6px;background:var(--card);padding:16px;margin-bottom:16px}
.hero{display:grid;grid-template-columns:minmax(0,1fr) 286px;gap:22px;align-items:end;padding-bottom:14px;border-bottom:1px solid var(--border)}
.chapter-no{font-family:'Inter Tight',sans-serif;font-size:12px;font-weight:800;color:var(--dim);letter-spacing:.06em;margin-bottom:8px}
h1{font-size:38px;font-weight:800;line-height:1.04;letter-spacing:0;margin-bottom:8px}
.lead{max-width:640px;color:var(--muted);font-size:13px;line-height:1.55}
.hero-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.stat{border:1px solid var(--border);border-radius:6px;padding:10px 11px;min-height:62px;background:rgba(255,255,255,.018)}
.stat b{display:block;font-family:'Inter Tight',sans-serif;font-size:27px;line-height:1;font-weight:800;margin-bottom:5px}
.stat span{display:block;color:var(--dim);font-size:12px}

.stage-strip{display:grid;grid-template-columns:72px minmax(0,1fr);gap:12px;align-items:center;padding-top:12px}
.stage-label{font-size:12px;color:var(--dim);font-weight:800}
.stabs{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:2px 0}
.stab{min-width:34px;height:34px;border:1px solid transparent;background:transparent;color:var(--dim);border-radius:6px;cursor:pointer;text-align:center;font-family:'Inter Tight',sans-serif;font-size:12px;font-weight:800;transition:border-color .15s,color .15s,background .15s}
.stab:hover{color:var(--text)}
.stab.on{border-color:var(--blue);background:rgba(88,166,255,.08);color:var(--text)}

.overview{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.summary{border:1px solid var(--border);border-radius:6px;background:var(--card);padding:11px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:62px}
.summary span{font-size:13px;font-weight:800}
.summary b{font-family:'Inter Tight',sans-serif;font-size:28px;line-height:1}
.summary.alive span{color:var(--green)}
.summary.dead span{color:var(--red)}
.summary.abnormal span{color:var(--violet)}
.summary.offstage span{color:var(--dim)}

	.board{display:grid;grid-template-columns:328px minmax(0,1fr);gap:14px;align-items:stretch}
	.panel{border:1px solid var(--border);border-radius:6px;background:var(--card);padding:14px;height:100%}
.panel-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin-bottom:12px}
.panel-title{font-size:18px;font-weight:800}
.panel-note{font-size:12px;color:var(--dim)}
.roster{display:grid;gap:8px}
.role-row{width:100%;min-height:58px;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.018);padding:9px 10px;display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:9px;align-items:center;text-align:left;color:var(--text);cursor:pointer;transition:border-color .15s,background .15s}
.role-row:hover{border-color:var(--muted)}
.role-row.on{border-color:var(--blue);background:rgba(88,166,255,.075)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.dot.ok{background:var(--green)}
.dot.dead{background:var(--red)}
.dot.reborn{background:var(--violet)}
.dot.na{background:var(--dim)}
.row-main{min-width:0}
.row-name{display:block;font-size:14px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
	.row-place{display:block;margin-top:4px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
	.row-status{font-size:11px;color:var(--dim);white-space:nowrap}
	
	.visual-panel{display:grid;grid-template-rows:minmax(360px,46vh) auto;gap:14px;min-height:640px}
	.particle-stage{position:relative;overflow:hidden;border:1px solid #111820;border-radius:6px;background:#000;min-height:360px}
	.particle-stage::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 28% 34%,rgba(88,166,255,.12),transparent 24%),radial-gradient(circle at 64% 58%,rgba(184,158,255,.13),transparent 28%),linear-gradient(180deg,transparent,rgba(0,0,0,.22))}
	#particleCanvas{position:absolute;inset:0;width:100%;height:100%;display:block}
	.particle-hotspot{position:absolute;width:118px;height:86px;transform:translate(-50%,-50%);border:0;background:transparent;color:var(--text);cursor:pointer;border-radius:999px}
	.particle-hotspot::before{content:"";position:absolute;inset:14px 24px;border:1px solid rgba(255,255,255,.16);border-radius:50%;opacity:0;transition:opacity .15s,transform .15s}
	.particle-hotspot:hover::before,.particle-hotspot.on::before{opacity:1;transform:scale(1.1)}
	.particle-label{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);max-width:126px;padding:3px 8px;border-radius:999px;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.12);font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 8px #000}
	.detail-panel{display:grid;grid-template-rows:auto auto 1fr;gap:14px;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.018);padding:14px}
	.detail-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:start;border-bottom:1px solid var(--border);padding-bottom:14px}
.detail-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:12px}
.detail-name{font-size:48px;font-weight:800;line-height:1;margin-bottom:7px}
.detail-type{font-size:13px;color:var(--dim)}
.detail-number{font-family:'Inter Tight',sans-serif;font-size:42px;font-weight:800;color:var(--dim);line-height:1}
.quick-info{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quick-item{border:1px solid var(--border);border-radius:6px;padding:10px}
.quick-label{font-size:11px;color:var(--dim);margin-bottom:6px}
.quick-value{font-size:13px;font-weight:700;line-height:1.4;color:var(--text)}
.detail-body{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
.story-block{border-top:2px solid var(--border);padding-top:12px}
.detail-list{border-top:2px solid var(--border)}
.detail-label{font-size:12px;color:var(--dim);margin-bottom:6px}
.detail-value{font-size:13px;color:var(--muted);line-height:1.7}
.story-block .detail-value{color:var(--text)}
.detail-row{padding:12px 0;border-bottom:1px solid var(--border)}

	@media(max-width:980px){
	  body{padding:18px}
	  .hero,.stage-strip,.board,.detail-top,.detail-body{grid-template-columns:1fr}
	  h1{font-size:36px}
	  .hero-stats{grid-template-columns:repeat(3,minmax(0,1fr))}
	  .panel{height:auto}

@media(max-width:680px){
  body{padding:14px}
  h1{font-size:32px}
  .overview,.quick-info{grid-template-columns:1fr 1fr}
  .hero-stats{grid-template-columns:repeat(3,1fr)}

@media(max-width:460px){

</style>

const stages = D.stages;
const stageRanges = D.stage_ranges;
const chars = D.characters;

	let curStage = 0;
	let selectedIndex = 0;
	let particleItems = [];
	let particleFrame = null;
	const particlePalette = ['#8ea2ff','#c783ff','#6ee7ff','#f08cff','#b6e86b','#7df0c2','#ff86b7','#d7c5ff'];

function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

const stabsEl = document.getElementById('stabs');
stages.forEach((s,i)=>{
  stabsEl.innerHTML += `<button class="stab ${i===0?'on':''}" onclick="setStage(${i})" type="button" title="${esc(s)} · ${esc(stageRanges[i]||'')}">${String(i+1).padStart(2,'0')}</button>`;
});

function render(){
  const activeStates = chars.map(ch => ({ch, s: ch.states[curStage]})).filter(({s}) => s);
  const counts = getCounts(activeStates);
  const appeared = activeStates.filter(({s}) => isAppeared(s)).length;
  const changedCount = activeStates.filter(({s}) => s.power_change && !s.power_change.includes('持平')).length;

  document.getElementById('chapterNo').textContent = `${String(curStage + 1).padStart(2,'0')} / ${String(stages.length).padStart(2,'0')}`;
  document.getElementById('stageTitle').textContent = stages[curStage];
  document.getElementById('stageLead').textContent = `${stageRanges[curStage]||''} · 按生死状态与所在位置整理角色当前落点。`;
  document.getElementById('snapshotNote').textContent = `${activeStates.length} 人`;
  document.getElementById('heroStats').innerHTML = [
    ['在场', appeared],
    ['存活', counts.alive],
    ['变化', changedCount]
  ].map(([label,value]) => `<div class="stat"><b>${value}</b><span>${label}</span></div>`).join('');

	  if(selectedIndex >= activeStates.length) selectedIndex = 0;
	  renderOverview(counts);
	  renderRoster(activeStates);
	  renderParticleScene(activeStates);
	  renderDetail(activeStates[selectedIndex], selectedIndex);
	}

function getCounts(activeStates){
  return activeStates.reduce((acc,{s}) => {
    acc[getZoneKey(s)] += 1;
    return acc;
  }, {alive:0, offstage:0, dead:0, abnormal:0});
}

function isAppeared(s){
  return !!(s.position && !s.position.includes('未出场') && s.position !== '—' && s.alive !== '—');
}

function getLifeGroup(s){
  if(s.alive.includes('复活') || s.alive.includes('苏醒')) return '复活 / 异常';
  if(s.alive.includes('牺牲') || s.alive.includes('已故')) return '牺牲 / 已故';
  if(!isAppeared(s)) return '未出场';
  if(s.alive.includes('存活')) return '存活';
  return '未知';
}

function getStatusClass(s){
  const group = getLifeGroup(s);
  if(group === '存活') return 'ok';
  if(group === '牺牲 / 已故') return 'dead';
  if(group === '复活 / 异常') return 'reborn';
  return 'na';
}

function getZoneKey(s){
  const group = getLifeGroup(s);
  if(group === '存活') return 'alive';
  if(group === '牺牲 / 已故') return 'dead';
  if(group === '复活 / 异常') return 'abnormal';
  return 'offstage';
}

function renderOverview(counts){
  const items = [
    ['存活', counts.alive, 'alive'],
    ['未出场', counts.offstage, 'offstage'],
    ['牺牲 / 已故', counts.dead, 'dead'],
    ['复活 / 异常', counts.abnormal, 'abnormal']
  ];
  document.getElementById('overview').innerHTML = items.map(([label,value,key]) => `
    <div class="summary ${key}"><span>${label}</span><b>${value}</b></div>
  `).join('');
}

	function renderRoster(activeStates){
	  document.getElementById('roster').innerHTML = activeStates.map(({ch,s}, index) => `
    <button class="role-row ${index===selectedIndex?'on':''}" onclick="selectCharacter(${index})" type="button">
      <span class="dot ${getStatusClass(s)}"></span>
      <span class="row-main">
        <span class="row-name">${esc(ch.name)}</span>
        <span class="row-place">${esc(s.position || '—')}</span>
      </span>
      <span class="row-status">${esc(getLifeGroup(s))}</span>
    </button>
	  `).join('');
	}
	
	function colorForIndex(index){
	  return particlePalette[index % particlePalette.length];
	}
	
	function hashString(value){
	  let h = 2166136261;
	  for(const ch of String(value)){
	    h ^= ch.charCodeAt(0);
	    h = Math.imul(h, 16777619);
	  }
	  return h >>> 0;
	}
	
	function seeded(seed){
	  let t = seed >>> 0;
	  return function(){
	    t += 0x6D2B79F5;
	    let r = Math.imul(t ^ t >>> 15, 1 | t);
	    r ^= r + Math.imul(r ^ r >>> 7, 61 | r);
	    return ((r ^ r >>> 14) >>> 0) / 4294967296;
	  };
	}
	
	function hexToRgb(hex){
	  const v = hex.replace('#','');
	  return {
	    r: parseInt(v.slice(0,2), 16),
	    g: parseInt(v.slice(2,4), 16),
	    b: parseInt(v.slice(4,6), 16)
	  };
	}
	
	function renderParticleScene(activeStates){
	  const stage = document.getElementById('particleStage');
	  const canvas = document.getElementById('particleCanvas');
	  if(!stage || !canvas) return;
	
	  const rect = stage.getBoundingClientRect();
	  const w = Math.max(320, rect.width);
	  const h = Math.max(320, rect.height);
	  const cols = w < 620 ? 2 : 3;
	  const rows = Math.ceil(activeStates.length / cols);
	
	  particleItems = activeStates.map((item, index) => {
	    const col = index % cols;
	    const row = Math.floor(index / cols);
	    const jitter = seeded(hashString(item.ch.name + curStage));
	    const x = ((col + .5) / cols) * w + (jitter() - .5) * 44;
	    const y = ((row + .58) / rows) * h + (jitter() - .5) * 34;
	    return {...item, index, x, y, color: colorForIndex(index)};
	  });
	
	  stage.querySelectorAll('.particle-hotspot').forEach(el => el.remove());
	  particleItems.forEach(item => {
	    const btn = document.createElement('button');
	    btn.type = 'button';
	    btn.className = `particle-hotspot ${item.index === selectedIndex ? 'on' : ''}`;
	    btn.style.left = `${item.x}px`;
	    btn.style.top = `${item.y}px`;
	    btn.style.color = item.color;
	    btn.title = item.ch.name;
	    btn.onclick = () => selectCharacter(item.index);
	    btn.innerHTML = `<span class="particle-label">${esc(item.ch.name)}</span>`;
	    stage.appendChild(btn);
	  });
	
	  resizeParticleCanvas();
	  if(!particleFrame) animateParticles();
	}
	
	function resizeParticleCanvas(){
	  const stage = document.getElementById('particleStage');
	  const canvas = document.getElementById('particleCanvas');
	  if(!stage || !canvas) return;
	  const ratio = window.devicePixelRatio || 1;
	  const rect = stage.getBoundingClientRect();
	  canvas.width = Math.floor(rect.width * ratio);
	  canvas.height = Math.floor(rect.height * ratio);
	  canvas.style.width = `${rect.width}px`;
	  canvas.style.height = `${rect.height}px`;
	  const ctx = canvas.getContext('2d');
	  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
	}
	
	function animateParticles(){
	  drawParticles(performance.now() / 1000);
	  particleFrame = requestAnimationFrame(animateParticles);
	}
	
	function drawParticles(time){
	  const canvas = document.getElementById('particleCanvas');
	  if(!canvas) return;
	  const ctx = canvas.getContext('2d');
	  const w = canvas.clientWidth;
	  const h = canvas.clientHeight;
	  ctx.clearRect(0, 0, w, h);
	  ctx.fillStyle = '#000';
	  ctx.fillRect(0, 0, w, h);
	
	  ctx.save();
	  ctx.globalCompositeOperation = 'lighter';
	  particleItems.forEach((item, i) => {
	    const next = particleItems[(i + 1) % particleItems.length];
	    if(!next || i === particleItems.length - 1) return;
	    const c = hexToRgb(item.color);
	    ctx.setLineDash([4, 7]);
	    ctx.lineWidth = item.index === selectedIndex || next.index === selectedIndex ? 1.2 : .75;
	    ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},.42)`;
	    ctx.beginPath();
	    ctx.moveTo(item.x, item.y);
	    const bend = i % 2 === 0 ? -52 : 52;
	    ctx.quadraticCurveTo((item.x + next.x) / 2 + bend, (item.y + next.y) / 2 - bend * .35, next.x, next.y);
	    ctx.stroke();
	  });
	  ctx.restore();
	
	  particleItems.forEach(item => {
	    const random = seeded(hashString(`${item.ch.name}-${curStage}-${item.s.position}`));
	    const rgb = hexToRgb(item.color);
	    const appeared = isAppeared(item.s);
	    const count = appeared ? 360 : 160;
	    const selected = item.index === selectedIndex;
	    const baseRadius = selected ? 66 : 50;
	    const pulse = Math.sin(time * 1.8 + item.index) * (selected ? 5 : 2);
	
	    ctx.save();
	    ctx.globalCompositeOperation = 'lighter';
	    const glow = ctx.createRadialGradient(item.x, item.y, 0, item.x, item.y, baseRadius * 1.55);
	    glow.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${selected ? .34 : .18})`);
	    glow.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
	    ctx.fillStyle = glow;
	    ctx.beginPath();
	    ctx.arc(item.x, item.y, baseRadius * 1.55, 0, Math.PI * 2);
	    ctx.fill();
	
	    for(let p = 0; p < count; p++){
	      const a = random() * Math.PI * 2;
	      const r = Math.pow(random(), .58) * (baseRadius + pulse);
	      const petal = 1 + Math.sin(a * 4 + item.index) * .22 + Math.cos(a * 7) * .1;
	      const drift = Math.sin(time + p * .09 + item.index) * 1.6;
	      const x = item.x + Math.cos(a) * r * petal * 1.18 + drift;
	      const y = item.y + Math.sin(a) * r * (0.66 + random() * .34) - Math.abs(Math.cos(a * 2)) * 8;
	      const alpha = appeared ? (.2 + random() * .62) : (.08 + random() * .22);
	      const size = selected ? (.75 + random() * 1.45) : (.55 + random() * 1.1);
	      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
	      ctx.fillRect(x, y, size, size);
	    }
	
	    ctx.setLineDash([3, 6]);
	    ctx.strokeStyle = `rgba(235,242,255,${selected ? .46 : .18})`;
	    ctx.lineWidth = selected ? 1.1 : .7;
	    ctx.beginPath();
	    ctx.ellipse(item.x, item.y, baseRadius * 1.05, baseRadius * .62, Math.sin(item.index) * .8, 0, Math.PI * 2);
	    ctx.stroke();
	    ctx.restore();
	  });
	}
	
	function renderDetail(item, index){
  if(!item) return;
  const {ch,s} = item;
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-top">
      <div>
        <div class="detail-status"><span class="dot ${getStatusClass(s)}"></span>${esc(s.alive || '—')}</div>
        <div class="detail-name">${esc(ch.name)}</div>
        <div class="detail-type">${esc(ch.type)}</div>
      </div>
      <div class="detail-number">${String(index + 1).padStart(2,'0')}</div>
    </div>
    <div class="quick-info">
      <div class="quick-item"><div class="quick-label">位置</div><div class="quick-value">${esc(s.position || '—')}</div></div>
      <div class="quick-item"><div class="quick-label">战力</div><div class="quick-value">${esc(s.power || '—')}</div></div>
    </div>
    <div class="detail-body">
      <div class="story-block"><div class="detail-label">事件</div><div class="detail-value">${esc(s.note || '—')}</div></div>
      <div class="detail-list">
        <div class="detail-row"><div class="detail-label">情绪</div><div class="detail-value">${esc(s.mood || '—')}</div></div>
        <div class="detail-row"><div class="detail-label">变化</div><div class="detail-value">${esc(s.power_change || '—')}</div></div>
        <div class="detail-row"><div class="detail-label">关系</div><div class="detail-value">${esc(s.relations || '—')}</div></div>
      </div>
    </div>
  `;
}

window.selectCharacter = function(index){
  selectedIndex = index;
  render();
};

	window.setStage = function(i){
	  curStage = i;
	  selectedIndex = 0;
	  document.querySelectorAll('.stab').forEach((el,j)=>el.classList.toggle('on', j===i));
	  render();
	};
	
	window.addEventListener('resize', () => {
	  render();
	});
	
	render();
</script>
</body>
</html>
