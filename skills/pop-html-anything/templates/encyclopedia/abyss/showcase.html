function addOrbitalSystem(pts,s,main,soft,rnd){for(let ring=0;ring<5;ring++){const count=520-ring*35,tilt=(ring-2)*.23,rr=s*(.18+ring*.13);for(let i=0;i<count;i++){const a=i/count*Math.PI*2+rnd()*.02,x=Math.cos(a)*rr,y=Math.sin(a)*rr*Math.sin(tilt),z=Math.sin(a)*rr*Math.cos(tilt);push3(pts,x,y,z,ring%2?main:soft)}}for(let i=0;i<650;i++){const a=rnd()*Math.PI*2,b=rnd()*Math.PI*2,r=s*(.05+rnd()*.16);push3(pts,Math.cos(a)*r,Math.sin(b)*r,Math.sin(a)*r,main)}}
function addVortexField(pts,s,main,soft,rnd){for(let i=0;i<2900;i++){const t=i*.055,r=s*(i/2900)*.78,a=t+rnd()*.08,y=(i/2900-.5)*s*.78;push3(pts,Math.cos(a)*r,y,Math.sin(a)*r,i%3?main:soft)}for(let i=0;i<550;i++){const a=rnd()*Math.PI*2,r=s*(.08+rnd()*.28);push3(pts,Math.cos(a)*r,(rnd()-.5)*s*.16,Math.sin(a)*r,soft)}}

function addLine3(pts,x1,y1,z1,x2,y2,z2,c,count){for(let i=0;i<=count;i++){const t=i/count;push3(pts,x1+(x2-x1)*t,y1+(y2-y1)*t,z1+(z2-z1)*t,c)}}
function addCircle3(pts,cx,cy,cz,r,c,count,plane='xy'){for(let i=0;i<count;i++){const a=i/count*Math.PI*2,x=Math.cos(a)*r,y=Math.sin(a)*r;if(plane==='xz')push3(pts,cx+x,cy,cz+y,c);else if(plane==='yz')push3(pts,cx,cy+x,cz+y,c);else push3(pts,cx+x,cy+y,cz,c)}}
function addHumanSilhouette(pts,s,main,soft,offset){const ox=s*offset;addCircle3(pts,ox,-s*.24,0,s*.075,main,150,'xy');addLine3(pts,ox,-s*.16,0,ox,s*.22,0,main,150);addLine3(pts,ox-s*.17,-s*.02,0,ox+s*.17,-s*.02,0,soft,90);addLine3(pts,ox,s*.20,0,ox-s*.14,s*.48,0,main,90);addLine3(pts,ox,s*.20,0,ox+s*.14,s*.48,0,main,90);for(let i=0;i<420;i++){const a=Math.PI*(.12+Math.random()*.76),r=s*(.14+Math.random()*.10);push3(pts,ox+Math.cos(a)*r,s*.15+Math.sin(a)*r,(Math.random()-.5)*s*.08,soft)}}
function addHairBow3(pts,s,c,cx,cy){const ox=s*cx,oy=s*cy;addCircle3(pts,ox-s*.048,oy,0,s*.055,c,90,'xy');addCircle3(pts,ox+s*.048,oy,0,s*.055,c,90,'xy');addLine3(pts,ox-s*.10,oy,0,ox+s*.10,oy,0,c,48)}
function addHairCrown3(pts,s,c,cx,cy){const ox=s*cx,oy=s*cy;addLine3(pts,ox-s*.07,oy,0,ox+s*.07,oy,0,c,44);addLine3(pts,ox,oy-s*.055,0,ox,oy+s*.035,0,c,36);addCircle3(pts,ox,oy,0,s*.025,c,60,'xy')}
function addRobeLayer3(pts,s,c,cx,cy,w){const ox=s*cx,oy=s*cy;for(let k=0;k<4;k++){const yy=oy+s*(k*.075);addLine3(pts,ox-s*w*(.55-k*.08),yy,s*.02*k,ox+s*w*(.55-k*.08),yy,-s*.02*k,c,80)}}
function addTallRobe3(pts,s,c,cx){const ox=s*cx;addLine3(pts,ox-s*.16,-s*.10,0,ox-s*.25,s*.48,s*.04,c,120);addLine3(pts,ox+s*.16,-s*.10,0,ox+s*.25,s*.48,-s*.04,c,120);for(let i=0;i<6;i++)addLine3(pts,ox-s*.18+i*s*.07,-s*.03,0,ox-s*.14+i*s*.055,s*.43,0,c,62)}
function addLongCoat3(pts,s,c,cx){const ox=s*cx;addLine3(pts,ox-s*.18,-s*.05,0,ox-s*.31,s*.52,s*.06,c,120);addLine3(pts,ox+s*.18,-s*.05,0,ox+s*.31,s*.52,-s*.06,c,120);addRibbonArc(pts,s,c,cx-.05,.20,.30,.11)}
function addShortFightingDress3(pts,s,c,cx){const ox=s*cx;addLine3(pts,ox-s*.16,-s*.02,0,ox+s*.16,-s*.02,0,c,70);addLine3(pts,ox-s*.14,s*.18,0,ox+s*.14,s*.18,0,c,70);addLine3(pts,ox-s*.16,-s*.02,0,ox-s*.14,s*.18,0,c,42);addLine3(pts,ox+s*.16,-s*.02,0,ox+s*.14,s*.18,0,c,42)}
function addMistVeil3(pts,s,c,rnd,cx){for(let i=0;i<720;i++){const t=rnd()*Math.PI*2,r=s*(.12+rnd()*.36);push3(pts,s*cx+Math.cos(t)*r,s*(.04+Math.sin(t*2)*.16),Math.sin(t)*r*.32,c)}}
function addSwordHalo3(pts,s,c,cx){addCircle3(pts,s*cx,-s*.02,0,s*.36,c,360,'xz');for(let i=0;i<5;i++)addLine3(pts,s*(cx-.28+i*.14),-s*.38,0,s*(cx-.18+i*.10),s*.34,0,c,52)}
function addPeakHalo3(pts,s,c,r){for(let i=0;i<8;i++){const a=i/8*Math.PI*2;addSinglePeak(pts,s,c,Math.cos(a)*r,Math.sin(a)*r*.08,.10)}}
function addColdBreath3(pts,s,c,rnd){for(let i=0;i<760;i++){const t=rnd()*Math.PI*2,r=s*(.15+rnd()*.54);push3(pts,Math.cos(t)*r,s*(.05+Math.sin(t*3)*.05),(rnd()-.5)*s*.34,c)}}
function addMoonPath3(pts,s,c,rnd){for(let i=0;i<520;i++){const t=i/519,x=s*(-.42+t*.72),y=s*(-.04+Math.sin(t*Math.PI)*.24),z=s*(.22+Math.cos(t*Math.PI)*.16);push3(pts,x,y,z,c)}for(let i=0;i<220;i++)push3(pts,(rnd()-.5)*s*.70,-s*.28+rnd()*s*.10,(rnd()-.5)*s*.40,c)}
function addDeskScrolls3(pts,s,c){for(let i=0;i<3;i++){const y=s*(.16+i*.08);addLine3(pts,-s*.30,y,0,s*.22,y,s*.04,c,70);addCircle3(pts,-s*.32,y,0,s*.035,c,48,'xy')}}
function addShadowNetwork3(pts,s,c,rnd){for(let i=0;i<7;i++){const a=rnd()*Math.PI*2;addLine3(pts,0,0,0,Math.cos(a)*s*.44,Math.sin(a)*s*.26,(rnd()-.5)*s*.36,c,54)}}
function addStairPath3(pts,s,c,cx,cy){for(let i=0;i<8;i++){const y=s*(cy-i*.045),w=s*(.08+i*.045);addLine3(pts,s*cx-w,y,0,s*cx+w,y,0,c,36)}}
function addVerticalAura3(pts,s,c,rnd){for(let i=0;i<650;i++){const x=(rnd()-.5)*s*.32,y=(rnd()-.5)*s*.95,z=(rnd()-.5)*s*.22;push3(pts,x,y,z,c)}}
function addMarketRoofs3(pts,s,main,soft){for(let i=-3;i<=3;i++){const x=s*i*.10,y=s*(.14+Math.abs(i)*.012);addLine3(pts,x-s*.055,y,0,x,y-s*.055,s*.03,main,24);addLine3(pts,x,y-s*.055,s*.03,x+s*.055,y,0,soft,24)}}
function addLanterns3(pts,s,c,rnd){for(let i=0;i<9;i++){const x=s*(-.38+i*.095),y=s*(.05+rnd()*.24);addCircle3(pts,x,y,0,s*.018,c,28,'xy')}}
function addBurnEdges3(pts,s,c,rnd){for(let i=0;i<280;i++){const side=rnd()<.5?-1:1;push3(pts,side*s*(.28+rnd()*.035),s*((rnd()-.5)*.56),(rnd()-.5)*s*.06,c)}}
function addLinkedRunes3(pts,s,c,r){for(let i=0;i<9;i++){const a=i/9*Math.PI*2, x=Math.cos(a)*s*r, y=Math.sin(a)*s*r*.58;addContractSeal(pts,s,c,x/s,y/s,.035)}}
function addDetailedSword3(pts,s,main,soft){addSword3(pts,s,main,0,-.66,0,.62,0);addLine3(pts,-s*.026,-s*.52,0,s*.026,s*.46,0,soft,220);addLine3(pts,-s*.16,s*.26,0,s*.16,s*.26,0,main,80);addCircle3(pts,0,s*.38,0,s*.045,main,72,'xy')}
function addFrostOrbit3(pts,s,main,soft){addCircle3(pts,0,-s*.02,0,s*.38,soft,440,'xz');addCircle3(pts,0,-s*.02,0,s*.25,main,300,'yz')}
function addSpineBone3(pts,s,main,soft){for(let i=0;i<12;i++){const t=i/11,y=s*(-.38+t*.76),x=Math.sin(t*Math.PI*1.5)*s*.08,z=Math.cos(t*Math.PI*1.5)*s*.10;addCircle3(pts,x,y,z,s*(.035+i%2*.008),i%2?main:soft,58,'xy');addLine3(pts,x-s*.11,y,z,x+s*.11,y,z,soft,30)}}
function addDemonRunes3(pts,s,c){for(let i=0;i<6;i++){const a=i/6*Math.PI*2;addLine3(pts,Math.cos(a)*s*.22,Math.sin(a)*s*.18,0,Math.cos(a)*s*.42,Math.sin(a)*s*.30,s*.08,c,42)}}
function addSeaPavilion3(pts,s,main,soft){addTemple3(pts,s,main,0,-.06,.28);for(let i=0;i<4;i++)addLine3(pts,-s*.38,s*(.20+i*.045),0,s*.38,s*(.20+i*.045),0,i%2?main:soft,90)}
function addLotus3(pts,s,c){for(let i=0;i<8;i++){const a=i/8*Math.PI*2;for(let j=0;j<80;j++){const t=j/79*Math.PI;push3(pts,Math.cos(a)*s*.12+Math.cos(a)*Math.sin(t)*s*.12,Math.sin(a)*s*.08+Math.sin(a)*Math.sin(t)*s*.08,Math.cos(t)*s*.08,c)}}}
function addSword3(pts,s,c,x1,y1,x2,y2,z){addLine3(pts,s*x1,s*y1,s*z,s*x2,s*y2,-s*z,c,360);addLine3(pts,s*(x2-.055),s*(y2-.08),-s*z,s*(x2+.055),s*(y2-.08),-s*z,c,42);addLine3(pts,s*(x1-.035),s*(y1+.12),s*z,s*(x1+.035),s*(y1+.12),s*z,c,42)}
function addRibbonArc(pts,s,c,cx,cy,r,amp){for(let i=0;i<520;i++){const t=i/519*Math.PI*1.35+Math.PI*.84;push3(pts,s*(cx+Math.cos(t)*r),s*(cy+Math.sin(t)*amp),s*Math.sin(t)*r*.28,c)}}
function addContractSeal(pts,s,c,cx,cy,r){addCircle3(pts,s*cx,s*cy,0,s*r,c,180,'xy');for(let i=0;i<6;i++){const a=i/6*Math.PI*2;addLine3(pts,s*cx,s*cy,0,s*(cx+Math.cos(a)*r*.75),s*(cy+Math.sin(a)*r*.75),0,c,26)}}
function addCrescent3(pts,s,c,cx,cy,r){for(let i=0;i<360;i++){const a=Math.PI*.18+i/359*Math.PI*1.48;push3(pts,s*(cx+Math.cos(a)*r),s*(cy+Math.sin(a)*r),s*Math.sin(a)*r*.12,c);push3(pts,s*(cx+Math.cos(a)*(r*.68)+r*.08),s*(cy+Math.sin(a)*(r*.68)),s*Math.sin(a)*r*.10,c)}}
function addFanArc(pts,s,c,cx,cy,r){for(let i=0;i<7;i++){const a=Math.PI*(.15+i*.11);addLine3(pts,s*cx,s*cy,0,s*(cx+Math.cos(a)*r),s*(cy+Math.sin(a)*r),s*.08,c,64)}for(let i=0;i<360;i++){const a=Math.PI*(.15+i/359*.66);push3(pts,s*(cx+Math.cos(a)*r),s*(cy+Math.sin(a)*r),s*.08,c)}}
function addLooseStars(pts,s,c,rnd,count){for(let i=0;i<count;i++)push3(pts,(rnd()-.5)*s*.82,(rnd()-.5)*s*.52,(rnd()-.5)*s*.52,c)}
function addMountainGate(pts,s,main,soft,scale){for(let i=0;i<5;i++){const x=(-.44+i*.22)*scale;addSinglePeak(pts,s,i%2?soft:main,x,.10,.34+Math.random()*.10)}}
function addSinglePeak(pts,s,c,cx,cy,scale){addLine3(pts,s*(cx-.18*scale),s*(cy+.28*scale),0,s*cx,s*(cy-.28*scale),s*.04,c,160);addLine3(pts,s*cx,s*(cy-.28*scale),s*.04,s*(cx+.18*scale),s*(cy+.28*scale),0,c,160);addLine3(pts,s*(cx-.18*scale),s*(cy+.28*scale),0,s*(cx+.18*scale),s*(cy+.28*scale),0,c,90)}
function addTemple3(pts,s,c,cx,cy,scale){const w=.34*scale,h=.16*scale;addLine3(pts,s*(cx-w),s*(cy+h),0,s*(cx+w),s*(cy+h),0,c,90);addLine3(pts,s*(cx-w*.76),s*cy,0,s*(cx+w*.76),s*cy,0,c,80);addLine3(pts,s*(cx-w*.92),s*cy,0,s*cx,s*(cy-h),s*.04,c,70);addLine3(pts,s*cx,s*(cy-h),s*.04,s*(cx+w*.92),s*cy,0,c,70);for(let i=-2;i<=2;i++)addLine3(pts,s*(cx+i*w*.28),s*cy,0,s*(cx+i*w*.28),s*(cy+h),0,c,35)}
function addPeakRing(pts,s,c,count,r){for(let i=0;i<count;i++){const a=i/count*Math.PI*2;addSinglePeak(pts,s,c,Math.cos(a)*r,Math.sin(a)*r*.20,.16)}}
function addCloudBand(pts,s,c,rnd,cy){for(let i=0;i<900;i++){const a=rnd()*Math.PI*2,r=s*(.18+rnd()*.44);push3(pts,Math.cos(a)*r,s*(cy+Math.sin(a*3)*.035),(Math.sin(a)*r*.52),c)}}
function addCityGrid(pts,s,main,soft){for(let x=-3;x<=3;x++)addLine3(pts,s*x*.09,s*.18,0,s*x*.09,s*.44,0,x%2?main:soft,60);for(let y=0;y<4;y++)addLine3(pts,-s*.34,s*(.20+y*.06),0,s*.34,s*(.20+y*.06),0,y%2?main:soft,80)}
function addRiverCurve(pts,s,c){let px=-s*.42,py=s*.05,pz=0;for(let i=1;i<170;i++){const t=i/169,x=s*(-.42+t*.84),y=s*(.05+Math.sin(t*7)*.05),z=s*Math.cos(t*4)*.10;addLine3(pts,px,py,pz,x,y,z,c,3);px=x;py=y;pz=z}}
function addGate3(pts,s,c,cx,cy,scale){const w=.22*scale,h=.38*scale;addLine3(pts,s*(cx-w),s*(cy+h),0,s*(cx-w),s*(cy-h),0,c,90);addLine3(pts,s*(cx+w),s*(cy+h),0,s*(cx+w),s*(cy-h),0,c,90);addLine3(pts,s*(cx-w),s*(cy-h),0,s*(cx+w),s*(cy-h),0,c,80)}
function addScroll3(pts,s,main,soft){addLine3(pts,-s*.28,-s*.28,0,s*.28,-s*.28,0,main,120);addLine3(pts,-s*.28,s*.28,0,s*.28,s*.28,0,main,120);addLine3(pts,-s*.28,-s*.28,0,-s*.28,s*.28,0,soft,100);addLine3(pts,s*.28,-s*.28,0,s*.28,s*.28,0,soft,100);for(let i=-2;i<=2;i++)addLine3(pts,-s*.18,s*i*.07,0,s*.18,s*i*.07,0,soft,50)}

function addBoneCurve(pts,s,main,soft){for(let i=0;i<900;i++){const t=i/899*Math.PI*1.5-Math.PI*.75,x=Math.cos(t)*s*.32,y=Math.sin(t)*s*.18,z=Math.sin(t*2)*s*.12;push3(pts,x,y,z,i%3?main:soft)}addCircle3(pts,-s*.30,-s*.10,0,s*.10,main,130,'xy');addCircle3(pts,s*.30,s*.10,0,s*.10,soft,130,'xy')}
function addWaveSigil(pts,s,main,soft){for(let row=-1;row<=1;row++){let px=-s*.42,py=s*row*.08,pz=0;for(let i=1;i<180;i++){const t=i/179,x=s*(-.42+t*.84),y=s*(row*.08+Math.sin(t*Math.PI*2)*.045),z=s*Math.cos(t*Math.PI*2)*.10;addLine3(pts,px,py,pz,x,y,z,row?soft:main,3);px=x;py=y;pz=z}}}
function addJaggedCrown(pts,s,c){for(let i=0;i<7;i++){const x=s*(-.36+i*.12);addLine3(pts,x,s*.26,0,x+s*.06,s*(.08+(i%2)*.08),s*.05,c,36);addLine3(pts,x+s*.06,s*(.08+(i%2)*.08),s*.05,x+s*.12,s*.26,0,c,36)}}
function addMandala3(pts,s,main,soft){for(let i=0;i<8;i++){const a=i/8*Math.PI*2;addCircle3(pts,Math.cos(a)*s*.16,Math.sin(a)*s*.16,0,s*.13,i%2?main:soft,120,'xy')}}
function addLinkedRings(pts,s,main,soft){addCircle3(pts,-s*.13,0,0,s*.20,main,260,'xy');addCircle3(pts,s*.13,0,0,s*.20,soft,260,'xy');addLine3(pts,-s*.02,0,0,s*.02,0,0,main,24)}
function addEye3(pts,s,main,soft){for(let i=0;i<420;i++){const t=i/419*Math.PI*2;push3(pts,Math.cos(t)*s*.42,Math.sin(t)*s*.16,Math.sin(t)*s*.06,soft)}addCircle3(pts,0,0,0,s*.12,main,180,'xy');addCircle3(pts,0,0,0,s*.48,soft,380,'xz')}
function addTriad3(pts,s,main,soft){for(let i=0;i<3;i++){const a=i/3*Math.PI*2-Math.PI/2;addCircle3(pts,Math.cos(a)*s*.20,Math.sin(a)*s*.16,0,s*.22,i?soft:main,260,'xy')}for(let i=0;i<3;i++){const a=i/3*Math.PI*2-Math.PI/2;addLine3(pts,0,0,0,Math.cos(a)*s*.36,Math.sin(a)*s*.28,0,main,80)}}
function hashString(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function hexMix(a,b,t){const pa=parseHex(a),pb=parseHex(b),r=Math.round(pa.r*(1-t)+pb.r*t),g=Math.round(pa.g*(1-t)+pb.g*t),bl=Math.round(pa.b*(1-t)+pb.b*t);return`#${[r,g,bl].map(v=>v.toString(16).padStart(2,'0')).join('')}`}
function parseHex(hex){const c=String(hex).replace('#',''),n=parseInt(c.length===3?c.split('').map(x=>x+x).join(''):c,16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255}}
function drawEnergyRings(ctx,w,h,ts,color,cx,cy,dpr){
  ctx.save();ctx.globalCompositeOperation='lighter';ctx.lineCap='round';
  for(let i=0;i<3;i++){const rot=ts*(.00028+i*.00008)+i*.94,rx=w*(.16+i*.052),ry=h*(.058+i*.026),alpha=.16-i*.025;ctx.lineWidth=Math.max(1,dpr*(1.35-i*.18));ctx.setLineDash([22*dpr,34*dpr]);ctx.lineDashOffset=-ts*(.042+i*.018);ctx.strokeStyle=hexToRgba(color,alpha);ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,rot,0,Math.PI*2);ctx.stroke()}
  ctx.setLineDash([]);ctx.restore();
}
function drawComets(ctx,w,h,ts,color,cx,cy,dpr){
  ctx.save();ctx.globalCompositeOperation='lighter';ctx.lineCap='round';
  for(let i=0;i<9;i++){const a=ts*.00042+i*.698,rx=w*(.12+(i%3)*.07),ry=h*(.05+(i%4)*.018),x=cx+Math.cos(a)*rx,y=cy+Math.sin(a*1.35)*ry,len=(18+i*4)*dpr;ctx.strokeStyle=hexToRgba(color,.10+(i%3)*.025);ctx.lineWidth=Math.max(1,dpr*(1.1+(i%2)*.35));ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-Math.sin(a)*len,y-Math.cos(a*1.35)*len*.55);ctx.stroke()}
  ctx.restore();
}
function drawBurst(ctx,w,h,ts,color,cx,cy,dpr){
  const now=performance.now(),left=burstUntil-now;if(left<=0)return;const t=1-left/980,alpha=(1-t);ctx.save();ctx.globalCompositeOperation='lighter';ctx.strokeStyle=hexToRgba(color,alpha*.26);ctx.lineWidth=Math.max(1,dpr*1.6);ctx.beginPath();ctx.arc(cx,cy,Math.max(w,h)*(.06+t*.24),0,Math.PI*2);ctx.stroke();ctx.strokeStyle=hexToRgba(hexMix(color,'#ffffff',.42),alpha*.18);for(let i=0;i<28;i++){const a=i/28*Math.PI*2+ts*.0009,r1=Math.max(w,h)*(.08+t*.14),r2=r1+Math.max(w,h)*(.05+Math.sin(i)*.02)*alpha;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);ctx.stroke()}ctx.restore();
}
function drawParticles(ts=0){
  const w=canvas.width,h=canvas.height,dpr=Number(canvas.dataset.dpr||1),centerX=w*.63,centerY=h*.50;
  ctx.clearRect(0,0,w,h);ctx.fillStyle='#020308';ctx.fillRect(0,0,w,h);
  const grad=ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,Math.max(w,h)*.72);grad.addColorStop(0,hexToRgba(particleColor,.13));grad.addColorStop(.42,hexToRgba(particleColor,.045));grad.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
  const ringColor=hexMix(particleColor,'#ffffff',.34);drawEnergyRings(ctx,w,h,ts,ringColor,centerX,centerY,dpr);drawComets(ctx,w,h,ts,ringColor,centerX,centerY,dpr);drawBurst(ctx,w,h,ts,particleColor,centerX,centerY,dpr);
  const mode=(particleEntry&&particleEntry.catKey)||'characters',speed={characters:.00032,places:.00022,items:.00036,organizations:.00025,concepts:.00039}[mode]||.00029,ay=ts*speed,ax=Math.sin(ts*.00018)*.30,cy=Math.cos(ay),sy=Math.sin(ay),cx=Math.cos(ax),sx=Math.sin(ax),fov=Math.min(w,h)*1.08,projected=[];
  particles.forEach(p=>{const dx=p.tx-p.x,dy=p.ty-p.y,dz=p.tz-p.z;p.vx=(p.vx+dx*.014)*.85;p.vy=(p.vy+dy*.014)*.85;p.vz=(p.vz+dz*.014)*.85;p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;const pulse=Math.sin(ts*.0016+p.phase)*8,rx=(p.x+p.hot*pulse)*cy-p.z*sy,rz=(p.x+p.hot*pulse)*sy+p.z*cy,ry=p.y*cx-rz*sx,rz2=p.y*sx+rz*cx,scale=fov/(fov+rz2+fov*.30),sx2=centerX+rx*scale,sy2=centerY+ry*scale,depth=Math.max(.18,Math.min(1.34,scale)),twinkle=.78+Math.sin(ts*.0016+p.phase)*.22;if(sx2<-34||sx2>w+34||sy2<-34||sy2>h+34)return;projected.push({x:sx2,y:sy2,z:rz2,r:Math.max(.34,p.r*dpr*depth),a:Math.min(.88,p.a*depth*twinkle),c:p.c||particleColor,hot:p.hot,phase:p.phase})});
  projected.sort((a,b)=>b.z-a.z);ctx.globalCompositeOperation='lighter';
  projected.forEach((p,i)=>{if(p.hot){ctx.beginPath();ctx.fillStyle=hexToRgba(hexMix(p.c,'#ffffff',.38),p.a*.16);ctx.arc(p.x,p.y,p.r*6.1,0,Math.PI*2);ctx.fill()}else if(i%4===0){ctx.beginPath();ctx.fillStyle=hexToRgba(p.c,p.a*.11);ctx.arc(p.x,p.y,p.r*3.7,0,Math.PI*2);ctx.fill()}ctx.beginPath();ctx.fillStyle=hexToRgba(p.hot?hexMix(p.c,'#ffffff',.28):p.c,p.a*(p.hot?.92:.76));ctx.arc(p.x,p.y,p.r*(p.hot?1.28:1),0,Math.PI*2);ctx.fill()});
  ctx.globalCompositeOperation='source-over';requestAnimationFrame(drawParticles);
}
function hexToRgba(hex,alpha){const c=String(hex).replace('#',''),n=parseInt(c.length===3?c.split('').map(x=>x+x).join(''):c,16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;return`rgba(${r},${g},${b},${alpha})`}
window.addEventListener('resize',resizeCanvas);resizeCanvas();initParticles();drawParticles();render();initDraggableCard();
