/* INJECT:DATA */const DATA = {"nodes": [{"id": "N0", "name": "徐千屿", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第1章 — · 出场 3192", "x": 500, "y": 350, "tilt": -1.5}, {"id": "N1", "name": "沈溯微", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第1章 — · 出场 1349", "x": 290, "y": 165, "tilt": 0.8}, {"id": "N2", "name": "徐冰来", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第1章 前缘（一） · 出场 264", "x": 500, "y": 138, "tilt": -1}, {"id": "N3", "name": "赵明棠", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第58章 明棠清荷（一） · 出场 84", "x": 710, "y": 185, "tilt": 1.2}, {"id": "N4", "name": "谢妄真", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第1章 — · 出场 328", "x": 245, "y": 330, "tilt": -1.5}, {"id": "N5", "name": "阮竹清", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第1章 前缘（一） · 出场 182", "x": 745, "y": 340, "tilt": 0.8}, {"id": "N6", "name": "徐芊芊", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第15章 生辰（十） · 出场 95", "x": 330, "y": 500, "tilt": -1}, {"id": "N7", "name": "徐见素", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第15章 生辰（十） · 出场 88", "x": 560, "y": 505, "tilt": 1.2}, {"id": "N8", "name": "王夫人", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第13章 生辰（八） · 出场 78", "x": 795, "y": 515, "tilt": -1.5}, {"id": "N9", "name": "水如山", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第1章 前缘（一） · 出场 74", "x": 160, "y": 500, "tilt": 0.8}, {"id": "N10", "name": "赵夫人", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第58章 明棠清荷（一） · 出场 64", "x": 860, "y": 270, "tilt": -1}, {"id": "N11", "name": "赵清荷", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第58章 明棠清荷（一） · 出场 49", "x": 185, "y": 250, "tilt": 1.2}, {"id": "N12", "name": "徐抱朴", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第30章 枇杷果（四） · 出场 31", "x": 520, "y": 390, "tilt": -1.5}, {"id": "N13", "name": "沈师兄", "role": "支线人物", "group": "support", "desc": "暂无简介 · 第1章 前缘（一） · 出场 33", "x": 675, "y": 390, "tilt": 0.8}], "edges": [{"source": "N0", "target": "N1", "type": "romantic", "label": "师兄妹→恋人"}, {"source": "N0", "target": "N4", "type": "hostile", "label": "前世被杀·今生对峙"}, {"source": "N1", "target": "N4", "type": "hostile", "label": "除魔·死敌"}, {"source": "N1", "target": "N5", "type": "ally", "label": "同门"}, {"source": "N0", "target": "N5", "type": "ally", "label": "同门·两世见证"}, {"source": "N0", "target": "N2", "type": "blood", "label": "家族长辈"}, {"source": "N0", "target": "N6", "type": "blood", "label": "徐家同辈"}, {"source": "N0", "target": "N7", "type": "blood", "label": "徐家长辈"}, {"source": "N0", "target": "N12", "type": "blood", "label": "徐家成员"}, {"source": "N2", "target": "N6", "type": "blood", "label": "徐家"}, {"source": "N2", "target": "N7", "type": "blood", "label": "徐家"}, {"source": "N0", "target": "N9", "type": "blood", "label": "外祖父"}, {"source": "N9", "target": "N8", "type": "blood", "label": "水家"}, {"source": "N3", "target": "N11", "type": "blood", "label": "赵家"}, {"source": "N3", "target": "N10", "type": "blood", "label": "赵家"}, {"source": "N11", "target": "N10", "type": "blood", "label": "赵家"}, {"source": "N0", "target": "N3", "type": "ally", "label": "世家交集"}, {"source": "N0", "target": "N8", "type": "ally", "label": "姻亲"}]};/* ENDINJECT */
/* INJECT:TYPE_LABELS */const TYPE_LABELS = {"blood": "血亲", "romantic": "爱恋", "mentor": "师承", "ally": "盟友", "hostile": "敌对", "betrayal": "背叛", "identity": "身份", "control": "控制", "evidence": "证据", "event": "事件", "platform": "平台"};/* ENDINJECT */
const MOTION = {"idle": 0.0018, "hover": 0.0, "select": 0.024, "filter": 0.0, "drag": 0.09, "release": 0.03, "max": 0.135, "damping": 0.7, "anchor": 0.012, "pointer": 0.0};
const selected = document.getElementById("selected");
const svg = document.querySelector("svg");
const graph = document.querySelector(".graph");
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const compactEdgeLabels = document.body.classList.contains("archetype-xianxia-sect-scroll") || document.body.classList.contains("archetype-avatar-social-graph");
const nodesById = new Map(DATA.nodes.map(node => [node.id, node]));
const nodeElements = new Map([...document.querySelectorAll(".node")].map(el => [el.dataset.id, el]));
const edgeElements = [...document.querySelectorAll(".edge")];
const labelElements = [...document.querySelectorAll(".edge-labels .edge-label")];
DATA.nodes.forEach(node => {
  node.baseX = Number(node.x);
  node.baseY = Number(node.y);
  node.vx = 0;
  node.vy = 0;
});
let viewport = { x: 0, y: 0, k: 1 };
let selectedId = DATA.nodes[0]?.id || "A";
let activeType = "all";
let energy = reduceMotion ? 0 : MOTION.select;
let dragging = null;
let dragStart = null;
let dragMoved = false;
let panning = null;
let focusActive = true;

function related(id) {
  return DATA.edges.filter(edge => edge.source === id || edge.target === id);
}

function toWorld(event) {
  const rect = svg.getBoundingClientRect();
  const x = ((event.clientX - rect.left) / rect.width) * 1000;
  const y = ((event.clientY - rect.top) / rect.height) * 650;
  return { x: (x - viewport.x) / viewport.k, y: (y - viewport.y) / viewport.k };
}

function setGraphTransform() {
  graph.setAttribute("transform", `translate(${viewport.x} ${viewport.y}) scale(${viewport.k})`);
}

function zoomBy(delta) {
  const nextScale = Math.max(.62, Math.min(2.05, viewport.k + delta));
  if (nextScale === viewport.k) return;
  const focused = focusActive ? nodesById.get(selectedId) : null;
  const cx = focused ? focused.x * viewport.k + viewport.x : 500;
  const cy = focused ? focused.y * viewport.k + viewport.y : 325;
  const before = { x: (cx - viewport.x) / viewport.k, y: (cy - viewport.y) / viewport.k };
  viewport.k = nextScale;
  viewport.x = cx - before.x * viewport.k;
  viewport.y = cy - before.y * viewport.k;
  setGraphTransform();
}

function edgePath(source, target, curve, index) {
  const sx = source.x, sy = source.y, tx = target.x, ty = target.y;
  if (curve === "timeline") {
    const lift = 70 + (index % 3) * 28;
    const cy = Math.min(sy, ty) - lift;
    return `M${sx.toFixed(2)} ${sy.toFixed(2)} C${sx.toFixed(2)} ${cy.toFixed(2)} ${tx.toFixed(2)} ${cy.toFixed(2)} ${tx.toFixed(2)} ${ty.toFixed(2)}`;
  }
  if (curve === "investigation" || curve === "social") {
    const dx = tx - sx;
    const dy = ty - sy;
    const length = Math.max(1, Math.hypot(dx, dy));
    const bendBase = curve === "investigation" ? 42 : 24;
    const bend = index % 2 === 0 ? bendBase : -bendBase;
    const mx = (sx + tx) / 2;
    const my = (sy + ty) / 2;
    const cx = mx - dy / length * bend;
    const cy = my + dx / length * bend;
    return `M${sx.toFixed(2)} ${sy.toFixed(2)} Q${cx.toFixed(2)} ${cy.toFixed(2)} ${tx.toFixed(2)} ${ty.toFixed(2)}`;
  }
  if (curve === "dossier") {
    const midY = sy + (ty - sy) * 0.45;
    return `M${sx.toFixed(2)} ${sy.toFixed(2)} C${sx.toFixed(2)} ${midY.toFixed(2)} ${tx.toFixed(2)} ${midY.toFixed(2)} ${tx.toFixed(2)} ${ty.toFixed(2)}`;
  }
  if (curve === "ritual") {
    return `M${sx.toFixed(2)} ${sy.toFixed(2)} Q500 320 ${tx.toFixed(2)} ${ty.toFixed(2)}`;
  }
  if (curve === "elbow") {
    const midX = (sx + tx) / 2;
    return `M${sx.toFixed(2)} ${sy.toFixed(2)} L${midX.toFixed(2)} ${sy.toFixed(2)} L${midX.toFixed(2)} ${ty.toFixed(2)} L${tx.toFixed(2)} ${ty.toFixed(2)}`;
  }
  return `M${sx.toFixed(2)} ${sy.toFixed(2)} L${tx.toFixed(2)} ${ty.toFixed(2)}`;
}

function reheat(value) {
  if (reduceMotion) return;
  energy = Math.min(MOTION.max, Math.max(energy, value));
}

function renderSelected() {
  const node = DATA.nodes.find(item => item.id === selectedId) || DATA.nodes[0];
  const relationships = related(node.id);
  const rows = relationships.slice(0, 7).map(edge => {
    const otherId = edge.source === node.id ? edge.target : edge.source;
    const other = DATA.nodes.find(item => item.id === otherId);
    const typeLabel = TYPE_LABELS[edge.type] || edge.type;
    return `<div class="relationship-row"><span class="relationship-type">${typeLabel}</span><span>${edge.label} · ${other ? other.name : otherId}</span></div>`;
  }).join("");
  const groupLabel = {
    protagonist: "核心人物",
    rival: "对立/魔域",
    secret: "隐藏身份",
    family: "血亲家族",
    authority: "师承同门",
    ally: "盟友同阵"
  }[node.group] || "关系人物";
  selected.innerHTML = `
    <div class="selected-name">${node.name}</div>
    <div class="selected-role">${node.role}</div>
    <div class="selected-meta">
      <div class="selected-chip"><strong>${groupLabel}</strong>人物定位</div>
      <div class="selected-chip"><strong>${relationships.length}</strong>关联关系</div>
    </div>
    <div class="selected-desc">${node.desc}</div>
    <div class="relationship-list">${rows || '<div class="selected-desc">暂无已标注关系</div>'}</div>
  `;
}

function renderTypeSelected() {
  if (activeType === "all") {
    selected.innerHTML = '<div class="selected-desc">点击人物查看关系详情；选择下方关系类型可只看某一种线。</div>';
    return;
  }
  const typeLabel = TYPE_LABELS[activeType] || activeType;
  const typeEdges = DATA.edges.filter(edge => edge.type === activeType);
  const rows = typeEdges.slice(0, 8).map(edge => {
    const source = DATA.nodes.find(item => item.id === edge.source);
    const target = DATA.nodes.find(item => item.id === edge.target);
    return `<div class="relationship-row"><span class="relationship-type">${typeLabel}</span><span>${source ? source.name : edge.source} → ${target ? target.name : edge.target} · ${edge.label}</span></div>`;
  }).join("");
  selected.innerHTML = `
    <div class="selected-name">${typeLabel}</div>
    <div class="selected-role">关系类型视图</div>
    <div class="selected-meta">
      <div class="selected-chip"><strong>${typeEdges.length}</strong>条关系</div>
      <div class="selected-chip"><strong>线型 / 颜色</strong>语义编码</div>
    </div>
    <div class="selected-desc">当前只突出这一类关系，其余人物与连线会淡出。每条亮线都代表一条已标注关系。</div>
    <div class="relationship-list">${rows || '<div class="selected-desc">暂无这一类关系</div>'}</div>
  `;
}

function applyState(heat = MOTION.select) {
  if (!focusActive) {
    const typeEdges = activeType === "all" ? DATA.edges : DATA.edges.filter(edge => edge.type === activeType);
    const typeNodes = new Set();
    typeEdges.forEach(edge => { typeNodes.add(edge.source); typeNodes.add(edge.target); });
    document.querySelectorAll(".node").forEach(node => {
      const showAll = activeType === "all";
      node.classList.toggle("is-muted", !showAll && !typeNodes.has(node.dataset.id));
      node.classList.remove("is-hot");
    });
    document.querySelectorAll(".edge").forEach(edge => {
      const typeOk = activeType === "all" || edge.classList.contains(`edge-${activeType}`);
      edge.classList.toggle("is-muted", !typeOk);
      edge.classList.toggle("is-hot", activeType !== "all" && typeOk);
    });
    document.querySelectorAll(".edge-labels .edge-label").forEach((label, index) => {
      const edge = DATA.edges[index];
      const typeOk = activeType !== "all" && edge.type === activeType;
      label.style.opacity = typeOk ? ".82" : "0";
    });
    renderTypeSelected();
    reheat(heat);
    return;
  }
  const hot = new Set([selectedId]);
  related(selectedId).forEach(edge => { hot.add(edge.source); hot.add(edge.target); });
  document.querySelectorAll(".node").forEach(node => {
    const isHot = hot.has(node.dataset.id);
    node.classList.toggle("is-muted", !isHot);
    node.classList.toggle("is-hot", node.dataset.id === selectedId);
  });
  document.querySelectorAll(".edge").forEach(edge => {
    const touches = edge.dataset.source === selectedId || edge.dataset.target === selectedId;
    const typeOk = activeType === "all" || edge.classList.contains(`edge-${activeType}`);
    edge.classList.toggle("is-muted", !(touches && typeOk));
    edge.classList.toggle("is-hot", touches && typeOk);
  });
  document.querySelectorAll(".edge-labels .edge-label").forEach((label, index) => {
    const edge = DATA.edges[index];
    const touches = edge.source === selectedId || edge.target === selectedId;
    const typeOk = activeType === "all" || edge.type === activeType;
    label.style.opacity = touches && typeOk ? (compactEdgeLabels ? ".48" : ".86") : "0";
  });
  renderSelected();
  reheat(heat);
}

document.querySelectorAll(".node").forEach(node => {
  node.addEventListener("pointerenter", event => {
    focusActive = true;
    selectedId = node.dataset.id;
    applyState(0);
  });
  node.addEventListener("pointerdown", event => {
    dragging = nodesById.get(node.dataset.id);
    dragStart = { x: event.clientX, y: event.clientY };
    dragMoved = false;
    node.setPointerCapture(event.pointerId);
    focusActive = true;
    selectedId = node.dataset.id;
    applyState(0);
  });
  node.addEventListener("pointerup", event => {
    if (dragMoved) reheat(MOTION.release);
    dragging = null;
    dragStart = null;
    dragMoved = false;
    node.releasePointerCapture(event.pointerId);
  });
  node.addEventListener("pointercancel", () => { dragging = null; dragStart = null; dragMoved = false; });
  node.addEventListener("click", () => { focusActive = true; selectedId = node.dataset.id; applyState(0); });
});
document.querySelectorAll(".filter").forEach(button => {
  button.addEventListener("click", () => {
    activeType = button.dataset.type;
    focusActive = false;
    document.querySelectorAll(".filter").forEach(item => item.classList.toggle("is-active", item === button));
    applyState(MOTION.filter);
  });
});
document.getElementById("themeToggle").addEventListener("click", () => {
  document.body.dataset.theme = document.body.dataset.theme === "dark" ? "light" : "dark";
});
document.getElementById("zoomIn").addEventListener("click", () => { zoomBy(0.12); });
document.getElementById("zoomOut").addEventListener("click", () => { zoomBy(-0.12); });

svg.addEventListener("pointerdown", event => {
  if (event.target.closest(".node")) return;
  focusActive = false;
  applyState(0);
  panning = { x: event.clientX, y: event.clientY, vx: viewport.x, vy: viewport.y };
  svg.setPointerCapture(event.pointerId);
});
svg.addEventListener("pointermove", event => {
  if (dragging) {
    if (dragStart && !dragMoved) {
      const moved = Math.hypot(event.clientX - dragStart.x, event.clientY - dragStart.y);
      if (moved < 4) return;
      dragMoved = true;
    }
    const next = toWorld(event);
    dragging.x = next.x;
    dragging.y = next.y;
    dragging.vx = 0;
    dragging.vy = 0;
    reheat(MOTION.drag);
    return;
  }
  if (panning) {
    const rect = svg.getBoundingClientRect();
    viewport.x = panning.vx + ((event.clientX - panning.x) / rect.width) * 1000;
    viewport.y = panning.vy + ((event.clientY - panning.y) / rect.height) * 650;
    setGraphTransform();
  }
});
svg.addEventListener("pointerup", event => {
  panning = null;
  try { svg.releasePointerCapture(event.pointerId); } catch (_) {}
});
function tick() {
  const hot = new Set(focusActive ? [selectedId] : []);
  if (focusActive) related(selectedId).forEach(edge => { hot.add(edge.source); hot.add(edge.target); });
  const anchorStrength = MOTION.anchor;
  const damping = MOTION.damping;
  DATA.edges.forEach(edge => {
    const source = nodesById.get(edge.source);
    const target = nodesById.get(edge.target);
    if (!source || !target) return;
    const dx = target.x - source.x;
    const dy = target.y - source.y;
    const distance = Math.max(1, Math.hypot(dx, dy));
    const desired = hot.has(source.id) && hot.has(target.id) ? 145 : 185;
    const force = (distance - desired) * 0.0003 * energy;
    const fx = dx * force;
    const fy = dy * force;
    if (source !== dragging) { source.vx += fx; source.vy += fy; }
    if (target !== dragging) { target.vx -= fx; target.vy -= fy; }
  });
  DATA.nodes.forEach(node => {
    if (node !== dragging) {
      node.vx += (node.baseX - node.x) * anchorStrength * (0.4 + energy);
      node.vy += (node.baseY - node.y) * anchorStrength * (0.4 + energy);
      node.vx *= damping;
      node.vy *= damping;
      node.x += node.vx;
      node.y += node.vy;
    }
    const el = nodeElements.get(node.id);
    if (el) {
      const tilt = Number(node.tilt || 0);
      el.setAttribute("transform", `translate(${node.x.toFixed(2)} ${node.y.toFixed(2)})${tilt ? ` rotate(${tilt})` : ""}`);
    }
  });
  edgeElements.forEach(edgeEl => {
    const source = nodesById.get(edgeEl.dataset.source);
    const target = nodesById.get(edgeEl.dataset.target);
    if (!source || !target) return;
    edgeEl.setAttribute("d", edgePath(source, target, edgeEl.dataset.curve, Number(edgeEl.dataset.index || 0)));
  });
  labelElements.forEach((label, index) => {
    const edge = DATA.edges[index];
    const source = nodesById.get(edge.source);
    const target = nodesById.get(edge.target);
    if (!source || !target) return;
    label.setAttribute("x", ((source.x + target.x) / 2).toFixed(2));
    label.setAttribute("y", ((source.y + target.y) / 2 - 7).toFixed(2));
  });
  energy = Math.max(reduceMotion ? 0 : MOTION.idle, energy * .972);
  requestAnimationFrame(tick);
}

applyState();
setGraphTransform();
requestAnimationFrame(tick);
</script>
