<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>家族阵营谱系 · Visual QA Archetype</title>
<style>
:root {
  --surface: #f2ecdf;
  --panel: #fff9ed;
  --ink: #272118;
  --muted: #756753;
  --line: #7b6c55;
  --accent: #9f3d32;
  --accent-2: #997736;
  --hairline: color-mix(in srgb, var(--ink), transparent 84%);
}
body[data-theme="dark"] {
  --surface: #111210;
  --panel: #191a17;
  --ink: #f0eee7;
  --muted: #b8b2a8;
  --line: #817b70;
}
* { box-sizing: border-box; }
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
body {
  background: var(--surface);
  color: var(--ink);
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Noto Sans SC", "Microsoft YaHei", sans-serif;
  letter-spacing: 0;
}
.app { position: relative; width: 100vw; height: 100vh; isolation: isolate; }
.texture { position: absolute; inset: 0; pointer-events: none; opacity: .72; }
.texture-paper, .texture-register, .texture-minimal { background-image: linear-gradient(90deg, rgba(0,0,0,.025) 1px, transparent 1px), linear-gradient(rgba(0,0,0,.018) 1px, transparent 1px); background-size: 34px 34px; opacity: .18; }
.texture-grid, .texture-data { background-image: linear-gradient(90deg, color-mix(in srgb, var(--accent), transparent 88%) 1px, transparent 1px), linear-gradient(color-mix(in srgb, var(--accent), transparent 90%) 1px, transparent 1px); background-size: 36px 36px; opacity: .28; }
.texture-dossier { background-image: repeating-linear-gradient(0deg, rgba(20,18,14,.04) 0 1px, transparent 1px 7px); }
.texture-notebook { background-image: linear-gradient(rgba(80,70,55,.08) 1px, transparent 1px); background-size: 100% 31px; }
.texture-editorial { background-image: linear-gradient(90deg, transparent 0 18%, rgba(120,120,112,.12) 18% 18.2%, transparent 18.2% 58%, rgba(120,120,112,.08) 58% 58.2%, transparent 58.2%), linear-gradient(0deg, transparent 0 26%, rgba(120,120,112,.08) 26% 26.2%, transparent 26.2%); }
.texture-social { background-image: linear-gradient(90deg, rgba(0,0,0,.035) 1px, transparent 1px), linear-gradient(rgba(0,0,0,.025) 1px, transparent 1px); background-size: 22px 22px; opacity: .14; }
.texture-timeline { background-image: linear-gradient(90deg, transparent 0 9%, rgba(180,50,40,.14) 9% 9.3%, transparent 9.3%); background-size: 180px 100%; }
.texture-occult { background-image: linear-gradient(90deg, transparent 0 49.8%, rgba(170,40,35,.12) 49.8% 50.2%, transparent 50.2%), linear-gradient(0deg, transparent 0 49.8%, rgba(170,40,35,.12) 49.8% 50.2%, transparent 50.2%), repeating-linear-gradient(45deg, transparent 0 34px, rgba(170,40,35,.08) 35px, transparent 36px); opacity: .45; }
.topline { position: absolute; left: 28px; top: 24px; z-index: 5; max-width: 430px; }
.key { margin: 0 0 9px; color: var(--accent); font: 650 10px/1.1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .12em; text-transform: uppercase; }
h1 { margin: 0; font-size: 21px; line-height: 1.15; font-weight: 680; }
.brief { margin: 9px 0 0; color: var(--muted); font-size: 12px; line-height: 1.55; }
.reference-meta { margin-top: 8px; color: var(--muted); font: 520 10px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace; max-width: 410px; }
.theme-toggle { position: absolute; top: 24px; right: 28px; z-index: 10; width: 34px; height: 34px; border: 1px solid var(--hairline); background: var(--panel); color: var(--ink); border-radius: 5px; cursor: pointer; }
svg { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
.graph { transform-origin: center; }
.edge { stroke: var(--line); stroke-width: 1.2; opacity: .58; vector-effect: non-scaling-stroke; transition: opacity .18s ease, stroke-width .18s ease; }
.edge-hostile, .edge-betrayal { stroke: var(--accent); stroke-dasharray: 5 5; }
.edge-romantic { stroke: color-mix(in srgb, var(--accent), #d98aa0 55%); }
.edge-ally, .edge-mentor { stroke: var(--accent-2); }
.edge-blood { stroke: var(--accent); stroke-width: 1.7; }
.edge-identity, .edge-evidence { stroke-dasharray: 2 6; }
.edge.is-muted { opacity: .08; }
.edge.is-hot { opacity: .95; stroke-width: 2.25; }
.edge-label { fill: var(--muted); font-size: 8px; paint-order: stroke; stroke: var(--surface); stroke-width: 5px; opacity: 0; pointer-events: none; }
.node { cursor: pointer; }
.node-core { fill: var(--panel); stroke: var(--ink); stroke-width: 1.2; vector-effect: non-scaling-stroke; filter: drop-shadow(0 2px 4px rgba(0,0,0,.12)); }
.node-protagonist .node-core { fill: var(--accent); }
.node-rival .node-core, .node-secret .node-core { stroke: var(--accent); }
.redact { fill: var(--accent-2); opacity: .82; }
.initial { fill: var(--ink); text-anchor: middle; font-weight: 700; font-size: 12px; pointer-events: none; }
.node-label { fill: var(--ink); font-size: 12px; font-weight: 620; paint-order: stroke; stroke: var(--surface); stroke-width: 6px; }
.node-sub { fill: var(--muted); font-size: 9px; paint-order: stroke; stroke: var(--surface); stroke-width: 5px; }
.node.is-muted { opacity: .16; }
.node.is-hot .node-core { stroke-width: 2; }
.archetype-avatar-social-graph .node-core { fill: #d8d8d8; stroke: #f4f4f4; stroke-width: 1; }
.archetype-avatar-social-graph .node-social .node-core { fill: #c7c7c7; }
.archetype-avatar-social-graph .node-label { fill: #f7f7f7; stroke: transparent; font-size: 9px; font-weight: 650; }
.archetype-avatar-social-graph .node-sub { display: none; }
.archetype-avatar-social-graph .edge { stroke: rgba(255,255,255,.72); stroke-width: .9; opacity: .56; }
.archetype-conspiracy-dossier-board .node-label,
.archetype-conspiracy-dossier-board .node-sub { stroke: transparent; }
.archetype-conspiracy-dossier-board .dossier { fill: #f0e5d1; stroke: #1a1713; }
.archetype-conspiracy-dossier-board .node::before { content: ""; }
.archetype-investigation-cluster-network .graph::before { content: ""; }
.cluster-field { fill: color-mix(in srgb, var(--line), transparent 82%); stroke: transparent; }
.archetype-timeline-relationship-map .edge { stroke-width: 1; opacity: .44; }
.archetype-minimal-index-graph .panel { box-shadow: none; border-style: dashed; }
.panel { position: absolute; right: 28px; top: 82px; z-index: 10; width: 340px; max-width: calc(100vw - 56px); background: #faf8f5; border: 1px solid var(--hairline); border-left: 3px solid #8b4513; border-radius: 8px; padding: 18px; box-shadow: -8px 0 24px rgba(0,0,0,.08), 0 18px 50px rgba(0,0,0,.08); backdrop-filter: blur(14px); }
.panel h2 { margin: 0; font-size: 14px; letter-spacing: .08em; }
.selected { margin: 14px 0 0; padding-top: 14px; border-top: 1px dashed var(--hairline); }
.selected-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.selected-role { color: var(--accent); font-size: 12px; margin-bottom: 8px; }
.selected-desc { color: var(--muted); font-size: 12px; line-height: 1.55; }
.filters { position: absolute; left: 28px; bottom: 24px; z-index: 6; display: flex; gap: 7px; max-width: calc(100vw - 420px); overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.filter { flex: 0 0 auto; border: 1px solid var(--hairline); background: color-mix(in srgb, var(--panel), transparent 8%); color: var(--muted); min-height: 30px; border-radius: 5px; padding: 0 10px; display: inline-flex; gap: 7px; align-items: center; cursor: pointer; font-size: 12px; }
.filter.is-active { color: var(--ink); border-color: color-mix(in srgb, var(--accent), transparent 45%); }
.line-swatch { display: inline-block; width: 16px; height: 2px; background: var(--accent); }
@media (max-width: 760px) {
  .topline { left: 18px; top: 16px; width: calc(100vw - 72px); }
  h1 { font-size: 17px; }
  .brief { font-size: 11px; max-width: 270px; }
  .theme-toggle { right: 18px; top: 16px; }
  .graph { transform: translate(-220px, 18px) scale(.86); }
  .panel { left: 12px; right: 12px; top: auto; bottom: 76px; width: auto; padding: 14px; }
  .selected-name { font-size: 17px; }
  .filters { left: 12px; right: 12px; bottom: 16px; max-width: none; }
  .node-label { font-size: 9.5px; }
  .node-sub, .edge-label { display: none; }
}
</style>
</head>
<body class="archetype-family-faction-tree">
<main class="app">
  <div class="texture texture-register"></div>
  <section class="topline">
    <p class="key">family-faction-tree</p>
    <h1>家族阵营谱系</h1>
    <p class="brief">血缘、婚姻、继承和派系站队，以层级树和家族分支表达。</p>
    <p class="reference-meta">Reference: R2 lineage graph + formal register layout · Layout: generation-tree</p>
  </section>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换明暗模式">◐</button>
  <svg viewBox="0 0 1000 650" role="img" aria-label="家族阵营谱系 preview graph">
    <g class="graph">
      <g class="background-shapes"><line x1="500" y1="90" x2="500" y2="540" stroke="var(--hairline)"></line><line x1="285" y1="360" x2="715" y2="360" stroke="var(--hairline)"></line></g>
      <g class="edges"><line class="edge edge-romantic" data-source="A" data-target="B" x1="500" y1="360" x2="350" y2="360"></line><line class="edge edge-mentor" data-source="A" data-target="C" x1="500" y1="360" x2="500" y2="190"></line><line class="edge edge-hostile" data-source="A" data-target="D" x1="500" y1="360" x2="650" y2="360"></line><line class="edge edge-ally" data-source="A" data-target="E" x1="500" y1="360" x2="300" y2="520"></line><line class="edge edge-blood" data-source="A" data-target="F" x1="500" y1="360" x2="500" y2="520"></line><line class="edge edge-control" data-source="C" data-target="G" x1="500" y1="190" x2="700" y2="520"></line><line class="edge edge-evidence" data-source="D" data-target="H" x1="650" y1="360" x2="500" y2="80"></line><line class="edge edge-identity" data-source="B" data-target="H" x1="350" y1="360" x2="500" y2="80"></line><line class="edge edge-event" data-source="E" data-target="G" x1="300" y1="520" x2="700" y2="520"></line></g>
      <g class="edge-labels"><text class="edge-label" x="425.0" y="353.0">情感牵引</text><text class="edge-label" x="500.0" y="268.0">师承/指导</text><text class="edge-label" x="575.0" y="353.0">正面冲突</text><text class="edge-label" x="400.0" y="433.0">并肩行动</text><text class="edge-label" x="500.0" y="433.0">血缘/旧债</text><text class="edge-label" x="600.0" y="348.0">制度控制</text><text class="edge-label" x="575.0" y="213.0">隐藏线索</text><text class="edge-label" x="425.0" y="213.0">身份误认</text><text class="edge-label" x="500.0" y="513.0">共同事件</text></g>
      <g class="nodes"><g class="node node-protagonist" data-id="A" data-name="主角" data-role="核心" data-desc="关系网络的叙事中心。" transform="translate(500 360)"><rect class="node-core nameplate" x="-25" y="-13" width="50" height="26" rx="2"></rect><text class="node-label" x="24" y="4">主角</text><text class="node-sub" x="24" y="18">核心</text></g><g class="node node-inner" data-id="B" data-name="旧识" data-role="情感线" data-desc="与主角存在长期情感牵引。" transform="translate(350 360)"><rect class="node-core nameplate" x="-25" y="-13" width="50" height="26" rx="2"></rect><text class="node-label" x="24" y="4">旧识</text><text class="node-sub" x="24" y="18">情感线</text></g><g class="node node-authority" data-id="C" data-name="导师" data-role="秩序线" data-desc="提供规则、训练或权力约束。" transform="translate(500 190)"><rect class="node-core nameplate" x="-25" y="-13" width="50" height="26" rx="2"></rect><text class="node-label" x="24" y="4">导师</text><text class="node-sub" x="24" y="18">秩序线</text></g><g class="node node-rival" data-id="D" data-name="对手" data-role="冲突线" data-desc="推动外部冲突升级。" transform="translate(650 360)"><rect class="node-core nameplate" x="-25" y="-13" width="50" height="26" rx="2"></rect><text class="node-label" x="24" y="4">对手</text><text class="node-sub" x="24" y="18">冲突线</text></g><g class="node node-ally" data-id="E" data-name="盟友" data-role="协作线" data-desc="提供行动支持。" transform="translate(300 520)"><rect class="node-core nameplate" x="-25" y="-13" width="50" height="26" rx="2"></rect><text class="node-label" x="24" y="4">盟友</text><text class="node-sub" x="24" y="18">协作线</text></g><g class="node node-family" data-id="F" data-name="家族" data-role="背景线" data-desc="代表血缘、资源或旧债。" transform="translate(500 520)"><rect class="node-core nameplate" x="-25" y="-13" width="50" height="26" rx="2"></rect><text class="node-label" x="24" y="4">家族</text><text class="node-sub" x="24" y="18">背景线</text></g><g class="node node-faction" data-id="G" data-name="组织" data-role="势力线" data-desc="代表制度、公司、门派或平台。" transform="translate(700 520)"><rect class="node-core nameplate" x="-25" y="-13" width="50" height="26" rx="2"></rect><text class="node-label" x="24" y="4">组织</text><text class="node-sub" x="24" y="18">势力线</text></g><g class="node node-secret" data-id="H" data-name="秘密" data-role="反转线" data-desc="隐藏身份或关键证据。" transform="translate(500 80)"><rect class="node-core nameplate" x="-25" y="-13" width="50" height="26" rx="2"></rect><text class="node-label" x="24" y="4">秘密</text><text class="node-sub" x="24" y="18">反转线</text></g></g>
    </g>
  </svg>
  <aside class="panel">
    <h2>关系索引</h2>
    <div class="selected" id="selected"></div>
  </aside>
  <nav class="filters">
    <button class="filter is-active" data-type="all">全部</button>
    <button class="filter" data-type="romantic"><span class="line-swatch edge-romantic"></span>爱恋</button><button class="filter" data-type="mentor"><span class="line-swatch edge-mentor"></span>师承</button><button class="filter" data-type="ally"><span class="line-swatch edge-ally"></span>盟友</button><button class="filter" data-type="blood"><span class="line-swatch edge-blood"></span>血亲</button><button class="filter" data-type="hostile"><span class="line-swatch edge-hostile"></span>敌对</button><button class="filter" data-type="identity"><span class="line-swatch edge-identity"></span>身份</button>
  </nav>
</main>
<script>
/* INJECT:DATA */const DATA = {"nodes": [{"id": "A", "name": "主角", "role": "核心", "group": "protagonist", "desc": "关系网络的叙事中心。", "x": 500, "y": 360}, {"id": "B", "name": "旧识", "role": "情感线", "group": "inner", "desc": "与主角存在长期情感牵引。", "x": 350, "y": 360}, {"id": "C", "name": "导师", "role": "秩序线", "group": "authority", "desc": "提供规则、训练或权力约束。", "x": 500, "y": 190}, {"id": "D", "name": "对手", "role": "冲突线", "group": "rival", "desc": "推动外部冲突升级。", "x": 650, "y": 360}, {"id": "E", "name": "盟友", "role": "协作线", "group": "ally", "desc": "提供行动支持。", "x": 300, "y": 520}, {"id": "F", "name": "家族", "role": "背景线", "group": "family", "desc": "代表血缘、资源或旧债。", "x": 500, "y": 520}, {"id": "G", "name": "组织", "role": "势力线", "group": "faction", "desc": "代表制度、公司、门派或平台。", "x": 700, "y": 520}, {"id": "H", "name": "秘密", "role": "反转线", "group": "secret", "desc": "隐藏身份或关键证据。", "x": 500, "y": 80}], "edges": [{"source": "A", "target": "B", "type": "romantic", "label": "情感牵引"}, {"source": "A", "target": "C", "type": "mentor", "label": "师承/指导"}, {"source": "A", "target": "D", "type": "hostile", "label": "正面冲突"}, {"source": "A", "target": "E", "type": "ally", "label": "并肩行动"}, {"source": "A", "target": "F", "type": "blood", "label": "血缘/旧债"}, {"source": "C", "target": "G", "type": "control", "label": "制度控制"}, {"source": "D", "target": "H", "type": "evidence", "label": "隐藏线索"}, {"source": "B", "target": "H", "type": "identity", "label": "身份误认"}, {"source": "E", "target": "G", "type": "event", "label": "共同事件"}]};/* ENDINJECT */
const selected = document.getElementById("selected");
let selectedId = "A";
let activeType = "all";

function related(id) {
  return DATA.edges.filter(edge => edge.source === id || edge.target === id);
}

function renderSelected() {
  const node = DATA.nodes.find(item => item.id === selectedId) || DATA.nodes[0];
  const rows = related(node.id).slice(0, 5).map(edge => {
    const otherId = edge.source === node.id ? edge.target : edge.source;
    const other = DATA.nodes.find(item => item.id === otherId);
    return `<div>${edge.label} · ${other ? other.name : otherId}</div>`;
  }).join("");
  selected.innerHTML = `<div class="selected-name">${node.name}</div><div class="selected-role">${node.role}</div><div class="selected-desc">${node.desc}</div><div class="selected-desc" style="margin-top:10px">${rows}</div>`;
}

function applyState() {
  const hot = new Set([selectedId]);
  related(selectedId).forEach(edge => { hot.add(edge.source); hot.add(edge.target); });
  document.querySelectorAll(".node").forEach(node => {
    const isHot = hot.has(node.dataset.id);
    node.classList.toggle("is-muted", !isHot);
    node.classList.toggle("is-hot", node.dataset.id === selectedId);
  });
  document.querySelectorAll(".edge").forEach(edge => {
    const touches = edge.dataset.source === selectedId || edge.dataset.target === selectedId;
    const typeOk = activeType === "all" || edge.classList.contains(`edge-${activeType}`);
    edge.classList.toggle("is-muted", !(touches && typeOk));
    edge.classList.toggle("is-hot", touches && typeOk);
  });
  document.querySelectorAll(".edge-label").forEach((label, index) => {
    const edge = DATA.edges[index];
    const touches = edge.source === selectedId || edge.target === selectedId;
    const typeOk = activeType === "all" || edge.type === activeType;
    label.style.opacity = touches && typeOk ? ".86" : "0";
  });
  renderSelected();
}

document.querySelectorAll(".node").forEach(node => {
  node.addEventListener("pointerenter", () => { selectedId = node.dataset.id; applyState(); });
  node.addEventListener("click", () => { selectedId = node.dataset.id; applyState(); });
});
document.querySelectorAll(".filter").forEach(button => {
  button.addEventListener("click", () => {
    activeType = button.dataset.type;
    document.querySelectorAll(".filter").forEach(item => item.classList.toggle("is-active", item === button));
    applyState();
  });
});
document.getElementById("themeToggle").addEventListener("click", () => {
  document.body.dataset.theme = document.body.dataset.theme === "dark" ? "light" : "dark";
});
applyState();
</script>
</body>
</html>
