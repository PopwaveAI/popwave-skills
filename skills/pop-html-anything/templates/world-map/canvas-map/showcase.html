<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界地图 · 千屿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e14;overflow:hidden;height:100vh;width:100vw;font-family:'Noto Serif SC',serif}
canvas{display:block}
.topbar{position:absolute;top:20px;left:24px;z-index:10;pointer-events:none}
.topbar h1{font-size:1.05rem;font-weight:700;color:#d4cfc4;letter-spacing:0.03em}
.topbar .sub{font-size:0.55rem;color:#6b6458;font-family:'JetBrains Mono',monospace;letter-spacing:0.06em}
.legend-bar{position:absolute;top:20px;right:24px;z-index:10;display:flex;gap:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.58rem;color:#8a8274;font-family:'JetBrains Mono',monospace}
.legend-dot{width:7px;height:7px;border-radius:50%}
.zoom-label{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:10;font-size:0.55rem;color:#5a5344;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:10px;background:rgba(10,12,20,0.6);border:1px solid rgba(255,255,255,0.05)}
.compass{position:absolute;bottom:28px;left:28px;z-index:10;opacity:0.4}
.compass svg{width:50px;height:50px}
.tooltip{position:absolute;z-index:20;opacity:0;pointer-events:none;background:rgba(14,17,24,0.97);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:14px 18px;max-width:280px;transition:opacity .12s}
.tooltip .tt-name{font-size:0.85rem;font-weight:700;color:#e8e2d9;margin-bottom:3px}
.tooltip .tt-meta{font-size:0.55rem;color:#6b6458;font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.tooltip .tt-desc{font-size:0.62rem;color:#9a9484;line-height:1.5}
</style>
</head>
<body>
<canvas id="map"></canvas>
<div class="topbar"><h1>《千屿》</h1><div class="sub">WORLD MAP · 16 LOCATIONS · 3 REALMS</div></div>
<div class="legend-bar" id="legendBar"></div>
<div class="zoom-label" id="zoomLabel"></div>
<div class="compass"><svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="22" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.7"/><polygon points="25,3 22,22 3,25 22,28 25,47 28,28 47,25 28,22" fill="rgba(255,255,255,0.2)"/></svg></div>
<div class="tooltip" id="tooltip"></div>

<script>
/* INJECT:DATA */const DATA = {
  "novel": "千屿",
  "total_locations": 16,
  "layers": [
    {
      "name": "人间",
      "color": "#34d399",
      "locations": [
        {
          "name": "蓬莱仙宗",
          "type": "sect",
          "chapter": "第1章",
          "desc": "正道第一仙宗。悬浮于东海之上的群峰，灵气充沛。",
          "children": [
            {
              "name": "戒律堂",
              "type": "room",
              "chapter": "第1章",
              "desc": "蓬莱执法之地。雷霆劈开雨幕，陆呦在此觉醒灵根。"
            },
            {
              "name": "流英阁",
              "type": "room",
              "chapter": "第1章",
              "desc": "存放宗门至宝的重地。魔骨原本保存在此处。"
            },
            {
              "name": "徐冰来内室",
              "type": "room",
              "chapter": "第30章",
              "desc": "掌门徐冰来的居所。一排长老在此议事。"
            },
            {
              "name": "器道阁",
              "type": "room",
              "chapter": "第50章",
              "desc": "炼器之地。沈溯微教徐千屿塑灵池。"
            },
            {
              "name": "无真小院",
              "type": "compound",
              "chapter": "第3章",
              "desc": "无真师叔养伤隐居之处。窗贴满黄纸，屋内暗不见光。炭火毕剥。"
            },
            {
              "name": "弟子演武场",
              "type": "area",
              "chapter": "第100章",
              "desc": "弟子大会擂台所在。守阵擂台，金乌报时。"
            },
            {
              "name": "徐千屿小院",
              "type": "compound",
              "chapter": "第30章",
              "desc": "被徐冰来禁制封锁的院子。前院抽陀螺，后院劈禁制。"
            }
          ]
        },
        {
          "name": "东海",
          "type": "area",
          "chapter": "第1章",
          "desc": "蓬莱仙宗所在的海域。巨鸢飞行其上，浓云低垂。"
        },
        {
          "name": "无妄崖",
          "type": "area",
          "chapter": "第1章",
          "desc": "怨气结成魔王之地。谢妄真的藏匿处。密林黑暗，野兽咆哮。",
          "children": [
            {
              "name": "树林魔屋",
              "type": "compound",
              "chapter": "第3章",
              "desc": "弟子们伪造的木屋。伪装成婚房诱杀魔王。祖宗牌位是椴木削成。"
            },
            {
              "name": "溪涧",
              "type": "area",
              "chapter": "第1章",
              "desc": "徐千屿逃跑路上摔倒的溪流。冰水洗脸，血渍斑驳。"
            }
          ]
        },
        {
          "name": "雪原",
          "type": "area",
          "chapter": "第30章",
          "desc": "徐冰来年少时常年闭关之处。寂寂无声，千里冰封。"
        },
        {
          "name": "棋盘仙境",
          "type": "site",
          "chapter": "第50章",
          "desc": "沈溯微进入灵池所化的场域。徐千屿在此学习塑造灵池。一团海浪般涌动的金箔。"
        }
      ]
    },
    {
      "name": "妖域",
      "color": "#f0883e",
      "locations": [
        {
          "name": "妖域入口",
          "type": "area",
          "chapter": "第70章",
          "desc": "沈溯微从妖域归来，身上伤未好全。魔骨即来自妖域。"
        }
      ]
    },
    {
      "name": "灵池/识海",
      "color": "#b89eff",
      "locations": [
        {
          "name": "灵池",
          "type": "area",
          "chapter": "第50章",
          "desc": "修士体内的灵力空间。徐千屿的灵池形如一棵树。以娘（沈溯微化身）的引导塑形。"
        },
        {
          "name": "芥子金珠",
          "type": "item",
          "chapter": "第1章",
          "desc": "沈溯微怀中的储物法宝。魔骨存放其中，不设封印故被徐千屿抢走。"
        }
      ]
    }
  ]
};
/* ENDINJECT */
const layers = DATA.layers;

const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");
let W, H, dpr;

function resize(){
  dpr = window.devicePixelRatio||1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+"px"; canvas.style.height = H+"px";
}
resize();

// ── Zoom / Pan ──
let vx=0, vy=0, vs=1;
const MIN_S=0.3, MAX_S=4;

canvas.addEventListener("wheel",e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.12:0.9;
  const mx=e.offsetX,my=e.offsetY;
  vx=mx-(mx-vx)*f; vy=my-(my-vy)*f;
  vs=Math.min(MAX_S,Math.max(MIN_S,vs*f));
  document.getElementById("zoomLabel").textContent=Math.round(vs*100)+"%";
});

let drag=false,dx=0,dy=0;
canvas.addEventListener("mousedown",e=>{drag=true;dx=e.offsetX-vx;dy=e.offsetY-vy});
window.addEventListener("mousemove",e=>{if(drag){vx=e.offsetX-dx;vy=e.offsetY-dy}});
window.addEventListener("mouseup",()=>drag=false);

// ── Layout: place realms side by side ──
const realms=[];
const PAD=140, GAP=80;
const availW=W*3.5, availH=H*1.8; // big canvas for panning room

function buildLayout(){
  realms.length=0;
  let totalW=0;
  const sizes=[];
  layers.forEach(l=>{
    const n=l.locations.length;
    const w=Math.max(450, n*150+GAP);
    sizes.push(w); totalW+=w;
  });
  totalW+=GAP*(layers.length-1);
  
  let xOff=PAD;
  layers.forEach((layer,i)=>{
    const w=sizes[i], n=layer.locations.length;
    const h=availH*0.6;
    const cx=xOff+w/2, cy=availH*0.45;
    
    // Position locations in grid
    const cols=Math.ceil(Math.sqrt(n*(w/h)));
    const rows=Math.ceil(n/cols);
    const cw=w/(cols+0.5), ch=h/(rows+0.5);
    layer.locations.forEach((loc,j)=>{
      const col=j%cols, row=Math.floor(j/cols);
      loc._x=cx-w/2+cw*(col+0.75);
      loc._y=cy-h/2+ch*(row+0.75);
    });
    
    // Place children below parent
    layer.locations.forEach(loc=>placeKids(loc));
    
    realms.push({cx,cy,w,h,layer});
    xOff+=w+GAP;
  });
  
  // Initial auto-fit
  const fitW=W-40, fitH=H-120;
  const fs=Math.min(fitW/totalW, fitH/availH*0.6)*1.05;
  vs=fs; vx=W/2-totalW/2*fs+PAD*fs; vy=H/2-availH*0.35*fs;
  document.getElementById("zoomLabel").textContent=Math.round(vs*100)+"%";
}

function placeKids(parent, depth=0){
  if(!parent.children||!parent.children.length)return;
  const n=parent.children.length;
  const g=Math.max(110, parent.children.reduce((m,c)=>Math.max(m,c.name.length*5),0)+80);
  const perRow=Math.min(6,Math.max(3,Math.ceil(n>5?5:4)));
  const rows=Math.ceil(n/perRow);
  for(let r=0;r<rows;r++){
    const s=r*perRow, e=Math.min(s+perRow,n), cnt=e-s;
    const sx=parent._x-(cnt-1)*g/2;
    for(let i=s;i<e;i++){
      parent.children[i]._x=sx+(i-s)*g;
      parent.children[i]._y=parent._y+80+r*55+depth*18;
      placeKids(parent.children[i],depth+1);
    }
  }
}

buildLayout();

// ── Drawing helpers ──
function rgba(hex,a){const p=parseInt(hex.slice(1),16);return`rgba(${p>>16},${(p>>8)&255},${p&255},${a})`}

function coast(cx,cy,w,h,color){
  ctx.save();
  // Fill
  const pts=100;
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const t=i/pts, a=t*Math.PI*2;
    const rx=w/2, ry=h/2;
    const j=Math.sin(t*Math.PI*11)*8+Math.sin(t*Math.PI*17)*5+Math.cos(t*Math.PI*23)*3+Math.sin(t*Math.PI*31)*2;
    const x=cx+Math.cos(a)*(rx+j), y=cy+Math.sin(a)*(ry+j*0.7);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(w,h)/2);
  g.addColorStop(0,rgba(color,0.1));g.addColorStop(0.5,rgba(color,0.03));g.addColorStop(1,"transparent");
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle=rgba(color,0.15);ctx.lineWidth=2;ctx.stroke();
  // Dash overlay
  ctx.strokeStyle=rgba(color,0.2);ctx.lineWidth=0.6;ctx.setLineDash([5,8]);ctx.stroke();ctx.setLineDash([]);
  // Label
  ctx.fillStyle=rgba(color,0.4);
  ctx.font='italic 600 20px "Noto Serif SC"';ctx.textAlign="center";
  ctx.fillText(layerName(realms.find(r=>r.cx===cx&&r.cy===cy)?.layer||{}),cx,cy-h/2-28);
  ctx.restore();
}
function layerName(l){return l.name||""}

// Convex hull territory
function territory(parent,color){
  if(!parent.children||parent.children.length<2)return;
  const pts=parent.children.map(c=>[c._x,c._y]);
  const h=convex(pts);if(h.length<3)return;
  const cx=h.reduce((s,p)=>s+p[0],0)/h.length, cy=h.reduce((s,p)=>s+p[1],0)/h.length;
  const ep=h.map(p=>{const dx=p[0]-cx,dy=p[1]-cy,len=Math.hypot(dx,dy)||1;return[p[0]+dx/len*30,p[1]+dy/len*30]});
  ctx.beginPath();
  ep.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));
  ctx.closePath();
  ctx.fillStyle=rgba(color,0.05);ctx.fill();
  ctx.strokeStyle=rgba(color,0.12);ctx.lineWidth=1;ctx.setLineDash([4,6]);ctx.stroke();ctx.setLineDash([]);
}
function convex(pts){
  const s=[...pts].sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
  if(s.length<=1)return s;
  const lo=[],hi=[];
  for(const p of s){while(lo.length>=2&&cross(lo[lo.length-2],lo[lo.length-1],p)<=0)lo.pop();lo.push(p)}
  for(let i=s.length-1;i>=0;i--){const p=s[i];while(hi.length>=2&&cross(hi[hi.length-2],hi[hi.length-1],p)<=0)hi.pop();hi.push(p)}
  lo.pop();hi.pop();return lo.concat(hi);
}
function cross(o,a,b){return(a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0])}

// Terrain decor
function mountains(cx,cy,w,h,color){
  const n=Math.floor(w/80);
  ctx.fillStyle=rgba(color,0.12);
  for(let i=0;i<n;i++){
    const mx=cx-w/2+w*(i+0.4)/(n+0.01), my=cy-h/2+14+Math.sin(i*2.7)*8;
    const s=16+(i%3)*7;
    ctx.beginPath();ctx.moveTo(mx-s*0.6,my+s*0.5);ctx.lineTo(mx,my-s*0.5);ctx.lineTo(mx+s*0.6,my+s*0.5);ctx.closePath();ctx.fill();
  }
}
function trees(cx,cy,w,h,color){
  const n=Math.floor(w/55);
  ctx.fillStyle=rgba(color,0.09);
  for(let i=0;i<n;i++){
    const tx=cx-w/2+w*(i+0.6)/(n+0.01)+Math.sin(i*3)*12, ty=cy+h/2-32+Math.cos(i*2)*9;
    for(let j=0;j<3;j++){
      const sx=tx+(j-1)*9, sy=ty+(j%2)*5;
      ctx.beginPath();ctx.arc(sx,sy-3,5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(sx-4,sy);ctx.lineTo(sx,sy-6);ctx.lineTo(sx+4,sy);ctx.closePath();ctx.fill();
    }
  }
}

// Location node
function node(x,y,r,color,name,chap,main,time){
  const pr=r*2.8+Math.sin(time/50+x*0.015)*2.5;
  const hg=ctx.createRadialGradient(x,y,r*0.2,x,y,pr);
  hg.addColorStop(0,rgba(color,0.22));hg.addColorStop(1,"transparent");
  ctx.beginPath();ctx.arc(x,y,pr,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
  
  const cg=ctx.createRadialGradient(x-r*0.2,y-r*0.2,0,x,y,r);
  cg.addColorStop(0,"#fff");cg.addColorStop(0.3,color);cg.addColorStop(1,"#0b0e14");
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  
  if(main){
    const or=r+5+Math.sin(time/45+x*0.02)*2;
    ctx.beginPath();ctx.arc(x,y,or,0,Math.PI*2);ctx.strokeStyle=rgba(color,0.28);ctx.lineWidth=0.7;ctx.stroke();
  }
  
  const fs=main?16:(name.length>4?13:12);
  ctx.fillStyle="#c8c0b0";ctx.font=fs+'px "Noto Serif SC"';ctx.textAlign="center";
  ctx.fillText(name,x,y+r+fs*0.7+7);
  if(chap){ctx.fillStyle="#5a5240";ctx.font='10px "JetBrains Mono"';ctx.fillText(chap,x,y+r+fs*0.7+21)}
}

function conn(x1,y1,x2,y2,color){
  ctx.beginPath();ctx.moveTo(x1,y1+7);ctx.lineTo(x2,y2-6);
  ctx.strokeStyle=rgba(color,0.12);ctx.lineWidth=0.7;ctx.setLineDash([3,7]);ctx.stroke();ctx.setLineDash([]);
}

// ── Render ──
let animT=0;
function render(time=0){
  ctx.save();
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  
  // Background grid
  ctx.strokeStyle="rgba(200,190,170,0.015)";ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  
  ctx.translate(vx,vy);ctx.scale(vs,vs);
  
  realms.forEach(r=>{
    coast(r.cx,r.cy,r.w,r.h,r.layer.color);
    mountains(r.cx,r.cy,r.w,r.h,r.layer.color);
    trees(r.cx,r.cy,r.w,r.h,r.layer.color);
    
    r.layer.locations.forEach(loc=>territory(loc,r.layer.color));
    r.layer.locations.forEach(loc=>{
      if(loc.children)loc.children.forEach(ch=>conn(loc._x,loc._y,ch._x,ch._y,r.layer.color));
    });
    r.layer.locations.forEach(loc=>{
      const hk=loc.children&&loc.children.length>0;
      node(loc._x,loc._y,hk?9:6,r.layer.color,loc.name,loc.chapter,true,time);
      if(loc.children)loc.children.forEach(ch=>node(ch._x,ch._y,4,r.layer.color,ch.name,ch.chapter,false,time));
    });
  });
  
  ctx.restore();
}

function animate(ts){animT=ts;render(ts);requestAnimationFrame(animate)}
requestAnimationFrame(animate);

// ── Tooltip ──
const tt=document.getElementById("tooltip");
canvas.addEventListener("mousemove",e=>{
  if(drag)return;
  const mx=(e.offsetX-vx)/vs, my=(e.offsetY-vy)/vs;
  let found=null;
  realms.forEach(r=>{
    r.layer.locations.forEach(loc=>{
      if(Math.hypot(mx-loc._x,my-loc._y)<20)found=loc;
      if(loc.children)loc.children.forEach(ch=>{if(Math.hypot(mx-ch._x,my-ch._y)<15)found=ch});
    });
  });
  if(found){
    tt.style.opacity="1";tt.style.left=(e.pageX+20)+"px";tt.style.top=(e.pageY-30)+"px";
    tt.innerHTML=`<div class="tt-name">${found.name}</div><div class="tt-meta">${found.type||'location'} · ${found.chapter||''}</div><div class="tt-desc">${found.desc||''}</div>`;
    canvas.style.cursor="pointer";
  }else{tt.style.opacity="0";canvas.style.cursor="grab"}
});

// ── Legend ──
(function(){
  const bar=document.getElementById("legendBar");
  layers.forEach(l=>{
    const d=document.createElement("div");d.className="legend-item";
    d.innerHTML=`<span class="legend-dot" style="background:${l.color}"></span>${l.name}`;
    bar.appendChild(d);
  });
})();

let rt;window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(resize,300)});
</script>
</body>
</html>
