# 书籍宪法 — [书名]（草案）

> 从已有正文逆向提取的"不可违反的规则"。
> 提取依据：全本事件日志 + L1 提取结果
>
> ⚠️ 此文件只放永远不变的约束，不放状态（状态在事件日志/角色状态文件里）。
> ⚠️ 用户确认后方可生效。

meta:
  name: "[书名]"
  type: "continuation"
  source_chapters: N  # 提取自[N]章正文
  created_at: "YYYY-MM-DD"

# ============================================================
# 一、世界铁律
# ============================================================

# 正文中持续存在且从未被打破的世界规则
world_laws:
  - "正文从未违反的物理/魔法法则1"
  - "正文中某个势力的恒定行为模式"
  # ...

# ============================================================
# 二、主角红线
# ============================================================

protagonist:
  # 正文中主角始终会做的事
  always_does:
    - "行为1"
    - "行为2"
  
  # 正文中主角始终不会做的事
  never_does:
    - "行为1"
    - "行为2"

# ============================================================
# 三、叙事禁忌
# ============================================================

# 正文中从未使用过、或使用后导致质量下降的写法
narrative_taboos:
  - "正文从不使用的句式/结构"
  - "已被验证会破坏文风的写法"

# ============================================================
# 四、不可逆决策记录
# ============================================================

# 正文中已经发生的、永久改变了故事走向的事件
irreversible_decisions:
  - id: "DEC-001"
    chapter: chXX
    event: "[事件描述]"
    impact: "[对后续的永久影响]"
  
  - id: "DEC-002"
    chapter: chXX
    event: "[事件描述]"
    impact: "[对后续的永久影响]"
