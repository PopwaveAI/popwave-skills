# ============================================================
# Story Engine — 核心假说
# 填充说明：基于前 10-20 章精读填写。这是全书最核心的假设，
# 回答"这本书到底在讲什么"。
# ============================================================

title: "{{书名}}"
author: "{{作者}}"

core_hypothesis: |
  <!-- 一句话说清楚这本书的核心机制和叙事驱动力。
       格式参考：一个[身份]的[主角]，因为[事件/动机]，被迫/主动[行动]，
       过程中[核心冲突]。
       可从 Lv1-拆解摘要.md 的一句话核心复制过来。 -->
  {{核心假说}}

genre: {{赛道标签}}

protagonist_drive:
  # 初始驱力 — 角色最初为什么行动？（表层动机）
  initial: "{{初始驱力}}"
  # 深层驱力 — 角色真正想要什么？（如果前 10 章未显露则留空）
  deep: "{{深层驱力}}"

reading_level:
  # 核心卖点 1 — 读者能从这本书中获得什么体验？
  - "{{核心卖点1}}"
  # 核心卖点 2 — 区别于同类作品的独特吸引力？
  - "{{核心卖点2}}"
