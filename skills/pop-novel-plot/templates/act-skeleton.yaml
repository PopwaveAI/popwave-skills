# act-XX.yaml — 幕纲 YAML 骨架

> 产出路径: `设计/幕/vol-XX/act-YY.yaml`
> 管线: pop-novel-plot v6.3 · Step 2
> 消费: pop-novel-chapter-design
>
> 用法: 直接填充即可。剧情线定义在卷级 `设计/卷/volume-XX.md §四`（已用户确认），act 不做重定义。
> 每章一个自包含 block——Canvas 数据 + 设计意图合在一起，design agent 一次性读完。
> 设计方法论参考: `references/payoff-design-guide.md`（爽点） / `templates/act-guide.md`（字段计算）

---

```yaml
_meta:
  version: "v6.3"
  volume_ref: "设计/卷/volume-XX.md"   # ← 卷级背景文件
  act_number: N                         # 本幕在第几幕（1-based）
  chapter_range: [chXXX, chXXX]        # 本幕的章节范围

act:
  # ─── 幕级目的 ─────────────────────────────────────────────────
  purpose:
    for_book: ""       # 本幕在全书中的叙事作用（串联卷初→卷中？角色从X→Y？打开新空间？）
    for_reader: ""     # 本幕给读者的满足：核心情绪 / 悬念节奏 / 爽点密度预期

  # ─── 本幕冲突 ─────────────────────────────────────────────────
  conflict:
    stakes: ""         # 本幕输 = 失去什么
    escalation: ""     # ch1 → chN 冲突如何升级

# ═══════════════════════════════════════════════════════════════
# 章节 Blocks（★ 每章一个自包含 block：Canvas 数据 + 设计意图）
#
# payoff_level: 空=铺垫 | 小=干脆斩杀/升级/打脸 | 中=可感知释放 | 大=爆发·格局重画 | 特大=全卷承诺兑现
# D 线=设定穿透（非叙事弧——控制每章向读者披露多少世界观/等级/设定信息）
# D_load: 0=本章无新设定 | 1=适量披露 | 2=过载警告（≥2 个新概念）
# 剧情线来自 volume-XX.md §四
# ═══════════════════════════════════════════════════════════════

chapters:

  # ══════════════════════════════════════════════════════════
  # 章节 1
  # ══════════════════════════════════════════════════════════
  - ch: 1
    title: ""
    word_count: 2500

    # ─ Canvas 行（plot 逐线标注） ─
    canvas:
      payoff_summary: 0    # ≥中 的线数。0 → design 自行制造中爽点
      D: ""                 # 设定穿透——本章向读者披露了什么世界观/设定/分级
      D_load: 0             # 0=无新设定 | 1=适量 | ≥2=过载警告
      M1: ""                # 世界危机线——本章推进了什么
      M1_payoff: ""         # 空|小|中|大|特大
      M2: ""                # 主角成长线——本章推进了什么
      M2_payoff: ""
      M3: ""                # 主角行动线（应对 M1 的行动轨迹）——本章推进了什么
      M3_payoff: ""
      S1: ""                # 任意支线（从 volume-XX.md §四 S1 定义，非预设类型）
      S1_payoff: ""
      S2: ""                # 任意支线（从 volume-XX.md §四 S2 定义，非预设类型）
      S2_payoff: ""
      note: ""              # 节奏笔记（如"双线并行""蓄力章""D线有披露"）

    # ─ 设计意图（plot 传给 design 的方向） ─
    emotional_goal: ""       # 本章情感方向。design 据此设计事件弧线
    payoff_note: ""          # 中/大/特大时填：蓄力上下文
    end_hook:                # plot 给钩子方向，design 设计具体事件
      type: ""               # 悬念|信息|情绪
      drive: ""              # 驱动因素（如"XX的生死未卜"）
    chekhov_set: []          # 本章埋的契诃夫枪
    chekhov_fire: []         # 本章回收的契诃夫枪

  # ══════════════════════════════════════════════════════════
  # 章节 2
  # ══════════════════════════════════════════════════════════
  - ch: 2
    title: ""
    word_count: 2500
    canvas:
      payoff_summary: 0
      D: ""
      D_load: 0
      M1: ""
      M1_payoff: ""
      M2: ""
      M2_payoff: ""
      M3: ""
      M3_payoff: ""
      S1: ""
      S1_payoff: ""
      S2: ""
      S2_payoff: ""
      note: ""
    emotional_goal: ""
    payoff_note: ""
    end_hook:
      type: ""
      drive: ""
    chekhov_set: []
    chekhov_fire: []

  # ... 每章一个 block，直到本幕结束

# ═══════════════════════════════════════════════════════════════
# 节奏自检（★ 全部章节填完后执行。agent 全量扫描 chapters[] 自检）
# ═══════════════════════════════════════════════════════════════

rhythm_check:
  plotlines: [M1, M2, M3, D, S1, S2]   # D 始终在 Canvas 中

  per_line_gaps:               # 每条线的最大连续留白章数
    - line: "M1"
      max_gap: 3
      actual_gap: ""           # 由 agent 填入
    - line: "M2"
      max_gap: 2
      actual_gap: ""
    - line: "M3"
      max_gap: 2
      actual_gap: ""

  line_density:                # 每章活跃线数（D_load=0 时不参与计数）
    min: 1                     # 最低不能少于 1 条线推进
    max: 3                     # 最高不能超过 3 条（信息过载）
    actual_range: ""           # 由 agent 填入

  payoff_constraints:          # ★ 爽点密度 / 节奏约束
    mid_every_chapter: true          # 每章 ≥1 线 payoff≥中
    no_line_dormant_over_3: true     # 无线连续 ≥3 章只铺垫无释放
    big_max_gap: 5                   # 大爽点间隔上限
    ultimate_min_per_volume: 1       # 每卷 ≥1 特大

  disclosure:                  # ★ 设定穿透（D 线）自检
    max_consecutive_zero_load: 2     # 允许连续最多几章 D_load=0
    consecutive_zero: ""             # agent 填入实际值
    d_load_overage: []               # D_load≥2 的章列表
    per_info_deadlines:              # 从 volume-XX.md §五 D-设定披露承诺 提取
      - info: ""
        deadline: ""

  # ─── 首卷黄金窗口（★ 仅 vol-01/act-01 执行） ─────
  first_volume_gate:
    applicable:
    ch01_core_hook_present:    # 第1章章末钩子？(required: true)
    ch01_selling_point:        # 核心卖点亮相？(required: ch ≤ 1)
    ch02_first_conflict:       # 战斗/重大矛盾？(required: ch ≤ 2)
    pure_setup_max:            # 最大连续纯铺垫章 (required: ≤ 1)
```
