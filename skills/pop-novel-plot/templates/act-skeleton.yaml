# act-XX.yaml — 幕纲 YAML 骨架

> 产出路径: `设计/幕/vol-XX/act-YY.yaml`
> 管线: pop-novel-plot v6.1 · Step 2
> 消费: pop-novel-chapter-design（章级切片驱动）
>
> 用法: 直接填充即可。卷级信息（人物/地图/剧情线/势力动机）见 `设计/卷/volume-XX.md`。
> 复杂字段计算方式见 `templates/act-guide.md`。

---

```yaml
_meta:
  version: "v6.0"
  volume_ref: "设计/卷/volume-XX.md"   # ← 卷级背景文件
  act_number: N                         # 本幕在第几幕（1-based）
  chapter_range: [chXXX, chXXX]        # 本幕的章节范围

act:
  # ─── 幕级定义 ────────────────────────────────────────
  core_conflict:
    description: ""               # A vs B，本幕核心对抗
    stakes: ""                    # 本幕输 = 失去什么
    escalation_path: ""           # 本幕内第1章到最后一章如何升级

  # ─── 信息释放计划（★ v6.0 新增，替代独立 info-release-XX.md） ────
  info_release_plan:
    p0_must_release: []           # P0：不理解就看不懂剧情的信息点列表
    p1_recommended: []            # P1：拓展体验的信息点列表
    density_check:
      ch1_new_concepts_max: 2     # 第1章新概念上限
      no_two_consecutive_zero: true  # 禁止连续两章零信息释放

  goal: ""                        # "读者从「X」到「Y」"

  tone_note: ""                   # 1-3句散文，本幕的情绪配比

  # ─── 爽点分布（本幕内） ──────────────────────────────
  # 完整定义 → templates/payoff-guide.md
  # plot 负责: 大爽点位置 + 终极爽点位置（填入 positions 数组）
  # plot 声明: 中爽点密度（每章≥1，具体事件归 chapter-design）
  # plot 不负责: 微爽点（归 prose-render）
  payoff_distribution:
    微爽点:
      density: "每章 ≥ 5个"         # 短目标/小反转/信息碎片/微表情/环境细节
    中爽点:
      density: "每章 ≥ 1个"         # 可感知的情节推进或情绪转折
      positions: []               # 中爽点的章号，如 [5, 10]
    大爽点:
      max_gap: 5                   # 间隔不超过5章
      positions: []               # 如 [15, 23]
    终极爽点:
      min_count: 2                 # 一幕至少2个（幕中最大高潮 + 幕末收束）
      positions: []               # 如 [12, 30]

  # ─── 本幕情绪弧线 ────────────────────────────────────
  emotional_arc:
    overview: ""                  # "起点情绪 → 中间情绪 → 终点情绪"
    checkpoints:
      - chapter: 1
        emotion: ""
        intensity: 0              # 1-10
        hook: ""
      - chapter: 5                # 第二个转折点
        emotion: ""
        intensity: 0
        hook: ""

# ─── Canvas 矩阵（★ v6.0 新增） ──────────────────────
# 章节行 × 剧情线列 交叉表。用于一次性看清本幕节奏密度。
# 填写原则：每章条目写明本条线在本章推进了什么，空 = 该章这条线不推进。

canvas:
  plotlines: [M1, M2, M3, S1, S2]   # 本幕涉及哪几条线（对应 volume-XX.md §四 的线 id）

  entries:            # 每条 = 一章范围内各线的事件摘要
    - ch: 1
      title: ""
      M1: ""           # 世界危机线——本章推进了什么
      M2: ""           # 主角成长线——本章推进了什么
      M3: ""           # 外部剧情线——本章推进了什么
      S1: ""           # 羁绊/情感线——本章推进了什么
      S2: ""           # 世界真相线——本章推进了什么
      note: ""         # 节奏笔记（如"双线并行"、"唯一线"）
    - ch: 2
      title: ""
      M1: ""
      M2: ""
      M3: ""
      S1: ""
      S2: ""
      note: ""
    # ... 每章一条，直到本幕结束

  # ─── 节奏检查摘要（★ 自检用） ─────────────────────
  rhythm_check:
    per_line_gaps:               # 每条线的最大连续空白章数
      - line: "M1"
        max_gap: 3
        actual_gap:              # 由 agent 填入
        note: ""
      - line: "M2"
        max_gap: 2
        actual_gap: ""
        note: ""
      - line: "M3"
        max_gap: 2
        actual_gap: ""
        note: ""
    overall_density:             # 每章活跃线数
      min: 1                     # 最低不能少于1条线推进
      max: 3                     # 最高不能超过3条（信息过载）
      actual_range: ""           # 由 agent 填入

    # ─── 首卷黄金窗口（★ 仅 vol-01/act-01 执行） ─────
    # 番茄标准：ch01 卖点亮相 + 章末钩子 / ch02 第一次战斗或重大矛盾
    first_volume_gate:
      applicable:                # 卷1幕1时才执行此检查
      ch01_core_hook_present:    # 第1章是否有可感知的章末钩子？(required: true)
      ch01_selling_point:        # 核心卖点在哪章亮相？(required: ch <= 1)
      ch02_first_conflict:       # 第一次战斗/重大矛盾在哪章？(required: ch <= 2)
      pure_setup_max:            # 前2章最大连续纯铺垫章数 (required: <= 1)

# ─── 章节切片 ──────────────────────────────────────
chapters:

  # ════════════════════════════════════════════════════
  # 章节 1
  # ════════════════════════════════════════════════════
  - ch: 1
    title: ""
    word_count: 2500

    emotional_goal: ""
    payoff:
      type: ""                    # 微|中|大|终极
      trigger: ""
      reader_feeling: ""
    reader_emotion_path: ["", "", ""]

    end_hook:
      type: ""                    # 悬念|信息|情绪
      drive: ""
      content: ""

    plotlines_active: []          # 推进了哪些线（line id 对应 volume-XX.md §四）
    chekhov_set: []
    chekhov_fire: []

    info_release:
      - item_id: ""
        title: ""
        source_doc: ""
        release_method: ""        # 实战展示|角色对话|叙事者说明|探索发现
        density: ""
        priority: ""              # P0|P1
        chapter_context: ""

    characters_active: []         # 登场角色名（必须在 volume-XX.md §三 中存在）
    locations: []                 # 发生地点名（必须在 volume-XX.md §三 中存在）

    # ★ 非必填场景规格（按场景类型选填）：
    # combat:         # battle|dialogue|discovery|crisis 见 act-guide.md
    # dialogue:       # ...
    # discovery:      # ...
    # crisis:         # ...

  # ════════════════════════════════════════════════════
  # 章节 2
  # ════════════════════════════════════════════════════
  - ch: 2
    title: ""
    word_count: 2500
    emotional_goal: ""
    payoff:
      type: ""
      trigger: ""
      reader_feeling: ""
    reader_emotion_path: ["", "", ""]
    end_hook:
      type: ""
      drive: ""
      content: ""
    plotlines_active: []
    chekhov_set: []
    chekhov_fire: []
    info_release: []
    characters_active: []
    locations: []
```
