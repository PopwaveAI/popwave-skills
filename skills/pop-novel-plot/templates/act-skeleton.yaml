# act-XX.yaml — 幕纲 YAML 骨架

> 产出路径: `设计/幕/vol-XX/act-YY.yaml`
> 管线: pop-novel-plot v6.2 · Step 2
> 消费: pop-novel-chapter-design
>
> 用法: 直接填充即可。剧情线定义在卷级 `设计/卷/volume-XX.md §四`（已用户确认），act 不做重定义。
> 设计方法论参考: `references/payoff-design-guide.md`（爽点） / `templates/act-guide.md`（字段计算）

---

```yaml
_meta:
  version: "v6.2"
  volume_ref: "设计/卷/volume-XX.md"   # ← 卷级背景文件
  act_number: N                         # 本幕在第几幕（1-based）
  chapter_range: [chXXX, chXXX]        # 本幕的章节范围

act:
  # ─── 幕级目的 ────────────────────────────────────────
  purpose:
    for_book: ""       # 本幕在全书中的叙事作用（串联卷初→卷中？角色从X→Y？打开新空间？）
    for_reader: ""     # 本幕给读者的满足：核心情绪 / 悬念节奏 / 爽点密度预期

  # ─── 本幕冲突 ────────────────────────────────────────
  conflict:
    stakes: ""         # 本幕输 = 失去什么
    escalation: ""     # ch1 → chN 冲突如何升级

# ─── Canvas 矩阵（★ 本文档核心，章节行 × 剧情线列） ──────
# 一次性看清本幕：节奏密度 + 爽点分布 + 各线联动。
# 剧情线来自 volume-XX.md §四（卷级已确认，act 不重定义）。
# payoff_level: 空=铺垫 | 小=干脆斩杀/升级/打脸 | 中=可感知释放 | 大=爆发·格局重画 | 特大=全卷承诺兑现

canvas:
  plotlines: [M1, M2, M3, S1, S2]   # 对应 volume-XX.md §四 的线 id

  entries:            # 每条 = 一章范围内各线的事件摘要 + payoff + 负荷标记
    - ch: 1
      title: ""
      payoff_summary: 0    # ≥中 的线数。0 → chapter-design 自行制造中爽点
      M1: ""               # 世界危机线——本章推进了什么
      M1_payoff: ""        # 空|小|中|大|特大
      M2: ""               # 主角成长线——本章推进了什么
      M2_payoff: ""        
      M3: ""               # 外部剧情线——本章推进了什么
      M3_payoff: ""
      S1: ""               # 羁绊/情感线——本章推进了什么
      S1_payoff: ""
      S2: ""               # 世界真相线——本章推进了什么
      S2_payoff: ""
      note: ""             # 节奏笔记（如"双线并行""蓄力章"）
    - ch: 2
      title: ""
      payoff_summary: 0
      M1: ""
      M1_payoff: ""
      M2: ""
      M2_payoff: ""
      M3: ""
      M3_payoff: ""
      S1: ""
      S1_payoff: ""
      S2: ""
      S2_payoff: ""
      note: ""
    # ... 每章一条，直到本幕结束

  # ─── 节奏自检（★ Canvas 填完后扫描） ──────────────────
  rhythm_check:
    per_line_gaps:               # 每条线的最大连续留白章数
      - line: "M1"
        max_gap: 3
        actual_gap: ""           # 由 agent 填入
      - line: "M2"
        max_gap: 2
        actual_gap: ""
      - line: "M3"
        max_gap: 2
        actual_gap: ""
    line_density:                # 每章活跃线数
      min: 1                     # 最低不能少于 1 条线推进
      max: 3                     # 最高不能超过 3 条（信息过载）
      actual_range: ""           # 由 agent 填入
    payoff_constraints:          # ★ 爽点密度 / 节奏约束
      mid_every_chapter: true          # 每章 ≥1 线 payoff≥中
      no_line_dormant_over_3: true     # 无线连续 ≥3 章只铺垫无释放
      big_max_gap: 5                   # 大爽点间隔上限
      ultimate_min_per_volume: 1       # 每卷 ≥1 特大

    # ─── 首卷黄金窗口（★ 仅 vol-01/act-01 执行） ─────
    first_volume_gate:
      applicable:                # 卷1幕1才执行此检查
      ch01_core_hook_present:    # 第1章章末钩子？(required: true)
      ch01_selling_point:        # 核心卖点亮相？(required: ch ≤ 1)
      ch02_first_conflict:       # 战鬥/重大矛盾？(required: ch ≤ 2)
      pure_setup_max:            # 最大连续纯铺垫章 (required: ≤ 1)

# ─── 章级设计意图（★ 传给 chapter-design，不强加事件细节） ──
chapters:
  - ch: 1
    title: ""
    word_count: 2500
    emotional_goal: ""       # plot 给的情感方向。design 据此设计事件弧线
    payoff_note: ""          # 大/特大时必填：蓄力上下文。如"M1线ch5-7蓄力，本章幕级爆发"
    end_hook:                # plot 给钩子方向，design 设计具体事件
      type: ""               # 悬念|信息|情绪
      drive: ""              # 驱动因素（如"XX的生死未卜"）
    chekhov_set: []          # 本章埋的契诃夫枪
    chekhov_fire: []         # 本章回收的契诃夫枪
  - ch: 2
    title: ""
    word_count: 2500
    emotional_goal: ""
    payoff_note: ""
    end_hook:
      type: ""
      drive: ""
    chekhov_set: []
    chekhov_fire: []
  # ... 每章一条
```
