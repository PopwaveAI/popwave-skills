# act-XX.yaml — 幕纲 YAML 骨架

> 产出路径: `设计/幕/act-XX.yaml`
> 管线: pop-novel-plot v5.0 · Step 5
> 消费: pop-novel-chapter-design（章级切片驱动）
>
> 用法: 直接填充即可。卷级信息（人物/地图/剧情线）见 `设计/卷/volume-XX.md`。
> 复杂字段计算方式见 `templates/act-guide.md`。

---

```yaml
_meta:
  version: "v5.0"
  volume_ref: "设计/卷/volume-XX.md"   # ← 卷级 Canvas 文件，此幕的上游
  act_number: N                         # 本幕在第几幕（1-based）
  chapter_range: [chXXX, chXXX]        # 本幕的章节范围

act:
  # ─── 幕级定义 ────────────────────────────────────────
  core_conflict:
    description: ""               # A vs B，本幕核心对抗
    stakes: ""                    # 本幕输 = 失去什么
    escalation_path: ""           # 本幕内第1章到最后一章如何升级

  goal: ""                        # "读者从「X」到「Y」"

  tone_note: ""                   # 1-3句散文，本幕的情绪配比

  # ─── 爽点分布（本幕内） ──────────────────────────────
  payoff_distribution:
    微爽点:
      frequency: "每章1-2个"
    中爽点:
      ratio: "4:1"
      positions: []               # 中爽点的章号，如 [5, 10]
    大爽点:
      ratio: "8-10:1"
      positions: []               # 如 [15]
    终极爽点:
      ratio: "20:1"
      positions: []               # 幕末章号

  # ─── 本幕情绪弧线 ────────────────────────────────────
  emotional_arc:
    overview: ""                  # "起点情绪 → 中间情绪 → 终点情绪"
    checkpoints:
      - chapter: 1
        emotion: ""
        intensity: 0              # 1-10
        hook: ""
      - chapter: 5                # 第二个转折点
        emotion: ""
        intensity: 0
        hook: ""

# ─── 章节切片 ──────────────────────────────────────
chapters:

  # ════════════════════════════════════════════════════
  # 章节 1
  # ════════════════════════════════════════════════════
  - ch: 1
    title: ""
    word_count: 2500

    emotional_goal: ""
    payoff:
      type: ""                    # 微|中|大|终极
      trigger: ""
      reader_feeling: ""
    reader_emotion_path: ["", "", ""]

    end_hook:
      type: ""                    # 悬念|信息|情绪
      drive: ""
      content: ""

    plotlines_active: []          # 推进了哪些线（line id 对应 volume-XX.md §四）
    chekhov_set: []
    chekhov_fire: []

    milestone_active: ""          # MK 编号
    milestone_progress: ""        # start|mid|complete

    info_release:
      - item_id: ""
        title: ""
        source_doc: ""
        release_method: ""        # 实战展示|角色对话|叙事者说明|探索发现
        density: ""
        priority: ""              # P0|P1
        chapter_context: ""

    characters_active: []         # 登场角色名（必须在 volume-XX.md §三 中存在）
    locations: []                 # 发生地点名（必须在 volume-XX.md §三 中存在）

    # ★ 非必填场景规格（按场景类型选填）：
    # combat:         # battle|dialogue|discovery|crisis 见 act-guide.md
    # dialogue:       # ...
    # discovery:      # ...
    # crisis:         # ...

  # ════════════════════════════════════════════════════
  # 章节 2
  # ════════════════════════════════════════════════════
  - ch: 2
    title: ""
    word_count: 2500
    emotional_goal: ""
    payoff:
      type: ""
      trigger: ""
      reader_feeling: ""
    reader_emotion_path: ["", "", ""]
    end_hook:
      type: ""
      drive: ""
      content: ""
    plotlines_active: []
    chekhov_set: []
    chekhov_fire: []
    milestone_active: ""
    milestone_progress: ""
    info_release: []
    characters_active: []
    locations: []
```

> 注意：act-end-state / equipment-flow / plotlines 定义已移至 volume-XX.md。
> 此文件只包含**幕级定义 + 章级切片**。