<script>
// ========== 数据 ==========
/* INJECT:DATA */
const data = {"novel": "千屿", "author": "白羽摘雕弓", "central_concept": "《诛魔》书中世界", "description": "一个上古天崩地陷、灵气倾泻人间的仙侠世界。四大仙门镇守四方，凡人挣扎于魔物侵扰之中。而世界本身是一本书——有人手握剧本，有人逆天改命。", "nodes": [{"id": "世界本源", "layer": 0, "type": "世界观核心", "desc": "上古天崩地陷，灵气沿裂口倾泻人间，从此有了灵山灵水、修士与魔。整个世界本身是一部名为《诛魔》的书。", "isCentral": true}, {"id": "灵气体系", "layer": 1, "type": "天道规则", "desc": "灵气浓度越高的地方时间流逝越慢。仙门一日≈凡间五日。四大仙门坐落于灵气最充沛之地，凡间只有零星灵池灵田。", "parent": "世界本源"}, {"id": "因果气运", "layer": 1, "type": "天道规则", "desc": "锦鲤命格：天命之女，躺着也能变强，对她好的人一并幸运，与她作对的人终生倒霉。对照组：专门衬托主角的倒霉蛋。", "parent": "世界本源"}, {"id": "世界重置", "layer": 1, "type": "天道规则", "desc": "故事失败后从头再来。所有人回到出场位置、相逢之前。但二周目出现了偏差：徐千屿未在五年前拜入蓬莱，滞留人间长成了大小姐。", "parent": "世界本源"}, {"id": "系统机制", "layer": 1, "type": "天道规则", "desc": "神秘存在，能与宿主脑内沟通。管理爽度数值、技能兑换、好感度面板。技能可进化/退化，长期不用会失去。锦鲤商城可用爽度兑换道具。", "parent": "世界本源"}, {"id": "修炼境界", "layer": 2, "type": "修炼体系", "desc": "炼气（引气入体、小周天）→ 筑基 → 元君 → 道君 → 飞升成仙。道君已是不死不灭，世上未有一人登仙。", "parent": "灵气体系"}, {"id": "灵根", "layer": 2, "type": "修炼体系", "desc": "修士根基，决定修炼属性和上限。常见：雷灵根、风灵根、水灵根。稀有：混沌灵根、风雷双灵根。无灵根者不可修炼——但天雷可劈开灵根。", "parent": "修炼境界"}, {"id": "剑修", "layer": 2, "type": "修炼路径", "desc": "以剑入道。需寻本命剑，人剑合一。剑可养出剑灵（上古灵剑才有）。剑风因人而异：君子剑法（沈溯微）、带煞诡谲（千屿被谢妄真指点后）。", "parent": "修炼境界"}, {"id": "药修", "layer": 2, "type": "修炼路径", "desc": "以药入道，炼丹、医术、毒术。可培育灵草，治愈妖毒。", "parent": "修炼境界"}, {"id": "符修", "layer": 2, "type": "修炼路径", "desc": "以符入道。可用符纸攻击、防御、传信（信蝶）。戒律堂花青伞即为符修出身。", "parent": "修炼境界"}, {"id": "法修/器修/体修", "layer": 2, "type": "修炼路径", "desc": "法修：以术法入道。器修：以炼器入道。体修：锤炼肉身，以力证道。", "parent": "修炼境界"}, {"id": "本命剑与剑灵", "layer": 3, "type": "修炼细节", "desc": "本命剑与剑君心意相通，片刻不离。上古灵剑可养出剑灵，人剑心意相通。师尊徐冰来的剑和陆呦的伏龙都有剑灵。", "parent": "剑修"}, {"id": "四大仙门", "layer": 2, "type": "势力格局", "desc": "蓬莱、灵越、天山、潜龙，分踞大陆四陲。灵气充沛，每年从凡间遴选有灵根幼童上山。", "parent": "世界本源"}, {"id": "蓬莱仙宗", "layer": 3, "type": "势力-仙门", "desc": "四大仙门中的后起小派，靠血脉姻亲紧密相连。坐落海岛。掌门徐冰来，太上长老为其丈人。内部：内门弟子→戒律堂→长老→太上长老→掌门。", "parent": "四大仙门"}, {"id": "灵越仙宗", "layer": 3, "type": "势力-仙门", "desc": "四大仙门之一。陆呦最初所在的宗门。有灵田培育良种，亦有面馆客栈等凡间附属。", "parent": "四大仙门"}, {"id": "凡间世界", "layer": 2, "type": "势力格局", "desc": "九州大陆，凡人聚居之地。南陵（水家所在）、江南、各地城池。凡人受魔物侵扰，依赖仙门出秋猎魔或购买伏魔宝剑自保。", "parent": "世界本源"}, {"id": "魔界势力", "layer": 2, "type": "势力格局", "desc": "低阶魔物无意识，高阶魔物有心智如孩童。魔王：怨气结胎、吞噬万物魔气而生，有灵智善伪装。妖域：精怪聚居地。", "parent": "世界本源"}, {"id": "魔骨", "layer": 3, "type": "关键道具", "desc": "魔王的一块尾骨，内里存留着魔王的全部修为。谢妄真最初由此骨所生发。失去魔骨则魔力只剩一成。蓬莱将其保存在流英阁（实为赝品诱饵，真品由沈溯微保管）。", "parent": "魔界势力"}, {"id": "冰匙与天梯", "layer": 3, "type": "关键道具", "desc": "冰匙：天梯的碎片，散落九州大陆各处。集齐后可打开通天之门，令灵气播撒下界，修士可飞升成仙。出春即为搜寻冰匙。", "parent": "灵气体系"}, {"id": "溯光镜", "layer": 3, "type": "关键道具", "desc": "锦鲤商城兑换的道具，可窥视远方任意地点。陆呦用以监视徐千屿在蓬莱的进度。", "parent": "系统机制"}, {"id": "芥子金珠与信蝶", "layer": 3, "type": "关键道具", "desc": "芥子金珠：储物法器，可容纳活人但只能承托凡人。信蝶：符纸所化的金色蝴蝶，传信工具。", "parent": "符修"}, {"id": "出春", "layer": 3, "type": "关键活动", "desc": "每年春天各仙宗选拔弟子组队，往九州大陆各处搜寻冰匙。", "parent": "冰匙与天梯"}, {"id": "出秋", "layer": 3, "type": "关键活动", "desc": "一年数次，前往凡间猎魔消灾。两三个弟子搭伙即可，遇到大魔则需十余人。", "parent": "魔界势力"}, {"id": "弟子大会", "layer": 3, "type": "关键活动", "desc": "每年各派齐聚一堂，少年英才较量斗法。参赛弟子按律不能出观战席。", "parent": "四大仙门"}, {"id": "仙门遴选", "layer": 3, "type": "关键活动", "desc": "四大仙门每年从凡间择有灵根幼童上山，五岁为佳，七岁尚可，九岁已是极限。幼童如白纸便于塑形教养。", "parent": "四大仙门"}, {"id": "徐千屿", "layer": 4, "type": "关键人物", "desc": "女主。虚岁十四。雷灵根。南陵首富水家大小姐，蓬莱掌门徐冰来与水微微之女。额心朱砂（莲子连心咒）。前世盗魔骨救谢妄真反被杀，今世带着前世记忆重生。", "parent": "蓬莱仙宗"}, {"id": "沈溯微", "layer": 4, "type": "关键人物", "desc": "蓬莱内门三师兄，外姓弟子。水灵根，剑风化冰雪。本命剑苍阙（铁剑，锈迹斑斑）。未来修成道君，尊号'灵溯'。为人清冷克制，处处留有分寸，但杀人之时会凝神注视甚至微笑。", "parent": "蓬莱仙宗"}, {"id": "陆呦", "layer": 4, "type": "关键人物", "desc": "锦鲤女主。风雷双灵根。本命剑伏龙（有剑灵）。被灵越仙宗逐出后投奔蓬莱。身怀锦鲤命格：躺着也能变强，对她好的人一并幸运，与她作对的人终生倒霉。前世成为白裳仙子，嫁给魔王谢妄真为后。", "parent": "灵越仙宗"}, {"id": "谢妄真", "layer": 4, "type": "关键人物", "desc": "魔王。无妄崖怨气结胎所生。魔魂被蓬莱无真师叔打散为三块：黑兔→幻术师小乙→无真皮囊。战力天花板。善伪装，心智如人但缺乏善恶观。对陆呦好感度停在99%。", "parent": "魔界势力"}, {"id": "徐冰来", "layer": 4, "type": "关键人物", "desc": "蓬莱仙宗掌门。徐千屿之父。赴宴遇刺时与水微微有了一段情。高傲，对千屿格外严厉。将陆呦收入门下，亲自为她挑选本命剑伏龙。", "parent": "蓬莱仙宗"}, {"id": "花青伞", "layer": 4, "type": "关键人物", "desc": "蓬莱戒律堂长老。以妖入道的骷髅，符修出身，元君修为。善寻踪追捕。外表骇人但说话妖娆，实则嘴硬心软——追到千屿时本不想杀她。", "parent": "蓬莱仙宗"}, {"id": "水如山", "layer": 4, "type": "关键人物", "desc": "徐千屿外祖父。南陵首富，一掷千金购伏魔宝剑护宅。对千屿纵容溺爱，'柔则易碎，刚则易折，你便随心地活着'。书房摆下笼中阵法意图阻止沈溯微带人。", "parent": "凡间世界"}, {"id": "水微微", "layer": 4, "type": "关键人物", "desc": "徐千屿生母。水如山独女。被徐冰来辜负后精神失常，被关在西厢房十余年。不认千屿为女儿，视她为狐媚子。唯一在关于徐冰来的事上不疯。", "parent": "凡间世界"}, {"id": "观娘", "layer": 4, "type": "关键人物", "desc": "千屿贴身丫鬟总领。秀外慧中，原是水如山红粉知己，自愿做千屿丫鬟。教千屿世间规矩但有所授有所不授。", "parent": "凡间世界"}, {"id": "败雪", "layer": 5, "type": "具体实例", "desc": "徐千屿前世的本命剑。细窄长剑，落入妖洞厮杀三天三夜拼死得来。徐冰来评价'不合你'。最终被谢妄真用此剑刺入千屿胸口。", "parent": "徐千屿"}, {"id": "苍阙", "layer": 5, "type": "具体实例", "desc": "沈溯微的本命剑。铁剑，出鞘呈锈迹斑斑的苍青色。越练越快，剑风越寒，化为御霜→操纵冰雪。除了千屿少有人知苍阙真面目。", "parent": "沈溯微"}, {"id": "伏龙", "layer": 5, "type": "具体实例", "desc": "陆呦的本命剑。通身雪白，上有凸起暗纹，白光顺纹路流动。有剑灵——银发金瞳少年，护主心切。徐冰来亲自挑选。", "parent": "陆呦"}, {"id": "袖中摇光", "layer": 5, "type": "具体实例", "desc": "沈溯微前世的本命剑。白玉作柄、金蛇缠绕，光芒闪耀。太过招摇，沈溯微认为于己无益，赠予水家悬于墙头镇宅。", "parent": "沈溯微"}, {"id": "莲子连心咒", "layer": 5, "type": "具体实例", "desc": "太上长老派人以轻红剑暗杀腹中千屿未遂，血落蛊生。随骨血生长如莲叶下丝缕根系蔓延，满十五年毒发心脏而亡。对修士可自行压制，对凡人灭顶之灾。", "parent": "徐千屿"}, {"id": "锦鲤命格", "layer": 5, "type": "具体实例", "desc": "陆呦的天命。逆衰转盛，躺着也能升级。技能可通过'爽度'兑换/进化/退化。对谁好谁幸运，对谁不好谁倒霉。", "parent": "陆呦"}, {"id": "魔魂三分", "layer": 5, "type": "具体实例", "desc": "谢妄真魔魂被打散为三块：黑兔（陪伴陆呦被逐出宗门）、幻术师小乙（街头杂耍艺人）、无真皮囊（蓬莱师叔体内）。三魂齐聚恢复魔王全力。", "parent": "谢妄真"}], "edges": [{"source": "世界本源", "target": "灵气体系", "type": "contains", "label": "天崩地陷→灵气倾泻"}, {"source": "世界本源", "target": "因果气运", "type": "governs", "label": "书中世界的底层规则"}, {"source": "世界本源", "target": "世界重置", "type": "governs", "label": "故事失败则从头再来"}, {"source": "世界本源", "target": "系统机制", "type": "contains", "label": "管理者/造物主"}, {"source": "世界本源", "target": "四大仙门", "type": "contains", "label": "灵气聚集之地"}, {"source": "世界本源", "target": "凡间世界", "type": "contains", "label": "凡人聚居"}, {"source": "世界本源", "target": "魔界势力", "type": "contains", "label": "魔物滋生"}, {"source": "灵气体系", "target": "修炼境界", "type": "basis_of", "label": "灵气是修炼根基"}, {"source": "因果气运", "target": "锦鲤命格", "type": "manifests_as", "label": "气运的极端体现"}, {"source": "世界重置", "target": "徐千屿", "type": "affects", "label": "二周目偏差→滞留人间"}, {"source": "系统机制", "target": "陆呦", "type": "serves", "label": "锦鲤商城/爽度面板"}, {"source": "修炼境界", "target": "灵根", "type": "requires", "label": "修炼之始在于灵根"}, {"source": "修炼境界", "target": "剑修", "type": "path_to", "label": "修炼路径"}, {"source": "修炼境界", "target": "药修", "type": "path_to", "label": "修炼路径"}, {"source": "修炼境界", "target": "符修", "type": "path_to", "label": "修炼路径"}, {"source": "修炼境界", "target": "法修/器修/体修", "type": "path_to", "label": "修炼路径"}, {"source": "灵根", "target": "徐千屿", "type": "possesses", "label": "雷灵根"}, {"source": "灵根", "target": "沈溯微", "type": "possesses", "label": "水灵根→化冰雪"}, {"source": "灵根", "target": "陆呦", "type": "possesses", "label": "风雷双灵根"}, {"source": "剑修", "target": "本命剑与剑灵", "type": "core_of", "label": "剑修核心"}, {"source": "本命剑与剑灵", "target": "败雪", "type": "instance_of", "label": "千屿前世本命剑"}, {"source": "本命剑与剑灵", "target": "苍阙", "type": "instance_of", "label": "沈溯微本命剑"}, {"source": "本命剑与剑灵", "target": "伏龙", "type": "instance_of", "label": "有剑灵的上古灵剑"}, {"source": "本命剑与剑灵", "target": "袖中摇光", "type": "instance_of", "label": "沈溯微前世本命剑"}, {"source": "符修", "target": "芥子金珠与信蝶", "type": "produces", "label": "符修造物"}, {"source": "符修", "target": "花青伞", "type": "practiced_by", "label": "符修出身"}, {"source": "四大仙门", "target": "蓬莱仙宗", "type": "member", "label": "后起小派/海岛"}, {"source": "四大仙门", "target": "灵越仙宗", "type": "member", "label": "灵田培育"}, {"source": "四大仙门", "target": "弟子大会", "type": "hosts", "label": "各派齐聚较量"}, {"source": "四大仙门", "target": "仙门遴选", "type": "conducts", "label": "每年选幼童上山"}, {"source": "蓬莱仙宗", "target": "徐冰来", "type": "led_by", "label": "掌门"}, {"source": "蓬莱仙宗", "target": "沈溯微", "type": "member", "label": "内门三师兄"}, {"source": "蓬莱仙宗", "target": "徐千屿", "type": "member", "label": "前世内门小师妹"}, {"source": "蓬莱仙宗", "target": "陆呦", "type": "member", "label": "投奔后成为小师妹"}, {"source": "蓬莱仙宗", "target": "花青伞", "type": "member", "label": "戒律堂长老"}, {"source": "灵越仙宗", "target": "陆呦", "type": "expelled", "label": "被逐出"}, {"source": "凡间世界", "target": "水如山", "type": "inhabits", "label": "南陵首富"}, {"source": "凡间世界", "target": "水微微", "type": "inhabits", "label": "被关西厢房"}, {"source": "凡间世界", "target": "观娘", "type": "inhabits", "label": "水家丫鬟总领"}, {"source": "魔界势力", "target": "谢妄真", "type": "led_by", "label": "魔王"}, {"source": "魔界势力", "target": "魔骨", "type": "origin_of", "label": "魔王尾骨"}, {"source": "魔界势力", "target": "出秋", "type": "triggers", "label": "仙门猎魔"}, {"source": "谢妄真", "target": "魔魂三分", "type": "split_into", "label": "被无真打散"}, {"source": "谢妄真", "target": "陆呦", "type": "loves", "label": "好感度99%→娶为魔后"}, {"source": "谢妄真", "target": "徐千屿", "type": "killed", "label": "前世一剑穿胸→吞魂"}, {"source": "徐冰来", "target": "徐千屿", "type": "father_of", "label": "父女"}, {"source": "徐冰来", "target": "水微微", "type": "abandoned", "label": "一夜情→抛弃"}, {"source": "水如山", "target": "徐千屿", "type": "grandfather_of", "label": "外祖父"}, {"source": "水如山", "target": "水微微", "type": "father_of", "label": "父女"}, {"source": "沈溯微", "target": "徐千屿", "type": "protects", "label": "如父如兄→带回蓬莱"}, {"source": "沈溯微", "target": "陆呦", "type": "protects", "label": "也曾救过"}, {"source": "沈溯微", "target": "谢妄真", "type": "killed_by", "label": "魔界抢亲→伤重身殒"}, {"source": "徐千屿", "target": "陆呦", "type": "rivals", "label": "对照组→较劲"}, {"source": "徐千屿", "target": "莲子连心咒", "type": "cursed_by", "label": "出生即中蛊"}, {"source": "徐千屿", "target": "水微微", "type": "daughter_of", "label": "母女（不被承认）"}, {"source": "徐千屿", "target": "观娘", "type": "raised_by", "label": "如母如姊"}, {"source": "徐千屿", "target": "败雪", "type": "wielded", "label": "前世本命剑"}, {"source": "陆呦", "target": "锦鲤命格", "type": "blessed_with", "label": "天命之女"}, {"source": "陆呦", "target": "伏龙", "type": "wielded", "label": "本命剑"}, {"source": "陆呦", "target": "溯光镜", "type": "uses", "label": "监视千屿"}, {"source": "魔骨", "target": "谢妄真", "type": "restores", "label": "重获魔骨恢复全力"}, {"source": "冰匙与天梯", "target": "出春", "type": "drives", "label": "搜寻冰匙"}, {"source": "冰匙与天梯", "target": "灵气体系", "type": "amplifies", "label": "集齐后灵气播撒下界"}, {"source": "花青伞", "target": "徐千屿", "type": "pursued", "label": "追捕叛徒→放水"}, {"source": "莲子连心咒", "target": "徐冰来", "type": "originated_from", "label": "太上长老派人暗杀"}, {"source": "观娘", "target": "水如山", "type": "serves", "label": "红粉知己→管家"}]};

const layerNames = {
  0: '世界本源',
  1: '天道规则',
  2: '体系·格局',
  3: '道具·活动',
  4: '关键人物',
  5: '具体实例'
};

const nodeRadius = {
  0: 28, 1: 18, 2: 14, 3: 10, 4: 12, 5: 8
};

// ========== SVG 设置 ==========
const svg = d3.select('#galaxy');
const width = window.innerWidth;
const height = window.innerHeight;
svg.attr('viewBox', [0, 0, width, height]);

const g = svg.append('g');

// 缩放
const zoom = d3.zoom()
  .scaleExtent([0.2, 3])
  .on('zoom', (event) => {
    g.attr('transform', event.transform);
  });
svg.call(zoom);

// ========== 力导向 ==========
const centerNode = data.nodes.find(n => n.isCentral);

const simulation = d3.forceSimulation(data.nodes)
  .force('link', d3.forceLink(data.edges).id(d => d.id).distance(d => {
    // 层级差越大距离越远
    const s = data.nodes.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source));
    const t = data.nodes.find(n => n.id === (typeof d.target === 'object' ? d.target.id : d.target));
    const diff = Math.abs((s?.layer || 0) - (t?.layer || 0));
    return 80 + diff * 60;
  }).strength(0.3))
  .force('charge', d3.forceManyBody().strength(d => {
    if (d.isCentral) return -600;
    return -100 - d.layer * 30;
  }))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(d => nodeRadius[d.layer] + 8))
  .force('x', d3.forceX(width / 2).strength(0.02))
  .force('y', d3.forceY(height / 2).strength(0.02));

// 中心节点固定
data.nodes.forEach(n => {
  if (n.isCentral) {
    n.fx = width / 2;
    n.fy = height / 2;
  }
});

// ========== 连线 ==========
const linkGroup = g.append('g').attr('class', 'links');

const link = linkGroup.selectAll('line')
  .data(data.edges)
  .join('line')
  .attr('stroke', 'rgba(180,170,150,0.12)')
  .attr('stroke-width', 1)
  .attr('stroke-dasharray', d => d.type === 'contains' || d.type === 'governs' ? 'none' : '3,3');

// 连线标签
const linkLabel = linkGroup.selectAll('text')
  .data(data.edges)
  .join('text')
  .text(d => d.label)
  .attr('font-size', '9px')
  .attr('fill', 'rgba(180,170,150,0.4)')
  .attr('text-anchor', 'middle')
  .attr('dy', -4);

// ========== 节点 ==========
const nodeGroup = g.append('g').attr('class', 'nodes');

const node = nodeGroup.selectAll('g')
  .data(data.nodes)
  .join('g')
  .attr('cursor', 'pointer')
  .call(d3.drag()
    .on('start', (event, d) => {
      if (d.isCentral) return;
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    })
    .on('drag', (event, d) => {
      if (d.isCentral) return;
      d.fx = event.x;
      d.fy = event.y;
    })
    .on('end', (event, d) => {
      if (d.isCentral) return;
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    })
  );

// 光晕
node.append('circle')
  .attr('r', d => nodeRadius[d.layer] + 6)
  .attr('fill', 'none')
  .attr('stroke', d => layerColors[d.layer])
  .attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0)
  .attr('class', 'halo');

// 主体圆
node.append('circle')
  .attr('r', d => nodeRadius[d.layer])
  .attr('fill', d => {
    const c = d3.color(layerColors[d.layer]);
    return c.darker(0.5);
  })
  .attr('stroke', d => layerColors[d.layer])
  .attr('stroke-width', d => d.isCentral ? 3 : 1.5)
  .attr('stroke-opacity', d => d.isCentral ? 1 : 0.7)
  .attr('class', 'node-body');

// 中心脉冲
const pulseGroup = node.filter(d => d.isCentral);
pulseGroup.append('circle')
  .attr('r', 28)
  .attr('fill', 'none')
  .attr('stroke', '#ffd700')
  .attr('stroke-width', 2)
  .attr('stroke-opacity', 0.6)
  .attr('class', 'pulse-ring')
  .append('animate')
  .attr('attributeName', 'r')
  .attr('values', '28;50')
  .attr('dur', '2s')
  .attr('repeatCount', 'indefinite');
pulseGroup.append('animate')
  .attr('attributeName', 'stroke-opacity')
  .attr('values', '0.6;0')
  .attr('dur', '2s')
  .attr('repeatCount', 'indefinite');

// 标签
node.append('text')
  .text(d => d.id)
  .attr('text-anchor', 'middle')
  .attr('dy', d => nodeRadius[d.layer] + 16)
  .attr('font-size', d => d.isCentral ? '16px' : d.layer <= 2 ? '12px' : '10px')
  .attr('font-family', d => d.isCentral ? "'Noto Serif SC', serif" : "'Noto Sans SC', sans-serif")
  .attr('font-weight', d => d.isCentral ? 700 : d.layer <= 2 ? 500 : 400)
  .attr('fill', d => {
    if (d.isCentral) return '#ffd700';
    return layerColors[d.layer];
  })
  .attr('text-shadow', d => d.isCentral ? '0 0 20px rgba(255,215,0,0.4)' : 'none')
  .attr('class', 'node-label');

// ========== 交互 ==========
let selectedNode = null;
let activeLayer = -1; // -1 = all

// 悬停
node.on('mouseenter', function(event, d) {
  if (selectedNode) return;
  d3.select(this).select('.node-body')
    .transition().duration(200)
    .attr('stroke-width', d.isCentral ? 5 : 3)
    .attr('stroke-opacity', 1);
  d3.select(this).select('.halo')
    .transition().duration(200)
    .attr('stroke-opacity', 0.3);

  // Tooltip
  d3.select('#tooltip')
    .style('opacity', 1)
    .html(`<strong>${d.id}</strong><br><span style="font-size:11px;color:#8a7b6b">${d.type} · 第${d.layer}层</span>`)
    .style('left', (event.pageX + 15) + 'px')
    .style('top', (event.pageY - 40) + 'px');
})
.on('mousemove', function(event) {
  d3.select('#tooltip')
    .style('left', (event.pageX + 15) + 'px')
    .style('top', (event.pageY - 40) + 'px');
})
.on('mouseleave', function(event, d) {
  if (selectedNode) return;
  d3.select(this).select('.node-body')
    .transition().duration(200)
    .attr('stroke-width', d.isCentral ? 3 : 1.5)
    .attr('stroke-opacity', d.isCentral ? 1 : 0.7);
  d3.select(this).select('.halo')
    .transition().duration(200)
    .attr('stroke-opacity', 0);
  d3.select('#tooltip').style('opacity', 0);
});

// 点击
node.on('click', function(event, d) {
  event.stopPropagation();
  selectedNode = d;
  showDetail(d);
  highlightConnections(d);
});

// 关闭详情
d3.select('#detail-close').on('click', () => {
  selectedNode = null;
  hideDetail();
  resetHighlight();
});

svg.on('click', () => {
  if (selectedNode) {
    selectedNode = null;
    hideDetail();
    resetHighlight();
  }
});

function showDetail(d) {
  const panel = d3.select('#detail-panel');
  panel.select('.node-name').text(d.id);
  panel.select('.node-type').text(`${d.type} · 第${d.layer}层（${layerNames[d.layer]}）`);
  panel.select('.node-desc').text(d.desc);

  // 收集关联
  const rels = [];
  data.edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (sid === d.id) rels.push(`→ ${tid}（${e.label}）`);
    if (tid === d.id) rels.push(`${sid} →（${e.label}）`);
  });
  if (rels.length > 0) {
    panel.select('.node-relations').html('<strong>关联关系：</strong><br>' + rels.join('<br>'));
  } else {
    panel.select('.node-relations').text('');
  }
  panel.classed('visible', true);
}

function hideDetail() {
  d3.select('#detail-panel').classed('visible', false);
}

function highlightConnections(d) {
  // 淡化所有
  node.selectAll('.node-body').transition().duration(300)
    .attr('opacity', 0.15);
  node.selectAll('.node-label').transition().duration(300)
    .attr('opacity', 0.15);
  link.transition().duration(300)
    .attr('stroke-opacity', 0.03);
  linkLabel.transition().duration(300)
    .attr('opacity', 0.03);

  // 高亮选中节点
  node.filter(n => n.id === d.id)
    .selectAll('.node-body').transition().duration(300)
    .attr('opacity', 1);
  node.filter(n => n.id === d.id)
    .selectAll('.node-label').transition().duration(300)
    .attr('opacity', 1);

  // 高亮关联节点和连线
  const relatedIds = new Set([d.id]);
  data.edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (sid === d.id) relatedIds.add(tid);
    if (tid === d.id) relatedIds.add(sid);
  });

  node.filter(n => relatedIds.has(n.id) && n.id !== d.id)
    .selectAll('.node-body').transition().duration(300)
    .attr('opacity', 0.6);
  node.filter(n => relatedIds.has(n.id) && n.id !== d.id)
    .selectAll('.node-label').transition().duration(300)
    .attr('opacity', 0.8);

  link.filter(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    return sid === d.id || tid === d.id;
  }).transition().duration(300)
    .attr('stroke-opacity', 0.5)
    .attr('stroke-width', 2);

  linkLabel.filter(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    return sid === d.id || tid === d.id;
  }).transition().duration(300)
    .attr('opacity', 0.7);
}

function resetHighlight() {
  node.selectAll('.node-body').transition().duration(300)
    .attr('opacity', 1);
  node.selectAll('.node-label').transition().duration(300)
    .attr('opacity', 1);
  link.transition().duration(300)
    .attr('stroke-opacity', 1)
    .attr('stroke-width', 1);
  linkLabel.transition().duration(300)
    .attr('opacity', 1);
}

// ========== 动画 ==========
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  linkLabel
    .attr('x', d => (d.source.x + d.target.x) / 2)
    .attr('y', d => (d.source.y + d.target.y) / 2);

  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// ========== 图例 ==========
const legend = d3.select('#legend');
Object.entries(layerNames).forEach(([layer, name]) => {
  const item = legend.append('div')
    .attr('class', 'legend-item')
    .attr('data-layer', layer)
    .on('click', function() {
      const l = parseInt(layer);
      if (activeLayer === l) {
        activeLayer = -1;
        d3.select(this).classed('active', false);
        filterByLayer(-1);
      } else {
        activeLayer = l;
        legend.selectAll('.legend-item').classed('active', false);
        d3.select(this).classed('active', true);
        filterByLayer(l);
      }
    });

  item.append('div')
    .attr('class', 'legend-dot')
    .style('background', layerColors[layer]);

  item.append('span').text(name);
});

function filterByLayer(layer) {
  if (layer === -1) {
    node.selectAll('.node-body').transition().duration(500)
      .attr('opacity', 1);
    node.selectAll('.node-label').transition().duration(500)
      .attr('opacity', 1);
    link.transition().duration(500)
      .attr('stroke-opacity', 0.12)
      .attr('stroke-width', 1);
    linkLabel.transition().duration(500)
      .attr('opacity', 0.4);
    return;
  }

  node.each(function(d) {
    const opacity = d.layer === layer ? 1 : 0.06;
    d3.select(this).select('.node-body').transition().duration(500)
      .attr('opacity', opacity);
    d3.select(this).select('.node-label').transition().duration(500)
      .attr('opacity', opacity);
  });

  link.each(function(d) {
    const s = data.nodes.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source));
    const t = data.nodes.find(n => n.id === (typeof d.target === 'object' ? d.target.id : d.target));
    const match = (s?.layer === layer || t?.layer === layer);
    d3.select(this).transition().duration(500)
      .attr('stroke-opacity', match ? 0.4 : 0.02)
      .attr('stroke-width', match ? 2 : 0.5);
  });

  linkLabel.each(function(d) {
    const s = data.nodes.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source));
    const t = data.nodes.find(n => n.id === (typeof d.target === 'object' ? d.target.id : d.target));
    const match = (s?.layer === layer || t?.layer === layer);
    d3.select(this).transition().duration(500)
      .attr('opacity', match ? 0.6 : 0.02);
  });
}

// ========== 响应式 ==========
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  svg.attr('viewBox', [0, 0, w, h]);
  simulation.force('center', d3.forceCenter(w / 2, h / 2));
  data.nodes.forEach(n => {
    if (n.isCentral) {
      n.fx = w / 2;
      n.fy = h / 2;
    }
  });
  simulation.alpha(0.3).restart();
});
</script>
</body>
</html>
