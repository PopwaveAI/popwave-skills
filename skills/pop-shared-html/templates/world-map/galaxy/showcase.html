<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界观星系图 · 千屿</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  /* ═══════════════════════════════════════
     🔧 设计参数 — 设计师改这里即可
     ═══════════════════════════════════════ */
  :root {
    --bg-color: #06070a;
    --text-primary: #e6e8ec;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --border-color: #21262d;
    --panel-bg: rgba(13,17,23, 0.9);
    --orb-opacity: 0.06;

    /* 概念层级颜色 */
    --layer-core: #7c5cff;
    --layer-system: #58a6ff;
    --layer-stage: #34d399;
    --layer-faction: #ff2bd6;
    --layer-artifact: #f0883e;
    --layer-event: #b89eff;
    --layer-rule: #ff3b48;
    --layer-character: #e4bf3f;
    --layer-resource: #4ea8de;
    --layer-location: #8b949e;
    --layer-default: #8b949e;
  }

  /* 关系类型颜色 */
  --edge-contains: #58a6ff;
  --edge-governs: #ff2bd6;
  --edge-anomaly: #ff3b48;
  --edge-path: #34d399;
  --edge-depends: #4ea8de;
  --edge-branch: #b89eff;
  --edge-member: #58a6ff66;
  --edge-leads: #e4bf3f;
  --edge-organizes: #b89eff;
  --edge-origin: #ff6b35;
  --edge-guarded_by: #7c5cff;
  --edge-belongs_to: #f0883e;
  --edge-unlocks: #34d399;
  --edge-enables: #4ea8de;
  --edge-seeks: #b89eff;
  --edge-participated_by: #58a6ff;
  --edge-manifests: #ff2bd6;
  --edge-binds: #ff3b48;
  --edge-challenges: #f0883e;
  --edge-hides: #8b949e;

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg-color);
    font-family: 'Inter Tight','Noto Sans SC',sans-serif;
    overflow: hidden; height: 100vh; width: 100vw;
    -webkit-font-smoothing: antialiased;
  }
  #canvas { width:100vw; height:100vh; position:relative; }
  svg { width:100%; height:100%; display:block; }

  .orb { position:absolute; border-radius:50%; pointer-events:none; filter:blur(130px); opacity: var(--orb-opacity); }
  .orb-1 { width:600px; height:600px; top:-200px; left:-120px; background:radial-gradient(circle, var(--layer-core), transparent); }
  .orb-2 { width:500px; height:500px; bottom:-180px; right:-90px; background:radial-gradient(circle, var(--layer-system), transparent); }
  .orb-3 { width:350px; height:350px; top:45%; left:55%; background:radial-gradient(circle, var(--layer-stage), transparent); }

  .topbar { position:absolute; top:0; left:0; right:0; z-index:20; padding:20px 28px; display:flex; align-items:flex-start; justify-content:space-between; pointer-events:none; }
  .topbar > * { pointer-events:auto; }
  .topbar .title-group h1 { font-size:1.35rem; font-weight:700; color:var(--text-primary); letter-spacing:-0.02em; }
  .topbar .title-group .sub { font-size:0.72rem; color:var(--text-muted); font-family:'JetBrains Mono',monospace; margin-top:2px; }

  .tooltip { position:absolute; z-index:30; pointer-events:none; opacity:0; background:var(--panel-bg); border:1px solid #30363d; border-radius:10px; padding:14px 18px; min-width:180px; max-width:280px; backdrop-filter:blur(20px); transition:opacity 0.15s; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .tooltip .tt-name { font-size:1rem; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
  .tooltip .tt-layer { font-size:0.65rem; color:var(--text-dim); font-family:'JetBrains Mono',monospace; margin-bottom:6px; }
  .tooltip .tt-desc { font-size:0.68rem; color:var(--text-muted); line-height:1.5; border-left:2px solid #30363d; padding-left:8px; }
  .tooltip .tt-rels { margin-top:6px; font-size:0.62rem; color:var(--text-muted); line-height:1.5; }

  .legend { position:absolute; bottom:28px; right:28px; z-index:20; background:var(--panel-bg); border:1px solid var(--border-color); border-radius:10px; padding:14px 18px; backdrop-filter:blur(20px); max-height:60vh; overflow-y:auto; }
  .legend-item { display:flex; align-items:center; gap:8px; margin:3px 0; font-size:0.66rem; color:var(--text-muted); }
  .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  .stats-corner { position:absolute; bottom:28px; left:28px; z-index:20; display:flex; gap:20px; }
  .stats-corner .st { text-align:center; }
  .stats-corner .st strong { display:block; font-size:1.5rem; font-weight:800; color:var(--text-primary); line-height:1; }
  .stats-corner .st span { font-size:0.6rem; color:var(--text-dim); font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:0.06em; margin-top:3px; display:block; }

  .btn-group { position:absolute; top:28px; right:28px; z-index:20; display:flex; gap:6px; flex-wrap:wrap; max-width:60vw; justify-content:flex-end; }
  .btn-g { padding:6px 12px; border-radius:6px; font-size:0.65rem; font-weight:500; border:1px solid #30363d; background:rgba(22,27,34,0.8); color:var(--text-muted); cursor:pointer; transition:all 0.15s; font-family:'JetBrains Mono',monospace; backdrop-filter:blur(4px); }
  .btn-g:hover { border-color:var(--layer-system); color:var(--layer-system); }
  .btn-g.active { background:rgba(88,166,255,0.12); border-color:var(--layer-system); color:var(--layer-system); }

  .edge-label { font-size:0.52rem; fill:var(--text-dim); font-family:'JetBrains Mono',monospace; pointer-events:none; }

  .central-pulse { animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity:0.6; }
    50% { opacity:0.9; }
  }
</style>
</head>
<body>
<div id="canvas">
  <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>

  <div class="topbar">
    <div class="title-group">
      <h1>《千屿》世界观星系图</h1>
      <div class="sub">世界设定概念网络 · 26个节点 · 29条关联</div>
    </div>
    <div class="badge" style="padding:6px 14px;border-radius:16px;font-size:0.68rem;font-weight:600;background:rgba(124,92,255,0.12);color:#b89eff;border:1px solid rgba(124,92,255,0.2);font-family:'JetBrains Mono',monospace;" id="badge"></div>
  </div>

  <div class="btn-group" id="btnGroup">
    <button class="btn-g active" onclick="filterLayer('all')" id="btn-all">全部</button>
  </div>

  <div class="stats-corner" id="stats"></div>

  <div class="legend" id="legend">
    <div style="margin-bottom:6px;font-size:0.7rem;font-weight:600;color:var(--text-primary);">概念层级</div>
    <div id="legendItems"></div>
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-color);font-size:0.6rem;color:var(--text-dim);">
      拖拽节点 · 滚轮缩放 · 悬停详情 · 点击锁定
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>
  <svg id="graph"></svg>
</div>

<script>
/* INJECT:NODES */
const NODES = [{"id": "蓬莱修仙世界", "layer": "核心", "type": "core", "desc": "整个故事的舞台与底层世界观", "isCentral": true}, {"id": "修炼体系", "layer": "体系", "type": "system", "desc": "从筑基到飞升的完整修仙进阶路径"}, {"id": "筑基", "layer": "境界", "type": "stage", "desc": "修仙入门境界，炼气化精"}, {"id": "金丹", "layer": "境界", "type": "stage", "desc": "内丹凝结，修为小成"}, {"id": "元婴", "layer": "境界", "type": "stage", "desc": "元神出窍，返老还童"}, {"id": "元君", "layer": "境界", "type": "stage", "desc": "百十年方成的大修士境界"}, {"id": "飞升", "layer": "境界", "type": "stage", "desc": "跨越死生、逆转时间，可再见已故之人"}, {"id": "灵气", "layer": "体系", "type": "resource", "desc": "天地间弥漫的修炼基础能量"}, {"id": "蓬莱仙宗", "layer": "势力", "type": "faction", "desc": "正道第一仙宗，掌门徐冰来"}, {"id": "四大仙门", "layer": "势力", "type": "faction", "desc": "修仙界四大宗门，每年从凡间选灵根幼童"}, {"id": "戒律堂", "layer": "势力", "type": "faction", "desc": "蓬莱执法机构，花青伞长老坐镇，善寻踪追捕"}, {"id": "妖域", "layer": "势力", "type": "faction", "desc": "妖魔聚集之地，魔骨来源地"}, {"id": "流英阁", "layer": "势力", "type": "location", "desc": "存放珍宝的楼阁，魔骨名义上的保存地"}, {"id": "无妄崖", "layer": "势力", "type": "location", "desc": "魔王谢妄真藏匿之地"}, {"id": "魔骨", "layer": "道具", "type": "artifact", "desc": "魔王的一块尾骨，内储存魔王全部修为"}, {"id": "冰匙", "layer": "道具", "type": "artifact", "desc": "天梯碎片，集齐可打开通天之门"}, {"id": "天梯", "layer": "道具", "type": "artifact", "desc": "通天之路，打开后灵气播撒下界、诛尽邪魔"}, {"id": "出春", "layer": "活动", "type": "event", "desc": "每年春天各仙宗组队搜寻冰匙的活动"}, {"id": "气运", "layer": "规则", "type": "rule", "desc": "冥冥中决定修仙者天赋、机缘、宝物归属的神秘力量"}, {"id": "系统", "layer": "规则", "type": "rule", "desc": "重生后伴随徐千屿的引导系统，发布任务、推进剧情"}, {"id": "重生", "layer": "规则", "type": "rule", "desc": "徐千屿死后回到九岁凡间的机缘，手握前世记忆"}, {"id": "锦鲤命格", "layer": "规则", "type": "rule", "desc": "天生好运的命格，陆呦凭此格躺赢一切"}, {"id": "符修", "layer": "体系", "type": "system", "desc": "以符咒为武器的修行路线"}, {"id": "君子剑法", "layer": "体系", "type": "system", "desc": "沈溯微一脉传承的剑道"}, {"id": "冰来掌门", "layer": "人物", "type": "character", "desc": "蓬莱掌门徐冰来，多诈善谋，最妥帖之事交与沈溯微"}, {"id": "魔王谢妄真", "layer": "人物", "type": "character", "desc": "大反派，前世千屿为其背叛师门反被一剑击杀"}];
/* ENDINJECT */
/* INJECT:EDGES */
const EDGES = [{"source": "蓬莱修仙世界", "target": "修炼体系", "type": "contains", "label": "核心系统"}, {"source": "蓬莱修仙世界", "target": "蓬莱仙宗", "type": "contains", "label": "中心舞台"}, {"source": "蓬莱修仙世界", "target": "气运", "type": "governs", "label": "底层规则"}, {"source": "蓬莱修仙世界", "target": "重生", "type": "anomaly", "label": "时空异常"}, {"source": "修炼体系", "target": "筑基", "type": "path", "label": "入门"}, {"source": "修炼体系", "target": "金丹", "type": "path", "label": "小成"}, {"source": "修炼体系", "target": "元婴", "type": "path", "label": "大成"}, {"source": "修炼体系", "target": "元君", "type": "path", "label": "登峰"}, {"source": "修炼体系", "target": "飞升", "type": "path", "label": "圆满"}, {"source": "修炼体系", "target": "灵气", "type": "depends", "label": "能量来源"}, {"source": "修炼体系", "target": "符修", "type": "branch", "label": "分支"}, {"source": "修炼体系", "target": "君子剑法", "type": "branch", "label": "分支"}, {"source": "蓬莱仙宗", "target": "四大仙门", "type": "member", "label": "所属"}, {"source": "蓬莱仙宗", "target": "戒律堂", "type": "contains", "label": "内部机构"}, {"source": "蓬莱仙宗", "target": "流英阁", "type": "contains", "label": "藏宝地"}, {"source": "蓬莱仙宗", "target": "冰来掌门", "type": "leads", "label": "掌门"}, {"source": "蓬莱仙宗", "target": "出春", "type": "organizes", "label": "组织"}, {"source": "妖域", "target": "魔骨", "type": "origin", "label": "来源"}, {"source": "妖域", "target": "无妄崖", "type": "contains", "label": "位于"}, {"source": "魔骨", "target": "冰来掌门", "type": "guarded_by", "label": "保管"}, {"source": "魔骨", "target": "魔王谢妄真", "type": "belongs_to", "label": "本体"}, {"source": "冰匙", "target": "天梯", "type": "unlocks", "label": "开启"}, {"source": "天梯", "target": "飞升", "type": "enables", "label": "通途"}, {"source": "出春", "target": "冰匙", "type": "seeks", "label": "搜寻"}, {"source": "出春", "target": "四大仙门", "type": "participated_by", "label": "参与"}, {"source": "气运", "target": "锦鲤命格", "type": "manifests", "label": "极致体现"}, {"source": "系统", "target": "重生", "type": "binds", "label": "绑定"}, {"source": "重生", "target": "气运", "type": "challenges", "label": "对抗"}, {"source": "无妄崖", "target": "魔王谢妄真", "type": "hides", "label": "藏身"}];
/* ENDINJECT */

// ═══ 层级颜色映射 ═══
const layerColors = {
  "核心":"#7c5cff","体系":"#58a6ff","境界":"#34d399",
  "势力":"#ff2bd6","道具":"#f0883e","活动":"#b89eff",
  "规则":"#ff3b48","人物":"#e4bf3f","资源":"#4ea8de","地点":"#8b949e"
};
const layerColor = l => layerColors[l] || "#8b949e";

// ═══ 关系类型显示名 ═══
const edgeTypeNames = {
  contains:"含括", governs:"支配", anomaly:"异常", path:"修炼路径",
  depends:"依赖", branch:"分支", member:"所属", leads:"领导",
  organizes:"组织", origin:"来源", guarded_by:"保管", belongs_to:"归属",
  unlocks:"开启", enables:"通途", seeks:"搜寻", participated_by:"参与",
  manifests:"体现", binds:"绑定", challenges:"对抗", hides:"藏身"
};
const edgeTypeColor = t => {
  const el = document.createElement('div');
  el.style.color = `var(--edge-${t})`;
  document.body.appendChild(el);
  const c = getComputedStyle(el).color;
  document.body.removeChild(el);
  return c;
};

// ═══ 构建图例 ═══
const layers = [...new Set(NODES.map(n=>n.layer))];
document.getElementById("legendItems").innerHTML = layers.map(l=>
  `<div class="legend-item"><span class="legend-dot" style="background:${layerColor(l)}"></span> ${l}</div>`
).join("");

// ═══ 构建筛选按钮 ═══
layers.forEach(l=>{
  const btn = document.createElement("button");
  btn.className="btn-g"; btn.id="btn-"+l; btn.textContent=l;
  btn.onclick = ()=>filterLayer(l);
  document.getElementById("btnGroup").appendChild(btn);
});

// ═══ 分配节点尺寸 ═══
NODES.forEach(n=>{
  if(!n.radius) n.radius = n.isCentral?22:n.layer==="体系"?16:n.layer==="势力"?14:n.layer==="规则"?13:10;
  if(!n.group) n.group = n.isCentral?"central":n.layer==="体系"?"core":n.layer==="势力"?"faction":n.layer==="规则"?"rule":"concept";
  if(!n.desc) n.desc = "暂无描述";
});

// ═══ D3 渲染 ═══
const W=window.innerWidth, H=window.innerHeight;
const svg=d3.select("#graph"), g=svg.append("g");
const zoom=d3.zoom().scaleExtent([0.2,3]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom); svg.call(zoom.transform, d3.zoomIdentity.translate(W/2,H/2).scale(0.7));

const links=EDGES.map(d=>({...d}));
const nodes=NODES.map(d=>({...d,id:d.id}));

const sim=d3.forceSimulation(nodes)
  .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>({contains:180,governs:200,anomaly:250,path:120,depends:150,branch:140,member:200,leads:160,organizes:170,origin:180,guarded_by:130,belongs_to:140,unlocks:110,enables:130,seeks:150,participated_by:190,manifests:160,binds:100,challenges:220,hides:130})[d.type]||180))
  .force("charge",d3.forceManyBody().strength(d=>d.isCentral?-1200:d.layer==="体系"?-600:d.layer==="势力"?-500:-350))
  .force("center",d3.forceCenter(0,0))
  .force("collision",d3.forceCollide().radius(d=>d.radius+8));

// ═══ 渐变 ═══
const defs=svg.append("defs");
NODES.forEach(n=>{
  const gd=defs.append("radialGradient").attr("id","grad-"+n.id.replace(/\s/g,""));
  gd.append("stop").attr("offset","0%").attr("stop-color",layerColor(n.layer)).attr("stop-opacity",1);
  gd.append("stop").attr("offset","100%").attr("stop-color",layerColor(n.layer)).attr("stop-opacity",0.2);
});

// ═══ 连线 ═══
const linkG=g.append("g").selectAll("line").data(links).join("line")
  .attr("stroke",d=>layerColor(NODES.find(n=>n.id===d.source)?.layer||"default"))
  .attr("stroke-width",d=>d.type==="governs"||d.type==="anomaly"?2.5:d.type==="path"?2:1.2)
  .attr("stroke-opacity",0.35)
  .attr("stroke-dasharray",d=>d.type==="anomaly"?"5,4":d.type==="challenges"?"4,3":"");

const elabel=g.append("g").selectAll("text").data(links).join("text")
  .text(d=>edgeTypeNames[d.type]||d.type).attr("class","edge-label")
  .attr("text-anchor","middle").attr("dy",-6).attr("opacity",0.45);

// ═══ 节点 ═══
const nodeG=g.append("g").selectAll("g").data(nodes).join("g").attr("class","node")
  .call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

// 光晕
nodeG.append("circle").attr("r",d=>d.radius+10)
  .attr("fill","none").attr("stroke",d=>layerColor(d.layer))
  .attr("stroke-width",d=>d.isCentral?2:1).attr("stroke-opacity",d=>d.isCentral?0.25:0.08);

// 主体
nodeG.append("circle").attr("r",d=>d.radius)
  .attr("fill",d=>`url(#grad-${d.id.replace(/\s/g,"")})`)
  .attr("stroke",d=>layerColor(d.layer))
  .attr("stroke-width",d=>d.isCentral?3:d.layer==="体系"?2:1.5)
  .attr("class",d=>d.isCentral?"central-pulse":"")
  .style("cursor","pointer");

// 标签
nodeG.append("text").text(d=>d.isCentral?"★ "+d.id:d.id)
  .attr("dy",d=>d.radius+14)
  .attr("text-anchor","middle").attr("fill","var(--text-primary)")
  .attr("font-size",d=>d.isCentral?15:d.layer==="体系"||d.layer==="势力"?12:10)
  .attr("font-weight",d=>d.isCentral?800:d.layer==="体系"?600:400)
  .attr("font-family","'Noto Sans SC',sans-serif").style("pointer-events","none")
  .style("text-shadow","0 0 10px rgba(0,0,0,0.7)");

// ═══ Tooltip ═══
const tooltip=d3.select("#tooltip"); let lockedNode=null;
nodeG.on("mouseenter",function(e,d){if(lockedNode)return;showTT(e,d);hl(d,true);})
     .on("mouseleave",function(e,d){if(lockedNode)return;hideTT();hl(d,false);})
     .on("click",function(e,d){if(lockedNode===d){lockedNode=null;hideTT();hl(d,false);return;}lockedNode=d;showTT(e,d);hl(d,true);});

function showTT(e,d){
  const rels = links.filter(l=>l.source.id===d.id||l.target.id===d.id);
  const relHtml = rels.map(l=>{
    const isOut = l.source.id===d.id;
    const other = isOut?l.target.id:l.source.id;
    const relName = edgeTypeNames[l.type]||l.type;
    return `<div>${isOut?"→":"←"} ${relName} <span style="color:var(--text-dim)">${isOut?"":"← "}${other}</span></div>`;
  }).join("");
  tooltip.style("opacity",1)
    .style("left",(e.x||e.pageX)+20+"px")
    .style("top",(e.y||e.pageY)-30+"px")
    .html(`<div class="tt-name">${d.isCentral?"★ ":""}${d.id}</div>
      <div class="tt-layer">层级: ${d.layer} · 类型: ${d.type}</div>
      <div class="tt-desc">${d.desc}</div>
      ${rels.length?`<div class="tt-rels">${relHtml}</div>`:""}`);
}
function hideTT(){tooltip.style("opacity",0);}
function hl(d,on){
  const s=new Set();
  links.forEach(l=>{if(l.source.id===d.id||l.target.id===d.id){s.add(l.source.id);s.add(l.target.id);}});
  nodeG.selectAll("circle").attr("opacity",dd=>on?(s.has(dd.id)||dd.id===d.id?1:0.08):1);
  linkG.attr("stroke-opacity",l=>on?(l.source.id===d.id||l.target.id===d.id?0.8:0.02):0.35);
  elabel.attr("opacity",l=>on?(l.source.id===d.id||l.target.id===d.id?0.8:0):0.45);
}

// ═══ 按层级筛选 ═══
function filterLayer(layer){
  document.querySelectorAll(".btn-g").forEach(b=>b.classList.remove("active"));
  if(layer==="all"){
    document.getElementById("btn-all").classList.add("active");
    nodeG.selectAll("circle").attr("opacity",1);
    linkG.attr("stroke-opacity",0.35);
    elabel.attr("opacity",0.45);
  }else{
    document.getElementById("btn-"+layer)?.classList.add("active");
    const layerNodes=new Set(NODES.filter(n=>n.layer===layer).map(n=>n.id));
    nodeG.selectAll("circle").attr("opacity",dd=>layerNodes.has(dd.id)?1:0.06);
    linkG.attr("stroke-opacity",l=>layerNodes.has(l.source.id)||layerNodes.has(l.target.id)?0.6:0.01);
    elabel.attr("opacity",l=>layerNodes.has(l.source.id)||layerNodes.has(l.target.id)?0.6:0);
  }
}

// ═══ 统计 ═══
const layerCounts={};NODES.forEach(n=>{layerCounts[n.layer]=(layerCounts[n.layer]||0)+1;});
document.getElementById("stats").innerHTML=`
  <div class="st"><strong>${NODES.length}</strong><span>概念</span></div>
  <div class="st"><strong>${links.length}</strong><span>关联</span></div>
  <div class="st"><strong>${layers.length}</strong><span>层级</span></div>
`;
document.getElementById("badge").textContent=`${NODES.length} 概念 · ${links.length} 关联 · 中心: ${NODES.find(n=>n.isCentral)?.id||""}`;

// ═══ tick ═══
sim.on("tick",()=>{
  linkG.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
       .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  elabel.attr("x",d=>(d.source.x+d.target.x)/2).attr("y",d=>(d.source.y+d.target.y)/2);
  nodeG.attr("transform",d=>`translate(${d.x},${d.y})`);
});

// 点击空白取消锁定
svg.on("click",function(e){if(e.target===this){lockedNode=null;hideTT();linkG.attr("stroke-opacity",0.35);elabel.attr("opacity",0.45);nodeG.selectAll("circle").attr("opacity",1);}});
</script>
</body>
</html>
