<!DOCTYPE html>
<html lang="zh-CN" data-theme="meraki">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/* INJECT:BRAND_NAME */</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   Meraki · 沉浸视觉风
   浅灰底 · 黑色+#ffbf01 黄强调 · Inter-24 字体
   含水平 marquee · 沉浸式图片
   ═══════════════════════════════════════════ */

:root {
  --clr-bg: #f6f6f6;
  --clr-surface: #ffffff;
  --clr-text: #555555;
  --clr-text-heading: #111111;
  --clr-border: #e2e2e2;
  --clr-accent: #ffbf01;
  --clr-accent-bg: rgba(255,191,1,0.12);
  --clr-accent-border: rgba(255,191,1,0.5);
  --clr-social-bg: rgba(246,246,246,0.5);
  --clr-card-bg: rgba(255,255,255,0.6);
  --clr-shadow: rgba(0,0,0,0.04);
  --clr-tag-bg: #e8e8e8;

  --font-body: 'Inter', system-ui, 'Segoe UI', Roboto, sans-serif;
  --font-heading: 'Inter', system-ui, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'Inter', ui-monospace, Consolas, monospace;

  --fs-h1: clamp(38px, 5.5vw, 60px);
  --fs-h2: clamp(24px, 3vw, 36px);
  --fs-h3: clamp(18px, 1.8vw, 24px);
  --fs-body: clamp(15px, 1.1vw, 17px);
  --fs-small: 14px;
  --fs-tag: 12px;

  --space-max: 1200px;
  --space-section: clamp(64px, 8vw, 120px);
  --space-grid: 24px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font-body);
  color: var(--clr-text);
  background: var(--clr-bg);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  font-weight: 400;
}
.container { max-width: var(--space-max); margin: 0 auto; padding: 0 24px; }

/* ═══ Navigation ═══ */
.nav-wrap {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--clr-bg);
  border-bottom: 1px solid var(--clr-border);
}
.nav-inner {
  max-width: var(--space-max); margin: 0 auto;
  padding: 1rem 24px;
  display: flex; justify-content: space-between; align-items: center;
}
.nav-logo { font-weight: 700; font-size: 1.2rem; color: var(--clr-text-heading); text-decoration: none; letter-spacing: -0.02em; }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a { text-decoration: none; color: var(--clr-text); font-size: 14px; font-weight: 400; transition: color 0.2s; }
.nav-links a:hover { color: var(--clr-accent); }
.nav-cta {
  background: var(--clr-text-heading); color: var(--clr-surface);
  padding: 10px 28px; text-decoration: none;
  font-size: 13px; font-weight: 500; transition: all 0.2s;
}
.nav-cta:hover { background: var(--clr-accent); color: var(--clr-text-heading); }

/* ═══ Hero (沉浸式图片背景) ═══ */
.hero { min-height: 92vh; display: flex; align-items: center; padding-top: 80px; position: relative; overflow: hidden; }
.hero-bg-wrap { position: absolute; inset: 0; overflow: hidden; }
.hero-bg-wrap img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.6), transparent); }
.hero .container { position: relative; z-index: 1; }
.hero h1 { font-size: var(--fs-h1); line-height: 1.05; font-weight: 800; color: #fff; letter-spacing: -0.02em; margin-bottom: 1.25rem; max-width: 700px; }
.hero .highlight { color: var(--clr-accent); }
.hero-desc { font-size: var(--fs-body); max-width: 440px; margin-bottom: 2rem; line-height: 1.7; color: rgba(255,255,255,0.8); }
.hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
.btn-primary {
  background: var(--clr-accent); color: var(--clr-text-heading);
  padding: 14px 32px; text-decoration: none;
  font-size: 14px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary:hover { background: #e0a800; }
.btn-secondary {
  background: transparent; color: #fff;
  padding: 14px 32px; text-decoration: none;
  font-size: 14px; font-weight: 500; border: 1.5px solid rgba(255,255,255,0.4);
  transition: all 0.2s; display: inline-flex; align-items: center;
}
.btn-secondary:hover { border-color: #fff; }

/* ═══ Marquee ═══ */
.marquee-section { overflow: hidden; padding: 2rem 0; background: var(--clr-text-heading); }
.marquee-inner {
  display: flex; gap: 3rem;
  animation: marqueeScroll 25s linear infinite;
  white-space: nowrap;
}
.marquee-inner span {
  font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.6);
  letter-spacing: 0.15em; text-transform: uppercase;
}
@keyframes marqueeScroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ═══ Stats ═══ */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-grid); margin: 3rem 0; }
.stat-card { background: var(--clr-card-bg); backdrop-filter: blur(4px); padding: 1.5rem; text-align: center; border: 1px solid var(--clr-border); }
.stat-card .num { font-size: 2rem; font-weight: 700; color: var(--clr-text-heading); line-height: 1.1; }
.stat-card .lbl { font-size: var(--fs-small); color: var(--clr-text); margin-top: 4px; }

/* ═══ Section ═══ */
.section { padding: var(--space-section) 0; }
.section-tag { font-size: 12px; color: var(--clr-accent); font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.75rem; }
.section h2 { font-size: var(--fs-h2); font-weight: 700; color: var(--clr-text-heading); line-height: 1.12; letter-spacing: -0.02em; margin-bottom: 2rem; }

/* ═══ Immersive Featured Grid ═══ */
.featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: var(--space-grid); }
.featured-card { background: var(--clr-surface); border: 1px solid var(--clr-border); position: relative; overflow: hidden; transition: all 0.3s; }
.featured-card:hover { border-color: var(--clr-accent-border); }
.featured-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--clr-tag-bg); transition: transform 0.4s; }
.featured-card:hover img { transform: scale(1.05); }
.featured-card-body { padding: 1.25rem; }
.featured-card-body h3 { font-size: 18px; font-weight: 600; color: var(--clr-text-heading); margin-bottom: 0.4rem; }
.featured-card-body p { font-size: 14px; color: var(--clr-text); line-height: 1.6; margin-bottom: 0.75rem; }
.featured-card-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
.featured-card-meta .tag { font-size: 11px; background: var(--clr-accent-bg); color: #b8860b; padding: 2px 10px; font-weight: 500; }
.featured-card-meta .views { font-size: 12px; color: var(--clr-text); opacity: 0.6; margin-left: auto; }

/* ═══ Full-width Immersive Image Section ═══ */
.immersive-img-section { position: relative; min-height: 50vh; display: flex; align-items: center; overflow: hidden; }
.immersive-img-section img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
.immersive-img-section .content { position: relative; z-index: 1; color: #fff; max-width: 600px; }
.immersive-img-section .content h2 { font-size: var(--fs-h2); font-weight: 700; margin-bottom: 1rem; color: #fff; }
.immersive-img-section .content p { font-size: var(--fs-body); line-height: 1.7; opacity: 0.85; }

/* ═══ Projects Grid ═══ */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-grid); }
.project-card { background: var(--clr-surface); border: 1px solid var(--clr-border); padding: 0; overflow: hidden; transition: all 0.25s; }
.project-card:hover { border-color: var(--clr-accent-border); }
.project-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: var(--clr-tag-bg); }
.project-card-body { padding: 1rem 1.25rem 1.25rem; }
.project-card-body h3 { font-size: 16px; font-weight: 600; color: var(--clr-text-heading); margin-bottom: 0.25rem; }
.project-card-body p { font-size: 13px; color: var(--clr-text); }
.project-card-body .tags { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
.project-card-body .tags span { font-size: 10px; background: var(--clr-accent-bg); color: #b8860b; padding: 1px 8px; font-weight: 500; }

/* ═══ Services ═══ */
.services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-grid); }
.service-card { background: var(--clr-card-bg); backdrop-filter: blur(4px); border: 1px solid var(--clr-border); padding: 2rem; transition: all 0.25s; }
.service-card:hover { background: var(--clr-surface); border-color: var(--clr-accent-border); }
.service-card .icon { font-size: 2rem; margin-bottom: 1rem; }
.service-card h3 { font-size: var(--fs-h3); font-weight: 600; color: var(--clr-text-heading); margin-bottom: 0.5rem; }
.service-card p { font-size: 14px; color: var(--clr-text); line-height: 1.6; }

/* ═══ Testimonials ═══ */
.testimonials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: var(--space-grid); }
.testimonial-card { background: var(--clr-surface); border: 1px solid var(--clr-border); padding: 2rem; }
.testimonial-card .quote { font-size: 15px; font-style: italic; line-height: 1.7; color: var(--clr-text-heading); margin-bottom: 1.5rem; }
.testimonial-card .author { display: flex; align-items: center; gap: 1rem; }
.testimonial-card .author img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
.testimonial-card .author-info .name { font-size: 14px; font-weight: 600; color: var(--clr-text-heading); }
.testimonial-card .author-info .role { font-size: 12px; color: var(--clr-text); }

/* ═══ Blog ═══ */
.blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-grid); }
.blog-card { background: var(--clr-surface); border: 1px solid var(--clr-border); transition: all 0.25s; }
.blog-card:hover { border-color: var(--clr-accent-border); }
.blog-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
.blog-card-body { padding: 1.25rem; }
.blog-card-body .date { font-size: 11px; color: var(--clr-accent); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }
.blog-card-body h3 { font-size: 17px; font-weight: 600; color: var(--clr-text-heading); margin: 0.5rem 0; line-height: 1.3; }
.blog-card-body p { font-size: 13px; color: var(--clr-text); line-height: 1.5; }

/* ═══ Gallery ═══ */
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.gallery-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; }

/* ═══ Contact ═══ */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
.contact-info p { font-size: var(--fs-body); line-height: 1.7; margin-bottom: 1rem; }
.contact-info .detail { font-size: 15px; color: var(--clr-text-heading); font-weight: 500; margin-top: 0.5rem; }
.contact-form { display: flex; flex-direction: column; gap: 0.75rem; }
.contact-form input, .contact-form textarea {
  padding: 14px 18px; border: 1px solid var(--clr-border); background: var(--clr-surface);
  font-family: var(--font-body); font-size: 15px; color: var(--clr-text-heading);
}
.contact-form input:focus, .contact-form textarea:focus { outline: none; border-color: var(--clr-accent); }
.contact-form textarea { min-height: 100px; resize: vertical; }
.contact-form button {
  background: var(--clr-accent); color: var(--clr-text-heading); border: none;
  padding: 14px 32px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.contact-form button:hover { background: #e0a800; }

/* ═══ Footer ═══ */
.footer { padding: 3rem 0 2rem; border-top: 1px solid var(--clr-border); }
.footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
.footer-socials { display: flex; gap: 0.5rem; }
.footer-socials a { width: 44px; height: 44px; border-radius: 50%; background: var(--clr-surface); border: 1px solid var(--clr-border); display: flex; align-items: center; justify-content: center; color: var(--clr-text-heading); text-decoration: none; font-size: 12px; transition: all 0.2s; }
.footer-socials a:hover { background: var(--clr-accent); color: var(--clr-text-heading); border-color: var(--clr-accent); }
.footer-copy { font-size: 13px; color: var(--clr-text); }

/* ═══ Responsive ═══ */
@media (max-width: 991px) {
  .nav-links { display: none; }
  .contact-grid { grid-template-columns: 1fr; }
}
@media (max-width: 767px) {
  .featured-grid, .services-grid, .testimonials-grid, .blog-grid { grid-template-columns: 1fr; }
  .projects-grid { grid-template-columns: 1fr; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-row { grid-template-columns: 1fr; }
  .hero-actions { flex-direction: column; }
  .btn-primary, .btn-secondary { width: 100%; text-align: center; justify-content: center; }
}
</style>
</head>
<body>

<!-- ═══ Navigation ═══ -->
<nav class="nav-wrap">
  <div class="nav-inner">
    <a href="#" class="nav-logo"><!-- ▲ INJECT:BRAND_NAME ▲ --></a>
    <ul class="nav-links">
      <li><a href="#work">Work</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <a href="#contact" class="nav-cta"><!-- ▲ INJECT:CTA_PRIMARY ▲ --></a>
  </div>
</nav>

<!-- ═══ Hero (沉浸式图片) ═══ -->
<section class="hero">
  <div class="hero-bg-wrap">
    <!-- ▲ INJECT:HERO_BG_IMAGE ▲ -->
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1440" alt="">
  </div>
  <div class="hero-overlay"></div>
  <div class="container">
    <div class="section-tag" style="color:var(--clr-accent);"><!-- ▲ INJECT:TAGLINE ▲ --></div>
    <h1 class="hero-title">
      <span class="highlight"><!-- ▲ INJECT:HERO_TITLE_HIGHLIGHT ▲ --></span><br>
      <!-- ▲ INJECT:HERO_TITLE ▲ --></h1>
    <p class="hero-desc"><!-- ▲ INJECT:HERO_DESC ▲ --></p>
    <div class="hero-actions">
      <a href="#work" class="btn-primary"><!-- ▲ INJECT:CTA_PRIMARY_ALT ▲ --></a>
      <a href="#contact" class="btn-secondary">Contact</a>
    </div>
  </div>
</section>

<!-- ═══ Marquee ═══ -->
<!-- ▲ INJECT:MARQUEE_SECTION ▲ -->
</div>

<!-- ═══ Featured ═══ -->
<section class="section" id="work">
  <div class="container">
    <div class="section-tag"><!-- ▲ INJECT:FEATURED_SUBTITLE ▲ --></div>
    <h2><!-- ▲ INJECT:FEATURED_TITLE ▲ --></h2>
    <!-- ▲ INJECT:FEATURED_GRID ▲ -->
  </div>

<section class="section" id="contact" style="background:var(--clr-surface);">

        <div class="detail"><!-- ▲ INJECT:CONTACT_EMAIL ▲ --></div>

        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">

      </form>

  </div>

<!-- ═══ Footer ═══ -->
<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-copy"><!-- ▲ INJECT:FOOTER_COPY ▲ --></div>
      <div class="footer-socials">
        <!-- ▲ INJECT:SOCIAL_LINKS ▲ -->
      </div>
    </div>
  </div>
</footer>

</body>
</html>
