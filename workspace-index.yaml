# ============================================================
# 十、管线蓝图（pipeline_blueprint）
# 专家模式全链路文件依赖图的压缩版。
# agent 在 Think 阶段读取此处了解管线全貌，无需逐文件扫描。
# 完整版 → prd/写作专家全链路文件依赖图-PRD.md
# ============================================================
pipeline_blueprint:
  doc_ref: "prd/写作专家全链路文件依赖图-PRD.md"

  stages:
    - skill: "pop-novel-deconstructor"
      order: 0
      type: "optional"             # 只有有参考书时才走
      trigger: "拆解参考书"
      input: ["参考书 TXT"]
      output: ["拆书成果-{书名}/T1~T6", "卷1起点/终点快照"]
      gates: ["锚定章确认"]

    - skill: "pop-novel-bookstrap"
      order: 1
      type: "required"
      trigger: "开书 / 续写"
      input: ["story-engine.yaml (用户口述)", "deconstructor 拆书成果 (如有)"]
      output: ["L1-01~06", "constitution.yaml", "project.yaml",
               "combat_capability/monster_rank_map/act_rank_schedule/collision_curve",
               "起点快照.md", "终点快照.md", "角色卡"]
      gates: ["story-engine确认", "起点快照确认", "终点快照确认"]
      key_phases: ["Phase 0(引擎)", "Phase 1(L1骨架)", "Phase 1.2(深度)", "Phase 5(数值)", "Phase 6/7(快照)"]

    - skill: "pop-novel-plot"
      order: 2
      type: "required"
      trigger: "设计剧情 / 规划大纲"
      input: ["story-engine.yaml", "起点/终点快照", "constitution.yaml", "L1-01~06", "数值体系x4"]
      output: ["设计/卷/volume-XX.md", "设计/幕/act-XX.yaml", "info-release-XX.md"]
      gates: ["卷确认", "场景卡确认"]

    - skill: "pop-novel-chapter-design"
      order: 3
      type: "required"
      trigger: "设计章纲"
      input: ["act-XX.yaml", "volume-XX.md", "info-release", "entity-snapshot", "constitution"]
      output: ["03-写作资产/chXXX-设计包.md (骨架+人物卡)", "entity-snapshot更新"]
      gates: []

    - skill: "pop-novel-prose-render"
      order: 4
      type: "required"
      trigger: "写正文"
      input: ["设计包.md", "文风DNA", "constitution"]
      output: ["正文/chXXX.md"]
      gates: []

