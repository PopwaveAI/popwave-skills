# ============================================================
# 五、跨项目经验库（全局知识沉淀）
# ============================================================
cross_project_lessons:

  - id: "L001"
    source: "北帝镇诡录"
    lesson: "黄金三章首章必须完成首爽释放（金手指首次展示+首个冲突解决），否则单章留存率暴跌。"
    evidence: "v2重写ch01-05的QC发现：黄金三章无金手指展示 → reader_profile判定'首章无金手指即弃'风险。"
    severity: "P0"
    applicable_to: ["all", "new_book", "bootstrap", "黄金三章"]
    discovered_at: "2026-06-06"

  - id: "L002"
    source: "海贼法典"
    lesson: "续写前必须精读倒数20章全文并输出事实提取报告。记忆不可信——'觉得已经读过了' ≠ 精读。"
    evidence: "CH389多弗朗明哥关系线错误：CH372已私下合作 → 写成'多弗试探陌生人'。精读倒数20章后才发现5个关键信息偏差（合作事实/汉库克观察/卡斯兰娜线人/蒸汽船/战国的态度）。"
    severity: "P0"
    applicable_to: ["all", "continue", "reverse_bootstrap", "写作"]
    discovered_at: "2026-06-08"

  - id: "L003"
    source: "海贼法典"
    lesson: "风格文件必须在Render阶段全程开放引用（持续存在于上下文中），不能只'读入'一次然后凭记忆执行。靠记忆执行风格 = 不执行。"
    evidence: "CH389 v1/v2未正确执行遮天风格（否定句结构踩红线、对话/叙述比失衡），直到v3用户显式要求'用遮天风格'才生效。"
    severity: "P1"
    applicable_to: ["all", "writing", "render"]
    discovered_at: "2026-06-08"

  - id: "L004"
    source: "全局"
    lesson: "子agent隔离机制在生产环境100%不可用（至少6次尝试全部失败）。所有创作管线必须在主agent内执行，同时补上人工隔离闸门（文件输入协议+步骤间无上下文泄漏）。"
    evidence: "会话2e5e943d中3次路由全部gateway失败；会话0bcaa832中同样失败→最终OpenClaw崩溃（MODULE_NOT_FOUND）。"
    severity: "P0"
    applicable_to: ["all"]
    discovered_at: "2026-06-08"

  - id: "L005"
    source: "北帝镇诡录"
    lesson: "废弃版本的文件应及时清理或标记为deprecated，避免项目目录膨胀和版本混淆。"
    evidence: "ch01-05 v2版（Directors+骨架+正文+QC → 20个文件）被用户要求删除→全部废弃。海贼法典ch389共存v1/v2/v3三版。"
    severity: "P2"
    applicable_to: ["all", "writing"]
    discovered_at: "2026-06-06"

  - id: "L006"
    source: "海贼法典"
    lesson: "QC自检如果和writer共享同一上下文，事实一致性检查会失效——QC会'理解'writer的意图，而不会发现意图与原文事实的偏差。"
    evidence: "CH389的QC自检查了字数/句式/节奏/爽点分布，全部✅。但多弗关系线的事实错误完全未检测到。"
    severity: "P0"
    applicable_to: ["all", "qa"]
    discovered_at: "2026-06-08"

