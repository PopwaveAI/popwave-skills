  <script id="book-data" type="application/json">{"schema_version": "1.0", "book": {"title": "暗恋橘生淮南", "author": "八月长安", "score_range": "5.5—7.5", "meta_line": "八月长安振华系列 · 校园暗恋 · 心理写实"}, "theme": "diary-orange", "pages": [{"page_no": 1, "type": "cover", "layout": "editorial", "eyebrow": "一本书值不值得看？", "title": "暗恋橘生淮南", "highlight": "暗恋", "subtitle": "八月长安 · 青春暗恋 · 心理写实", "blocks": [{"kind": "quote", "text": "一段从被无视开始的漫长暗恋，最后面对的敌人却是对方心中的影子。"}, {"kind": "lede", "text": "洛枳从高中就开始暗恋盛淮南，考进同一所大学后她一步步走进他的世界，却发现他要确认的从来不是她的感情，而是她是不是别人的替代品。"}, {"kind": "tags", "items": ["青春校园", "暗恋文", "心理写实", "双向试探"]}], "footer": "青春 · 校园 · 暗恋"}, {"page_no": 2, "type": "hook", "layout": "editorial", "eyebrow": "核心梗", "title": "它与同类暗恋故事有什么不同", "highlight": "不同", "subtitle": "", "blocks": [{"kind": "cards", "items": [{"title": "身份落差", "text": "女方从高中就认识对方，男方完全不记得她。她不是被遗忘的暗恋者，而是一段被他彻底忽略的过去。"}, {"title": "表层目标", "text": "洛枳的目标不是“追到他”，而是让他习惯自己的存在，在不出局的前提下一点一点走近，等他先发现自己已经离不开她。"}, {"title": "核心阻力", "text": "盛淮南的前女友叶展颜像一道影子，每次关系升温就被她的一条短信或一条信息打回原形。"}, {"title": "差异机制", "text": "这不是单方面追求的故事，而是双向试探——他反复确认她的感情是否真诚，她反复确认他心里是否还有别人。"}]}, {"kind": "panel", "title": "真正的故事问题", "text": "当暗恋从一个秘密变成两个人的问题，最难的部分不是说出来，而是确认对方喜欢的究竟是真实的自己，还是他想象中的那个影子。"}], "footer": "核心梗"}, {"page_no": 3, "type": "synopsis", "layout": "timeline", "eyebrow": "故事梗概", "title": "无剧透地讲清故事方向", "highlight": "故事方向", "subtitle": "", "blocks": [{"kind": "steps", "items": [{"title": "开局", "text": "洛枳考进P大，发现高中暗恋的盛淮南根本不记得她这个人。她带着一份弄丢的日记和满脑子的回忆，独自面对一个从零开始的关系。"}, {"title": "靠近", "text": "超市门口的一场偶遇让两人有了第一次正式对话。洛枳不需要刻意主动，她只是不回避，让盛淮南逐渐习惯她的存在。"}, {"title": "失衡", "text": "关系每次升温都被打断——前女友的短信、第三方的告密、许日清的假短信。洛枳发现自己要竞争的不是他的好感，而是他记忆中的完美初恋。"}, {"title": "方向", "text": "故事走向不是一场告白解决一切的童话，而是两个信息不对称的人在反复进退中各自面对“要不要继续”的选择。"}]}, {"kind": "panel", "title": "故事推进的轴心", "text": "关系变化的驱动力一直是信息差的缩小与扩大：双方知道什么、不知道什么、听信了什么，直接决定了他们下一步是靠近还是后退。"}], "footer": "无剧透梗概"}, {"page_no": 4, "type": "characters", "layout": "grid", "eyebrow": "人物角色卡", "title": "谁值得关注", "highlight": "", "subtitle": "", "blocks": [{"kind": "cards", "items": [{"title": "洛枳", "text": "P大学生，沉默善观察，内心活动极丰富。她的内在驱动力不是追到盛淮南，而是被看见真实的自己，但她又不敢让他知道自己已经喜欢了这么多年。"}, {"title": "盛淮南", "text": "校园风云人物，外表完美内心摇摆。他不是高冷男主——他是真的不确定洛枳喜欢的是他本人还是他的光环，这个问题贯穿了他们的整个关系。"}, {"title": "丁水婧", "text": "洛枳的高中同学，退学后重考美院。敏感矛盾，同时接触两人并告了密。她不是脸谱化破坏者，在嫉妒、渴望被在乎和复杂善意之间摇摆。"}, {"title": "江百丽", "text": "洛枳室友，热心但在恋爱中失去自我。她的感情走向是洛枳的对照镜，展示了暗恋关系中另一种极端——完全放弃自己去迎合对方。"}]}, {"kind": "panel", "title": "群像功能", "text": "每一个配角都不是为了让主角好过或难过而存在的——叶展颜是盛淮南心理问题的根源，丁水婧是洛枳对“被看见”这件事的另一种考验，江百丽是照出洛枳清醒一面的镜子。"}], "footer": "人物角色卡"}, {"page_no": 5, "type": "chemistry", "layout": "relationship", "eyebrow": "关系化学", "title": "双向试探如何成为故事的引擎", "highlight": "双向试探", "subtitle": "", "blocks": [{"kind": "formula", "items": ["洛枳：被看见真实的自己", "盛淮南：确认对方感情是否纯粹"]}, {"kind": "cards", "items": [{"title": "洛枳的防御：沉默地靠近", "text": "她不说“我喜欢你”，不制造偶遇，只是安静地出现在他生活里。这种防御让她安全，但也让盛淮南永远没法确认她的心思到底多深。"}, {"title": "盛淮南的防御：反复确认", "text": "他试过冷淡她、把她退到朋友区、被第三方信息影响判断。每一种后退都不是冷漠，都是他在确认——他不敢在不确定的情况下投入感情，因为前一段关系的结束方式让他对“确定”的门槛极高。"}]}, {"kind": "panel", "title": "关系向前的标志", "text": "这段关系每往前一步，都是两人中至少有一方放下了“万一他不是/她不是”的假设。真正好看的节点不是亲密的瞬间，而是其中一方选择信一次的时候。"}], "footer": "关系化学"}, {"page_no": 6, "type": "structure", "layout": "editorial", "eyebrow": "世界与结构", "title": "读者需要知道的故事结构", "highlight": "", "subtitle": "", "blocks": [{"kind": "cards", "items": [{"title": "前序与序章", "text": "以番外视角引入片段式的初遇记忆，然后切到大学开学，洛枳独自面对从零开始的暗恋。这是一段需要耐心的铺陈阶段。"}, {"title": "从零开始的关系", "text": "盛淮南完全不记得她——这意味着她拥有多年的情感积累，但对方眼里她只是一个陌生人。这个信息差是前半段所有张力的来源。"}, {"title": "第三方介入", "text": "丁水婧告密内容、许日清假短信、叶展颜的反复出现——这些外部干扰不是狗血，是不断打破“两人世界”幻觉的结构工具。"}, {"title": "反复进退的甜涩节奏", "text": "关系几乎遵循“甜—涩—甜—涩”的轮替模式，一段甜蜜靠近几乎总是跟着一段受伤反弹，形成独特的阅读节奏。"}]}, {"kind": "route", "items": ["大学初遇", "逐渐靠近", "外部干扰", "各自面对选择"]}], "footer": "故事结构"}, {"page_no": 7, "type": "selling_points", "layout": "grid", "eyebrow": "具体卖点", "title": "好看具体发生在哪里", "highlight": "", "subtitle": "", "blocks": [{"kind": "cards", "items": [{"title": "有据可查的感情推进", "text": "关系每次升级都有具体事件做锚点：超市解围→约会→牵手→退回朋友→雨中和好。每一步都能追溯到对话，而非笼统的“他们就在一起了”。边界的代价是慢热。"}, {"title": "第三方悬念的真实层次", "text": "丁水婧的告密、假短信、叶展颜的影响力——这些是真的谜题而非缝合的误会。它们的揭晓构成阅读驱动力。缺点是三个角色退出方式都比较仓促。"}, {"title": "前期细节的回收回报", "text": "热水踩脚→热水情结→叶展颜相识场景、扛包记忆→暗恋的持久感。伏笔是真实的伏笔，不是随手写的，后面确实会翻出来用。但不是每个都回收得有力。"}, {"title": "暗恋的实体化体验", "text": "洛枳的内心独白不是注水词——她把“暗恋”从抽象概念写成了一张从早到晚的情感账单：观察他不经意的动作、计算自己在他生活中的分量、反复修改对他的判断。"}]}, {"kind": "panel", "title": "强项边界", "text": "这些优点高度服务于“能接受慢热心理写实校园题材”的读者。如果追求章节级的强推力，这些精心设计的细节反而会成为被跳过的东西。"}], "footer": "卖点"}, {"page_no": 8, "type": "risks", "layout": "warning", "eyebrow": "阅感与避雷", "title": "哪些人可能会弃书", "highlight": "弃书", "subtitle": "", "blocks": [{"kind": "radar", "items": [{"label": "人物", "value": 7.5}, {"label": "剧情", "value": 6.0}, {"label": "关系", "value": 8.0}, {"label": "文风", "value": 8.0}, {"label": "世界", "value": 5.0}, {"label": "节奏", "value": 5.5}]}, {"kind": "warning", "title": "明确阅读门槛", "items": ["男主在洛枳和前任之间反复摇摆，让人难以判断他的真心", "序章和开头几章几乎无情节推进，对耐心要求极高", "重要配角（丁水婧、叶展颜）退出方式比较草率", "几乎没有持续三章以上的纯粹甜蜜期，甜涩交替频繁"]}, {"kind": "panel", "title": "争议如何理解", "text": "盛淮南的摇摆不是作者写着玩的，而是叶展颜“被分手”对他的心理影响——他不是不爱洛枳，是他不敢在不确定的时候投入。能理解这一点的读者不会被劝退，不能接受的会觉得男主不值得，这种分歧是正常的题材选择问题。"}], "footer": "避雷"}, {"page_no": 9, "type": "verdict", "layout": "verdict", "eyebrow": "最终结论", "title": "它到底适合谁", "highlight": "适合谁", "subtitle": "", "blocks": [{"kind": "audience", "items": {"recommended": ["八月长安振华系列老读者", "能接受慢热心理写实校园的读者", "对暗恋有共鸣的读者", "喜欢大量内心独白和细腻描写的读者"], "avoid": ["每章都要有强情节推力的读者", "对男主犹豫不决零容忍的读者", "无法接受内心戏多于对话的读者", "需要感情线快速推进的读者"]}}, {"kind": "verdict", "title": "5.5—7.5", "text": "人设和感情线达到同题材顶尖水准，节奏控制和配角收尾有明显短板。评分范围宽的背后逻辑是：它在精准目标读者那里值五星，在及格线读者那里也确实勉强。这不是一本中庸的小说，而是一本在特定方向上做到极致、在其他维度有明显取舍的作品。"}, {"kind": "panel", "title": "为什么值得试读", "text": "如果你真的暗恋过一个人很久很久，这本小说里一定有一个段落让你觉得——有人曾经把你脑子里的东西，一字不差地写了出来。那种被理解的瞬间，就是阅读这本书最值得的时刻。"}], "footer": "最终推荐"}]}</script>

    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const layouts=new Set(['editorial','grid','timeline','relationship','dashboard','warning','verdict']);
    document.body.dataset.theme=data.theme||'literary-red';
    function markedTitle(p){const raw=String(p.title||''),mark=String(p.highlight||'');if(!mark||!raw.includes(mark))return esc(raw);return raw.split(mark).map(esc).join(`<em>${esc(mark)}</em>`)}
    function itemCard(x){return `<div class="card"><h3>${esc(x.title||x.label||'')}</h3><p>${esc(x.text||'')}</p></div>`}
    function stringValue(x){return typeof x==='string'?x:(x.label||x.title||x.text||x.value||'')}
    function block(b){
      if(b.kind==='quote')return `<div class="block quote">${esc(b.text)}</div>`;
      if(b.kind==='lede')return `<div class="block lede">${esc(b.text)}</div>`;
      if(b.kind==='paragraph')return `<div class="block paragraph">${esc(b.text)}</div>`;
      if(b.kind==='panel')return `<div class="block panel"><h3>${esc(b.title)}</h3><p>${esc(b.text)}</p></div>`;
      if(b.kind==='cards'||b.kind==='card')return `<div class="block cards">${(b.items||[b]).map(itemCard).join('')}</div>`;
      if(b.kind==='steps'||b.kind==='step')return `<div class="block steps">${(b.items||[]).map((x,i)=>`<div class="step"><b>${i+1}</b><div><h3>${esc(x.title)}</h3><p>${esc(x.text)}</p></div></div>`).join('')}</div>`;
      if(b.kind==='tags')return `<div class="block tags">${(b.items||[]).map(x=>`<span class="tag">${esc(stringValue(x))}</span>`).join('')}</div>`;
      if(b.kind==='route')return `<div class="block route">${(b.items||[]).map((x,i)=>`${i?'<i>→</i>':''}<span>${esc(stringValue(x))}</span>`).join('')}</div>`;
      if(b.kind==='formula')return `<div class="block formula">${(b.items||[]).map((x,i)=>`${i?'<i>×</i>':''}<span>${esc(stringValue(x))}</span>`).join('')}</div>`;
      if(b.kind==='bullets')return `<div class="block"><ul>${(b.items||[]).map(x=>`<li>${esc(stringValue(x))}</li>`).join('')}</ul></div>`;
      if(b.kind==='warning')return `<div class="block warning"><h3>${esc(b.title||'阅读门槛')}</h3><ul>${(b.items||[]).map(x=>`<li>${esc(stringValue(x))}</li>`).join('')}</ul></div>`;
      if(b.kind==='metrics')return `<div class="block metrics">${(b.items||[]).map(x=>`<div class="metric"><b>${esc(x.value)}</b><span>${esc(x.label)}</span></div>`).join('')}</div>`;
      if(b.kind==='radar')return `<div class="block radar">${(b.items||[]).map(x=>{const value=Math.max(0,Math.min(10,Number(x.value)||0));return `<div class="radar-row"><span>${esc(x.label)}</span><div class="radar-track"><div class="radar-fill" style="width:${value*10}%"></div></div><b>${value}</b></div>`}).join('')}</div>`;
      if(b.kind==='audience'){const x=b.items||{};return `<div class="block audience"><div><h3>✓ 推荐给</h3><ul>${(x.recommended||[]).map(v=>`<li>${esc(v)}</li>`).join('')}</ul></div><div><h3>× 不推荐给</h3><ul>${(x.avoid||[]).map(v=>`<li>${esc(v)}</li>`).join('')}</ul></div></div>`}
      if(b.kind==='verdict')return `<div class="block verdict"><h3>${esc(b.title)}</h3><p>${esc(b.text)}</p></div>`;
      return '';
    }
    const total=data.pages.length;
    data.pages.forEach(p=>{const el=document.createElement('section');const layout=layouts.has(p.layout)?p.layout:'editorial';el.className=`page layout-${layout} ${p.type==='cover'?'cover':''}`;el.dataset.page=p.page_no;el.innerHTML=`<div class="top"><span>${esc(p.eyebrow)}</span><span class="num">${String(p.page_no).padStart(2,'0')}</span></div><h1 style="display:${p.type==='cover'?'block':'none'}">${markedTitle(p)}</h1><h2 style="display:${p.type==='cover'?'none':'block'}">${markedTitle(p)}</h2>${p.subtitle?`<p class="subtitle">${esc(p.subtitle)}</p>`:''}<div class="blocks">${(p.blocks||[]).map(block).join('')}</div><div class="footer"><span>${esc(p.footer||data.book.title)}</span><span>${String(p.page_no).padStart(2,'0')} / ${String(total).padStart(2,'0')}</span></div>`;document.body.appendChild(el)});
    const page=new URLSearchParams(location.search).get('page');if(page){document.body.classList.add('single');document.querySelectorAll('.page').forEach(el=>el.style.display=el.dataset.page===page?'block':'none')}
    function runQA(){const report=[...document.querySelectorAll('.page')].map(el=>{const blocks=el.querySelector('.blocks'),footer=el.querySelector('.footer');const overflow=blocks.getBoundingClientRect().bottom>footer.getBoundingClientRect().top-14;el.dataset.overflow=String(overflow);return{page:Number(el.dataset.page),overflow,contentBottom:Math.round(blocks.getBoundingClientRect().bottom),footerTop:Math.round(footer.getBoundingClientRect().top)}});window.__BOOK_QA__=report;if(report.some(x=>x.overflow))console.error('BOOK_QA_OVERFLOW',report.filter(x=>x.overflow))}
    Promise.resolve(document.fonts&&document.fonts.ready).then(()=>requestAnimationFrame(()=>requestAnimationFrame(runQA)));
  </script>
</body>
</html>
