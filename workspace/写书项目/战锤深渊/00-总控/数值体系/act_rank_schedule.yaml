# act_rank_schedule.yaml — 卷级升级排期
# 追溯自：L1-02 力量体系 v2 | 超凡者 Lv1-20 → 传奇 20+
# 说明：每卷江轩的超凡者等级预期 + 核心突破 + 种子觉醒进度

acts:
  - act: "卷1·混沌潮"
    chapter_range: "1-30"
    level_start: "超凡者 Lv1（零装备零技能）"
    level_end: "超凡者·高阶 Lv14-15"
    seed_awakening_start: 0%
    seed_awakening_end: 10%
    key_breakthroughs:
      - "从 Lv1 开始冒险者生涯，快速爬升至 Lv5-7（生存升级期）"
      - "获得第一件魔法物品/职业专长（Lv3-5）"
      - "获得第一枚神性火花（卷1结尾 → 突破传奇之门的门票）"
      - "第一次感知到灰骑士种子的主动反应（非力量，被动预警）"
    pacing: "前期升级快（生存驱动），中后期稳定"
    tone: "绝望中找立足点——从零到有"

  - act: "卷2·深渊使徒"
    chapter_range: "31-65"
    level_start: "超凡者·高阶 Lv15"
    level_end: "超凡者·巅峰 Lv20（凡骨极限）"
    seed_awakening_start: 10%
    seed_awakening_end: 30%
    key_breakthroughs:
      - "第一次进入深渊（Lv15+）"
      - "第一次主动使用种子力量救人（种子 20% 觉醒触发）"
      - "获得第二枚神性火花"
      - "从萝丝手中获得传奇之门的线索/条件"
    pacing: "中速稳定升级，深渊严酷环境对应高经验值"
    tone: "灰色探索——力量与代价同步增长"

  - act: "卷3·灰烬觉醒"
    chapter_range: "66-100"
    level_start: "超凡者·巅峰 Lv20"
    level_end: "传奇中段 → 高段"
    seed_awakening_start: 30%
    seed_awakening_end: 70%
    key_breakthroughs:
      - "突破传奇之门（卷3初 — Lv20→传奇的战力质变）"
      - "种子半觉醒（保护所爱之人时濒死触发 30%→50%）"
      - "感官异化开始——看见亚空间波纹，听见灵能回响"
      - "对混沌四神之一的一次有效反击"
    pacing: "卷3中段有一次力量暴涨（种子半觉醒），后续进入代价期"
    tone: "力量上天堂，人性下地狱"

  - act: "卷4·诸神黄昏"
    chapter_range: "101-140"
    level_start: "传奇高段"
    level_end: "传奇巅峰（准神）→ 神格等级入口"
    seed_awakening_start: 70%
    seed_awakening_end: 100%（或封印抉择）
    key_breakthroughs:
      - "种子完全觉醒 vs 封印种子的终极选择"
      - "封神还是不封神——故事主题的终极回答"
      - "外神苏醒——力量体系之外的无解威胁降临"
    pacing: "密集高强度决战"
    tone: "终局——所有代价结算日"

# —— 核心原则 ——
rules:
  - "不跨卷跳级：超凡者阶段每卷升 5-8 级（含剧情奖励等级）"
  - "种子觉醒度不通过刷怪提升——只有关键剧情事件能触发"
  - "每卷至少有一次 '力量升级专属战役'——通过战斗证明新获得的力量"
