# combat_capability.yaml — 段位属性表
# 追溯自：L1-02 力量体系 v3（含DND 3.5e六维属性）
# 段位 + 典型属性范围 + 攻击力 + 突破条件

ranks:
  - name: "超凡·低阶"           # Lv1-5
    min_attack: 1
    max_attack: 10
    typical_stats:               # 核心战斗属性典型范围
      str: "10-14"
      dex: "10-14"
      con: "10-14"
    breakthrough: "职业能力成熟 + 基础法术位扩增 → 超凡·中阶"
    combat_role: "打工级"
    weakness: "只有基础职业能力，对混沌无特殊抗性"
    iconic_scene: "用职业核心技能在混战中完成首次关键击杀"

  - name: "超凡·中阶"           # Lv6-10
    min_attack: 10
    max_attack: 35
    typical_stats:
      str: "12-16"
      dex: "12-17"
      con: "12-16"
    breakthrough: "掌握4-6环法术/等价职业能力 → 超凡·高阶"
    combat_role: "单挑中/群战辅"
    weakness: "施法/能力已开始产生亚空间痕迹，但本人没意识到"
    iconic_scene: "在城市保卫战中单独击败一个混沌狂战士群"

  - name: "超凡·高阶"           # Lv11-15
    min_attack: 35
    max_attack: 80
    typical_stats:
      str: "14-18"
      dex: "14-19"
      con: "14-18"
    breakthrough: "涉足位面认知 → 超凡·巅峰"
    combat_role: "单挑强"
    weakness: "亚空间足迹已永久化，混沌教团可通过仪式追踪"
    iconic_scene: "在深渊上层探险，与恶魔单挑存活"

  - name: "超凡·巅峰"           # Lv16-20
    min_attack: 80
    max_attack: 150
    typical_stats:
      str: "16-20"
      dex: "16-20(超凡)"
      con: "16-20(超凡)"
    breakthrough: "获得第一枚神性火花 → 传奇初段"
    combat_role: "精英单挑/小团核心"
    weakness: "凡骨之躯已达极限，再往上必须有质变"
    iconic_scene: "与恶魔领主的化身正面交手且不落下风"

  - name: "传奇初段"             # 20+
    min_attack: 150
    max_attack: 300
    typical_stats:
      str: "18-22"
      dex: "18-22"
      con: "18-22"
    breakthrough: "第二枚神性火花 + 领域雏形 → 传奇中段"
    combat_role: "军团级"
    weakness: "神性力量开始吸引混沌关注"
    iconic_scene: "单独击退一个恶魔领主的本体"

  - name: "传奇中段"             # 20+
    min_attack: 300
    max_attack: 600
    typical_stats:
      str: "20-24"
      dex: "20-24"
      con: "20-24"
    breakthrough: "第三枚神性火花 + 种子觉醒≥30% → 传奇高段"
    combat_role: "军团碾压级"
    weakness: "混沌四神已标记——你在地球上的每一步都被注视着"
    iconic_scene: "在深渊中一战成名，恶魔领主开始避战"

  - name: "传奇高段"             # 20+
    min_attack: 600
    max_attack: 1200
    typical_stats:
      str: "22-25(传奇)"
      dex: "22-25(传奇)"
      con: "22-25(传奇)"
    breakthrough: "完整领域雏形 + 种子觉醒≥50% → 传奇巅峰"
    combat_role: "战线级"
    weakness: "存在本身扰动周边环境，无法隐藏"
    iconic_scene: "一人对抗整支混沌军团，逼出四神化身"

  - name: "传奇巅峰"             # 20+
    min_attack: 1200
    max_attack: 2500
    typical_stats:
      str: "24-28"
      dex: "24-28"
      con: "24-28"
    breakthrough: "完整神格雏形 + 信仰基础 → 神格等级"
    combat_role: "准神级"
    weakness: "封神=外神探知。不封神=传奇天花板到头"
    iconic_scene: "在四神化身围攻中守住最后一城"

# —— 灰骑士种子修正参数 ——
seed_bonus:
  description: "灰骑士种子对混沌/恶魔单位提供额外压制"
  mechanic: "对混沌阵营单位，战力等效 +1 小阶（峰值期可达 +1 大阶）"
  penalty: "每次种子能力主动激活 → 觉醒度 +5~10%，觉醒>50%后加速不可逆"

# —— 属性与等级的联动规则 ——
attribute_rules:
  level_to_stat_point: "每2职业等级获得1点自由属性点"
  stat_cap_mundane: 20     # 超凡门槛
  stat_cap_legendary: 25   # 传奇门槛
  stat_cap_divine: 30      # 神性之壁
  stat_gap_dominance: 5     # 差距≥5产生压制
  stat_gap_immunity: 10     # 差距≥10几乎无法造成有效伤害
