# act-01.yaml — 幕1「潮起」CH1-10
# 卷1: 混沌潮 · 幕1
# 剧情线源: 设计/卷/volume-01.md §四

_meta:
  version: "v6.3"
  volume_ref: "设计/卷/volume-01.md"
  act_number: 1
  chapter_range: [ch1, ch10]

act:
  purpose:
    for_book: "卷1的起手式——让读者在10章内完成'世界观锚定 + 主角共情 + 核心悬念建立'三步走"
    for_reader: "从绝望中的求生到初获希望的转折。读者应该：①知道这个世界有多危险 ②开始关心江轩能不能活 ③想知道灰骑士种子到底是什么"

  conflict:
    stakes: "江轩如果死在这里——没人记得他来过。混沌裂缝继续扩大，四神离目标更近一步"
    escalation: "CH1 被堵死路 → CH2 被迫首杀 → CH3-4 墓穴探索 → CH5-6 策划突围 → CH7-8 荒野追杀 → CH9-10 抵达竖琴手"

chapters:

  # ════════════════════════════════
  # CH1 阴沟
  # 穿越+混沌屠城+被堵·开局就推入绝境
  # ════════════════════════════════
  - ch: 1
    title: "阴沟"
    word_count: 3000
    canvas:
      payoff_summary: 1
      设定线: "灰骑士种子: 左手符文发光·感知混沌; 瑟尔镇; 混沌教团·血斧: 屠城"
      设线负载: 1
      主线1: "混沌教团屠城→亚空间裂缝在矿井撕裂·战斗祭司在搜索银色印记"
      主线1_payoff: "中"
      主线2: "穿越·零战力·种子首次被动感知(帮躲过一次巡视)"
      主线2_payoff: "小"
      主线3: "阴沟苏醒→躲避巡逻→被堵在死胡同"
      主线3_payoff: "空"
      支线1: "—"
      支线1_payoff: ""
      note: "开场画面——直接扔进绝境"
    登场角色: ["江轩"]
    emotional_goal: "绝望窒息→强迫冷静→被逼到墙角"
    payoff_note: "混沌屠城世界观证言(中)+种子首次感知(小)"
    end_hook:
      type: "悬念"
      drive: "死胡同。高墙。前方混沌狂战士逼近。左手符文炽热——没有退路了。"
    chekhov_set: ["混沌战斗祭司的灵能搜索·银色印记"]
    chekhov_fire: []

  # ════════════════════════════════
  # CH2 第一次
  # 首杀！环境+种子闪光→击杀混沌狂战士→升级Lv2
  # ════════════════════════════════
  - ch: 2
    title: "第一次"
    word_count: 3500
    canvas:
      payoff_summary: 1
      设定线: "混沌狂战士≈超凡·低阶; 击杀获得杀戮经验→升级机制"
      设线负载: 1
      主线1: "狂战士逼近——等死还是拼了？"
      主线1_payoff: "中"
      主线2: "首次主动战斗: 碎酒瓶+石灰粉+种子一次性闪光干扰→击杀狂战士→Lv0→Lv2"
      主线2_payoff: "中"
      主线3: "首杀→搜到混沌匕首和染血笔记→翻墙逃入地下墓穴"
      主线3_payoff: "中"
      支线1: "—"
      支线1_payoff: ""
      note: "首杀章——读者看到'他能打'"
    登场角色: ["江轩", "混沌狂战士(无名·被击杀)"]
    emotional_goal: "无路可退的恐惧→爆发→首杀的震撼(手在抖)→逃出生天的喘息"
    payoff_note: "首杀(中)+升级Lv2(中)+战利品(中)=中爽点章"
    end_hook:
      type: "情绪"
      drive: "墓穴石壁上，江轩看着沾血的手。远处传来战斗祭司的声音:'他杀了我的人。往墓穴去了。追。'"
    chekhov_set: ["混沌匕首(附微弱混沌能·可用但危险)", "染血笔记(记载银色印记猎杀令)"]
    chekhov_fire: ["种子发光→被迫反击(CH1→CH2兑现)"]

  # ════════════════════════════════
  # CH3 墓穴中的人
  # 探索+老牧师日记+遇到卡珊德拉
  # ════════════════════════════════
  - ch: 3
    title: "墓穴中的人"
    word_count: 3000
    canvas:
      payoff_summary: 1
      设定线: "晨曦教堂地下墓穴; 诸神陨落的实感"
      设线负载: 1
      主线1: "老牧师殉道前的日记——'不止瑟尔镇，各地都有裂缝'"
      主线1_payoff: "小"
      主线2: "首杀后整理冲击→查看属性面板→确认升级机制"
      主线2_payoff: "小"
      主线3: "墓穴探索→发现日记→遇到第二名幸存者"
      主线3_payoff: "小"
      支线1: "老牧师笔记边缘有至上真神标记"
      支线1_payoff: "小"
      note: "世界观+角色双推进"
    登场角色: ["江轩", "卡珊德拉(幸存者·商人之女·约20岁·断臂)"]
    emotional_goal: "黑暗中的喘息→查看属性的紧张→遇见另一个人的复杂"
    payoff_note: "世界观扩大(小)+卡珊德拉登场(小)"
    end_hook:
      type: "信息"
      drive: "日记最后一页:'他们在找一个银色印记的灵魂——像种子一样的东西。而你，带着它穿越了世界之间的裂缝。'"
    chekhov_set: ["卡珊德拉的吊坠(微弱防护灵光·她自己不知道)"]
    chekhov_fire: ["首杀笔记+日记→猎杀者动机确认"]

  # ════════════════════════════════
  # CH4 两种选择
  # 决定路线+策划出逃
  # ════════════════════════════════
  - ch: 4
    title: "两种选择"
    word_count: 3500
    canvas:
      payoff_summary: 1
      设定线: "术士职业体系(基于穿越者知识的选择)"
      设线负载: 1
      主线1: "墓穴密道通往镇外——但混沌已在出口布防"
      主线1_payoff: "空"
      主线2: "江轩思考职业方向→术士路线确定(靠血统不需图书馆)→Lv3"
      主线2_payoff: "中"
      主线3: "与卡珊德拉达成临时合作→分工搜集物资→策划出逃"
      主线3_payoff: "小"
      支线1: "卡珊德拉提到博德之门'新教会'(至上真神)"
      支线1_payoff: "小"
      note: "合作确立+职业选择"
    登场角色: ["江轩", "卡珊德拉"]
    emotional_goal: "在绝境中有了选择权→谨慎的乐观"
    payoff_note: "术士路线确定(中)+升级Lv3(中)"
    end_hook:
      type: "悬念"
      drive: "密道出口缝隙——月光下混沌广场法阵中央，有什么东西正在裂缝中成形"
    chekhov_set: ["术士路线(靠血统施法·魅力的关联)"]
    chekhov_fire: ["与卡珊德拉合作关系(CH3→CH4确立)"]

  # ════════════════════════════════
  # CH5 月下突围
  # 首次主动施法+突袭法阵+逃出瑟尔镇
  # ════════════════════════════════
  - ch: 5
    title: "月下突围"
    word_count: 4000
    canvas:
      payoff_summary: 1
      设定线: "术士施法机制(血统/魅力联动); 亚空间反馈(施法后头晕)"
      设线负载: 1
      主线1: "法阵正在召唤中阶恶魔——成功就跑不掉了"
      主线1_payoff: "中"
      主线2: "江轩首次正式施法→毁法阵一角→Lv3→Lv5"
      主线2_payoff: "中"
      主线3: "突袭→放法术→趁混乱带卡珊德拉突围"
      主线3_payoff: "中"
      支线1: "—"
      支线1_payoff: ""
      note: "首次施法+首次合作战斗=爽点章"
    登场角色: ["江轩", "卡珊德拉", "混沌战斗祭司(小Boss)", "混沌狂战士(杂兵)"]
    emotional_goal: "计划紧张→突袭爆发→成功释放→逃出生天的喘息"
    payoff_note: "法术毁阵(中)+升级Lv5(中)=中爽点"
    end_hook:
      type: "悬念"
      drive: "回头——裂缝中一只巨大的手正在伸出。只差几分钟。"
    chekhov_set: ["江轩的法术反噬(施法后头晕·亚空间反馈)"]
    chekhov_fire: ["密道发现(CH4→CH5兑现)"]

  # ════════════════════════════════
  # CH6 荒野跋涉
  # 过渡+角色关系升温+至上真神情报
  # ════════════════════════════════
  - ch: 6
    title: "荒野跋涉"
    word_count: 3000
    canvas:
      payoff_summary: 1
      设定线: "剑湾荒野地理; 野外生存"
      设线负载: 1
      主线1: "裂缝已在剑湾多处出现——沿途看到被毁村落"
      主线1_payoff: "小"
      主线2: "江轩练习法术→Lv6·获得2环法术"
      主线2_payoff: "小"
      主线3: "目标: 博德之门·竖琴手据点"
      主线3_payoff: "空"
      支线1: "卡珊德拉的博德见闻——至上真神快速扩张"
      支线1_payoff: "小"
      note: "过渡+角色升温"
    登场角色: ["江轩", "卡珊德拉"]
    emotional_goal: "逃亡路上微妙的喘息→从'临时队友'到分享故事"
    payoff_note: "被毁村落(小)+支线加厚(小)"
    end_hook:
      type: "信息"
      drive: "卡珊德拉:'你的手刚才发光了——你知道它是什么吗？' 江轩沉默。"
    chekhov_set: []
    chekhov_fire: ["卡珊德拉吊坠(微量·未消耗)"]

  # ════════════════════════════════
  # CH7 猎杀者
  # 首杀混沌小队+施法暴露的两难
  # ════════════════════════════════
  - ch: 7
    title: "猎杀者"
    word_count: 3500
    canvas:
      payoff_summary: 1
      设定线: "混沌追踪手段(亚空间痕迹定位施法者)"
      设线负载: 0
      主线1: "血斧猎杀小队追踪到江轩的施法痕迹——追上来了"
      主线1_payoff: "中"
      主线2: "江轩意识到: 不用法术=打不过; 用法术=暴露位置"
      主线2_payoff: "小"
      主线3: "设陷阱→伏击→首杀混沌小队(3人)→Lv8"
      主线3_payoff: "中"
      支线1: "—"
      支线1_payoff: ""
      note: "战术战斗——江轩开始运用脑子"
    登场角色: ["江轩", "卡珊德拉", "血斧猎杀小队(3人)"]
    emotional_goal: "追踪的紧迫→设伏的紧张→击杀释放→代价认知"
    payoff_note: "首杀混沌小队(中)+升Lv8(中)+施法代价认知(小)"
    end_hook:
      type: "悬念"
      drive: "猎杀队长死前:'恐虐记住了你的味道……你跑不掉的。'"
    chekhov_set: ["江轩的亚空间痕迹越来越清晰"]
    chekhov_fire: []

  # ════════════════════════════════
  # CH8 竖琴手的羽毛
  # 对接竖琴手
  # ════════════════════════════════
  - ch: 8
    title: "竖琴手的羽毛"
    word_count: 3000
    canvas:
      payoff_summary: 1
      设定线: "竖琴手: 费伦混沌早期预警网"
      设线负载: 1
      主线1: "竖琴手据点收到瑟尔镇沦陷报告→确认混沌入侵规模"
      主线1_payoff: "小"
      主线2: "江轩做出第一个主动选择: 不再逃跑→去找竖琴手"
      主线2_payoff: "小"
      主线3: "抵达博德之门周边→找到竖琴手联络人"
      主线3_payoff: "小"
      支线1: "街头看到至上真神布道者——整齐干净不像邪教"
      支线1_payoff: "小"
      note: "势力对接——新空间打开"
    登场角色: ["江轩", "卡珊德拉", "渡鸦(竖琴手联络人·古董商伪装)"]
    emotional_goal: "抵达文明→放松→新警惕"
    payoff_note: "竖琴手亮相(小)+博德之城(小)"
    end_hook:
      type: "信息"
      drive: "渡鸦看到江轩手掌后面色一变:'我们找了你很久。不止我们在找。'"
    chekhov_set: ["渡鸦的组织内部——关于银色印记说法不一致"]
    chekhov_fire: []

  # ════════════════════════════════
  # CH9 博德之门的阴影
  # 加厚城市设定+至上真神+散塔林线索
  # ════════════════════════════════
  - ch: 9
    title: "博德之门的阴影"
    word_count: 3000
    canvas:
      payoff_summary: 1
      设定线: "博德之门: 议会制/商路枢纽/至上真神渗透"
      设线负载: 1
      主线1: "渡鸦给出全图: 17处裂缝·4教团·2/5议员已被渗透"
      主线1_payoff: "中"
      主线2: "江轩第一次身处文明——必须学隐藏身份"
      主线2_payoff: "小"
      主线3: "在安全屋安顿→了解博德情报网络→拿到遗迹方位"
      主线3_payoff: "小"
      支线1: "至上真神在码头区公开布道——'拥抱新神'"
      支线1_payoff: "小"
      note: "城市设定+势力格局展开"
    登场角色: ["江轩", "卡珊德拉", "渡鸦"]
    emotional_goal: "进入文明→意识到文明也在腐烂→不安"
    payoff_note: "全图情报展开(中)+博德势力格局(小)"
    end_hook:
      type: "悬念"
      drive: "渡鸦:'议员里有混沌的人。他们知道了你。一周内必须离开。'"
    chekhov_set: ["博德之门内鬼议员", "散塔林接头人·铁手套"]
    chekhov_fire: []

  # ════════════════════════════════
  # CH10 代价
  # 种子真相+第一枚火花线索+幕1收官
  # ════════════════════════════════
  - ch: 10
    title: "代价"
    word_count: 3500
    canvas:
      payoff_summary: 2
      设定线: "灰骑士种子: 来源不明·四神首要目标·不可剥离"
      设线负载: 1
      主线1: "全图: 17裂缝·4教团·费伦被蚕食"
      主线1_payoff: "中"
      主线2: "种子真相: '不是随机选中，种子是有意识穿越的'"
      主线2_payoff: "大"
      主线3: "江轩决策: 接受竖琴手帮助→保留最终选择权→去古代遗迹找第一枚火花"
      主线3_payoff: "中"
      支线1: "渡鸦提到博德议会在推动'接纳新神'(至上真神渗透)"
      支线1_payoff: "小"
      note: "幕1收官——核心悬念升级"
    登场角色: ["江轩", "卡珊德拉", "渡鸦"]
    emotional_goal: "获得答案→答案带来更重的问题→'知道了不代表能活'"
    payoff_note: "种子真相(大)+竖琴手情报(中)=大串联"
    end_hook:
      type: "悬念"
      drive: "地图上标注了古代遗迹位置(第一枚神性火花)。窗外，血斧教团信鸦落在对面屋顶。"
    chekhov_set: ["第一枚神性火花位置(古代精灵遗迹·幕3目标)"]
    chekhov_fire: ["竖琴手对接(CH8→CH10兑现)", "种子真相追索(CH1到CH10)"]

rhythm_check:
  plotlines: [主线1, 主线2, 主线3, 设定线, 支线1]
  per_line_gaps:
    - line: "主线1"
      max_gap: 3
      actual_gap: 0
    - line: "主线2"
      max_gap: 2
      actual_gap: 0
    - line: "主线3"
      max_gap: 2
      actual_gap: 0
    - line: "设定线"
      max_gap: 2
      actual_gap: 0
  line_density:
    min: 1
    max: 3
    actual_range: "2-3"
  payoff_constraints:
    mid_every_chapter: true
    no_line_dormant_over_3: true
    big_max_gap: 5
    ultimate_min_per_volume: 1
  设线穿透:
    max_consecutive_zero_负载: 2
    consecutive_zero: 0
    负载过载章: []
    per_info_deadlines:
      - info: "灰骑士种子·被动感知"
        deadline: "ch1"
      - info: "混沌四神·基本概念"
        deadline: "ch2"
      - info: "超凡者等级概念"
        deadline: "ch4"
      - info: "神性火花·是什么"
        deadline: "ch10"
  first_volume_gate:
    applicable: true
    ch01_core_hook_present: true    # 死胡同·绝境钩子
    ch01_selling_point: true         # 混沌屠城+种子发光双亮相
    ch02_first_conflict: true        # CH2首杀！首次战斗
    pure_setup_max: 1                # 符合：CH1纯铺垫→CH2开打
