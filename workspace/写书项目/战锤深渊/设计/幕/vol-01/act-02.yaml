      设线负载: 1
      主线1: "博德之门表面上一切正常——但渡鸦指出已有2/5的议员被至上真神/混沌渗透"
      主线1_payoff: "小"
      主线2: "江轩第一次身处文明社会——必须学习隐藏身份、控制施法冲动"
      主线2_payoff: "小"
      主线3: "在竖琴手安全屋安顿→了解博德之门的情报网络"
      主线3_payoff: "空"
      支线1: "至上真神在码头区公开布道——'拥抱变化，迎接新神'"
      支线1_payoff: "小"
      note: "城市设定章——给读者展示'费伦文明还在运转但已经被蛀空'"
    登场角色: ["江轩", "卡珊德拉", "渡鸦"]
    emotional_goal: "进入文明的短暂放松→意识到文明本身也在腐烂→不安"
    payoff_note: "博德之门势力格局展开(小)"
