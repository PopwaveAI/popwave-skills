rhythm_check:
  plotlines: [主线1, 主线2, 主线3, 设定线, 支线1]
  per_line_gaps:
    - line: "主线1"
      max_gap: 3
      actual_gap: 1
    - line: "主线2"
      max_gap: 2
      actual_gap: 0
    - line: "主线3"
      max_gap: 2
      actual_gap: 0
    - line: "设定线"
      max_gap: 2
      actual_gap: 0
  line_density:
    min: 1
    max: 3
    actual_range: "2-3"
  payoff_constraints:
    mid_every_chapter: true
    no_line_dormant_over_3: true
    big_max_gap: 5
    ultimate_min_per_volume: 1
  设线穿透:
    max_consecutive_zero_负载: 2
    consecutive_zero: 1
    负载过载章: []
    per_info_deadlines:
      - info: "神性火花·接触体验"
        deadline: "ch20"
