# act-02.yaml — 幕2「逆流」CH11-20
# 卷1: 混沌潮 · 幕2
# 剧情线源: 设计/卷/volume-01.md §四

_meta:
  version: "v6.3"
  volume_ref: "设计/卷/volume-01.md"
  act_number: 2
  chapter_range: [ch11, ch20]

act:
  purpose:
    for_book: "卷1的中段蓄力——从'逃出来了'到'知道要去哪、但路不好走'。三条主线同时加速"
    for_reader: "读者应该感受到世界在变得更危险的同时，江轩在变强——但每强一分，代价就多一分"

  conflict:
    stakes: "如果在博德之门暴露身份，竖琴手的据点就会被血斧教团一锅端。江轩将失去唯一的盟军"
    escalation: "CH11-13 博德之门的暗流 → CH14-16 灰色交易与两支追兵 → CH17-18 关系转折 → CH19-20 锁定向遗迹进发"

