# combat_capability.yaml
# 战斗数值体系——从战斗章中提取
# 格式: 职业、等级范围、HP范围、属性范围、典型战斗力、chXX出处

meta:
  title: "深渊主宰第一卷·战斗数值体系"
  description: "基于全部38个设计包战斗数据聚合"
  game_system: "D&D 3.5e / Pathfinder混合体系"

# ============================================
# 一、属性标准化数值
# ============================================
attributes:
  standard_human:
    base: 10
    description: "人类标准属性10点"

  thresholds:
    superhuman_20: "20点=超凡门槛，获得特殊能力"
    legendary_25: "25点=传奇门槛，觉醒领域能力"
    godlike_30plus: "30点以上=半神/神灵领域"

  attribute_scale:
    strength:
      12: "索伦初始力量(ch002)"
      14: "索伦戴食人魔护腕(ch018)"
      18: "食人魔天生超凡力量(ch065)"
      20: "食人魔进阶巅峰/蛇魔力量(ch015)"
      24: "双头食人魔牧师戈洛尔(龙力术加成)(ch083)"
      30: "魅魔女王美坎修特(ch175)"
      42: "上古红龙(ch044)"
    agility:
      19: "索伦初始敏捷(ch002)"
      20: "索伦超凡敏捷(ch006)"
      24: "索伦高等轻灵术后(ch104)"
      25: "阿拉丁轻灵术上限(ch104)"
      36: "魅魔女王美坎修特(ch175)"
    constitution:
      15: "索伦初始体质(ch002)"
      18: "索伦苦行者卡后(ch014)"
      19: "索伦2级盗贼(ch016)"
      20: "索伦超凡体质(ch051)"
      25: "巨魔体质标准(ch076)"
      35: "上古红龙(ch044)"
      40: "魅魔女王美坎修特(ch175)"
    intelligence:
      18: "索伦初始智力(ch002)"
      19: "索伦巫师2级(ch068)"
      20: "索伦超凡智力(ch068)"
      21: "双头食人魔戈洛尔(ch083)"
      24: "上古红龙(ch044)"
      25: "奥术师脱离法术书的门槛(ch056)"
      30: "魅魔女王美坎修特(ch175)"
    perception:
      15: "索伦初始感知(ch002)"
      18: "薇薇安天生感知(ch028)"
      24: "上古红龙(ch044)"
      30: "魅魔女王美坎修特(ch175)"
    charisma:
      16: "索伦初始魅力(ch002)"
      18: "索伦水精斗篷后(ch169)"
      20: "树精/水精/魅魔/欲魔天生(ch169)"
      21: "薇薇安天生魅力(ch028)"
      24: "上古红龙(ch044)"
      49: "魅魔女王美坎修特(魅魔女王极致)(ch175)"

# ============================================
# 二、职业等级体系
# ============================================
classes:
  # --- 基础职业 ---
  rogue:
    name: "游荡者/盗贼"
    base_hp_die: 6
    skill_points_per_level: "20+(智力-10)×0.5"
    tiers:
      - level: "1-3"
        tier: 一阶
        description: "基础盗贼能力，3级获阴影掌握"
        example: "索伦1-3级盗贼(ch002-010)"
      - level: "4-5"
        tier: 二阶
        description: "获阴影袭杀，可离城冒险"
        example: "索伦5级盗贼(ch017)"
      - level: "6-7"
        tier: 二阶后期
        description: "超凡体质，超凡敏捷"
        example: "索伦7级盗贼(ch116)"
      - level: "8-14"
        tier: 三阶
        description: "进阶职业前置达成"
      - level: "15+"
        tier: 传奇
        description: "阴影行者等传奇进阶"

  wizard:
    name: "巫师"
    base_hp_die: 4
    skill_points_per_level: "20+(智力-10)×0.5"
    tiers:
      - level: "1-4"
        tier: 一阶
        description: "学习0-1环法术"
        example: "索伦4级巫师(ch068)"
      - level: "5-9"
        tier: 二阶
        description: "可记忆三环法术，获法术反制"
        example: "索伦5级巫师(ch084)"
      - level: "10-14"
        tier: 三阶
        description: "可记忆五六环法术"
      - level: "15+"
        tier: 传奇
        description: "时间停止等传奇法术"

  sorcerer:
    name: "术士"
    base_hp_die: 4
    casting_ability: "魅力"
    tiers:
      - level: "1"
        tier: 觉醒
        description: "8岁觉醒魅力21+施法天才，强度堪比5级巫师"
        example: "薇薇安1级术士(ch047)"
      - level: "3"
        tier: 一阶
        description: "双职业薇薇安3术士/2巫师(ch103)"
        example: "薇薇安3术士/2巫师"

  fighter:
    name: "战士"
    base_hp_die: 10
    tiers:
      - level: "1-5"
        tier: 一阶
        description: "基础战斗训练"
      - level: "5-10"
        tier: 二阶
        description: "获提气斩(ch065)，军官级"
        example: "民兵队长二阶战士"
      - level: "10+"
        tier: 三阶
        description: "精锐战士"
      - level: "15+"
        tier: 传奇
        description: "传奇坚韧/传奇强壮"

  paladin:
    name: "圣武士"
    base_hp_die: 10
    tiers:
      - level: "15+"
        tier: 传奇
        description: "白银之手级别"
        example: "白银之手(ch177-185)"

  # --- 进阶职业 ---
  shadow_warrior:
    name: "影武者"
    base_hp_die: 8
    prerequisite: "反射闪避+灵活移动，潜行100+，躲避50+"
    core_ability: "【躲避视线】职业天赋，可在敌人目光中凭空消失"
    example: "索伦2级影武者(ch116)"

  sword_saint:
    name: "剑圣"
    base_hp_die: 8
    prerequisite: "三阶以上战士"
    feature: "放弃铠甲，追求极致攻击。传奇剑圣可洞察弱点破偏斜力场"
    weakness: "极脆弱——被命中一下几乎当场毙命"
    example: "白马城战场三五个剑圣全部战死(ch082)"

  storm_lord:
    name: "风暴领主"
    base_hp_die: 12
    prerequisite: "风暴之神信徒的战士/德鲁伊/野蛮人"
    feature: "战矛附着雷电，静电领域【传奇力场】30米范围"
    example: "白马城女统帅(ch080)"

  dragon_blooded_sorcerer:
    name: "龙脉术士"
    base_hp_die: 10
    feature: "10级约12点额外属性，500+年寿命"
    exp_penalty: "杀戮经验为其他进阶3倍"
    example: "规划路线(ch110)"

  assassin:
    name: "刺客"
    prerequisite: "200+炼金术，满级毒药学"
    feature: "暗杀专精"

  stalker:
    name: "潜行者"
    feature: "【遁入阴影】临时进入阴影位面"

# ============================================
# 三、生命值体系
# ============================================
hit_points:
  formulas:
    per_level: "基础生命数 + (体质-10)×0.5"
    example: "索伦盗贼7级：6 + (20-10)×0.5 = 11点/级总77点；影武者2级：8+5=13点/级总26点"
    total_example: "索伦游荡者部分：7×11+2×13=103，+巫师5×9=45，总约148(ch122)"

  tier_ranges:
    - tier: "普通平民"
      hp: "5-15"
      example: "普通人类"
    - tier: "一阶(1-5级)"
      hp: "20-60"
      example: "索伦早期~60(ch016)"
    - tier: "二阶(5-10级)"
      hp: "60-150"
      example: "索伦HP136(ch122)"
    - tier: "三阶(10-15级)"
      hp: "150-300"
      example: "土元素HP~300(ch104)"
    - tier: "高阶/准传奇"
      hp: "300-500"
      example: "冰霜翼龙HP300+(ch147)"
    - tier: "传奇领域"
      hp: "500-1500"
      example: "双头食人魔戈洛尔(ch083)"
    - tier: "魔神级"
      hp: "800+"
      example: "魅魔女王HP800+(ch175)"

  special:
    - name: "超凡体质20→再生初级"
      effect: "每小时+1HP自愈(ch051)"
    - name: "再生中级"
      effect: "每小时+2HP，重伤可自愈(ch128)"
    - name: "巨魔体质25+"
      effect: "砍头也能重生(ch076)"
    - name: "吸血鬼之触"
      effect: "吸收30+HP治疗自身(ch139)"

