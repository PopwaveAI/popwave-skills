  skill_acquisition:
    methods:
      - "系统奖励/初始自带：吟游表演（前身童星）、他乡故知（首次交易奖励）"
      - "搜刮尸体：战术匕首专精（老约翰）、化合物制作（小哥布林乔伊）"
      - "触碰尸体拾取：全科医生中级、家具修理专精等（需24小时内+横死惨死+大脑完整）"
      - "系统商店购买：圣光/血瓶/坚毅之铠等（需金币，前74章未购买）"
    evidence: "ch038§2（拾取条件），ch012§17, ch017§12"

