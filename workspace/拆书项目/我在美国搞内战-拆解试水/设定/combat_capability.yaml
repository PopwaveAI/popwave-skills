    - "大豆种植（中级）+ 小提琴演奏（中级）-> 吟游表演（高级20%）【ch026】"
    - "酷儿变装（中级）+ 国际象棋（初级）+ 墨西哥玉米饼（初级）-> 化合物制作（高级）【ch070】"
    - "大模型基础构架（专精）+ 草坪修剪（初级）+ 自行车驾驶（初级）-> 手枪使用（专精20%）【ch038】"

