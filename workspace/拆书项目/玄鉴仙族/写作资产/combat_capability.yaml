# ============================================================
# 二、角色战力表（含战斗记录）
# ============================================================
角色战力:
  - 角色: 李通崖
    最高修为: 练气六层
    箓气: 重海长鲸箓
    功法: 玄水剑诀、江河一气诀
    战斗记录:
      - 事件: 夜袭阿会剌
        章: ch080
        修为一: 练气二层
        对手: 阿会剌（胎息巅峰）
        结果: 一剑震脱武器—碾压
      - 事件: 单骑闯寨一压三
        章: ch095
        修为一: 练气二层
        对手: 木焦蛮（练气四层）+两练气二层
        结果: 正面压制，持久战不利
      - 事件: 截杀乌家女修
        章: ch115
        修为一: 练气五层
        对手: 乌姓女修（练气六层正法）
        结果: 斩杀（断臂枭首）
      - 事件: 猎练气雄鹿
        章: ch140
        修为一: 练气六层
        对手: 练气雄鹿
        结果: 击杀，祭箓
    战力评估: "练气六层中上游，可杀普通练气六层"
    战术风格: 谨慎蒙面不留活口

  - 角色: 李项平
    最高修为: 胎息玄景轮-练气边缘
    箓气: 避死延生箓
    战斗记录:
      - 事件: 反杀老道
        章: ch071-ch075
        修为一: 胎息
        对手: 老道（练气中期）
        结果: 三次诈术+太阴玄光→反杀
      - 事件: 咒术陨落
        章: ch100
        修为一: 不详
        对手: 木焦蛮咒术
        结果: 陨落
    战力评估: "胎息可越级杀练气中期（依赖法鉴）"

  - 角色: 李尺泾
    最高修为: 练气顶峰
    特殊: 月阙剑意
    战斗记录:
      - 事件: 剑意击穿迟灸云防御
        章: ch119-ch120
        修为一: 练气顶峰
        对手: 迟灸云（筑基级）
        结果: 击穿防御但留手，后被投入丹炉
    战力评估: "剑意全开≈可击穿筑基防御"

  - 角色: 伽泥奚
    最高修为: 筑基
    战斗记录:
      - 事件: 自碎大道之基
        章: ch105
        修为一: 筑基
        结果: 自爆而死，拒绝被献祭
    战力评估: "筑基级山越王者"

  - 角色: 郁萧贵
    最高修为: 筑基
    战斗记录:
      - 事件: 单手杀练气巅峰
        章: ch135
        修为一: 筑基
        对手: 老年散修（练气巅峰）
        结果: 单手隔空击碎头颅—碾压
    战力评估: "筑基级，前150章明面最高战力"

  - 角色: 木焦蛮
    最高修为: 练气四层
    特殊: 巫觋咒术
    战斗记录:
      - 事件: 围攻李通崖
        章: ch095
        修为一: 练气四层+两二层
        对手: 李通崖（练气二层）
        结果: 被正面压制+巫术被暗中控制
    战力评估: "山越练气四层≈人族练气三层"

  - 角色: 乌家女修
    最高修为: 练气六层正法
    战斗记录:
      - 事件: 被截杀
        章: ch115
        修为一: 练气六层
        对手: 李通崖（练气五层）
        结果: 火雀符箓五道→被斩杀
    战力评估: "有保命底牌，实战不如李通崖"

  - 角色: 元素真人
    最高修为: 紫府
    战斗记录:
      - 事件: 带李尺泾前往南疆
        章: ch120
        修为一: 紫府
        功能: 执行者，未完全展示战力
    战力评估: "紫府级"

  - 角色: 大蛟
    最高修为: 紫府级以上
    战斗记录:
      - 事件: 检查+投入丹炉
        章: ch120
        修为: 紫府级以上
    战力评估: "未知上限，非人存在"

  - 角色: 灵岩子
    最高修为: 练气六层
    特殊: 紫烟灵罩
    战斗记录:
      - 事件: 被长霄门追杀
        章: ch150
        修为一: 练气六层
        对手: 玉云子（练气七层）+ 另一练气六层
        结果: 撑三天后求救
    战力评估: "练气六层中上"

  - 角色: 玉云子
    最高修为: 练气七层
    战斗记录:
      - 事件: 追杀灵岩子
        章: ch150
        修为一: 练气七层
        对手: 灵岩子（练气六层）
        结果: 追杀成功→被设计诱入伏杀
    战力评估: "练气七层"

  - 角色: 阿会剌
    最高修为: 胎息巅峰
    战斗记录:
      - 事件: 被李通崖击败
        章: ch080
        修为一: 胎息巅峰
        对手: 李通崖（练气二层）
        结果: 被降服
    战力评估: "胎息巅峰≈人族胎息中上"

# ============================================================
# 三、关键战斗校准
# ============================================================
关键战斗校准:
  - 战斗: "李通崖练气五层 vs 乌家女修炼气六层正法"
    结果: "练气五层胜练气六层"
    校准: "箓气（重海长鲸）+正宗功法+经验≈弥补一层修为差距"
  - 战斗: "李通崖练气二层 vs 木焦蛮练气四层+两层"
    结果: "正面压制但持久战不利"
    校准: "正宗功法vs杂气≈二层优势；数量+修为差抵消"
  - 战斗: "木焦蛮咒术 vs 陆江仙暗中控制"
    结果: "咒术被法鉴权限压制"
    校准: "法鉴对箓气变体有绝对压制"
  - 战斗: "郁萧贵筑基 vs 老年散修炼气巅峰"
    结果: "单手秒杀"
    校准: "筑基vs练气巅峰=不可逆碾压"
  - 战斗: "伽泥奚 vs 紫府级存在"
    结果: "自毁对抗被献祭"
    校准: "筑基可被紫府当棋子"
  - 战斗: "李尺泾月阙剑意 vs 迟灸云"
    结果: "剑意击穿筑基防御"
    校准: "剑意≈最高级别越级手段"

# ============================================================
# 四、战斗能力分档（前150章内）
# ============================================================
战斗能力分档:
  T0: [大蛟, 中年紫府（无名）, 元素真人]
  T1: [郁萧贵, 伽泥奚（已死）, 老巫（筑基巅峰）, 萧初庭]
  T2: [李通崖（练气六层）, 李尺泾（已死，剑意加持）, 玉云子（练气七层）]
  T3: [木焦蛮（练气四层）, 乌家女修（已死）, 灵岩子（练气六层）]
  T4: [李玄锋（胎息五层）, 阿会剌（被俘）]
  T5: [李玄宣（胎息青元轮）, 李玄岭（胎息）]

# ============================================================
# 五、特殊能力评级
# ============================================================
特殊能力:
  太阴玄光:
    评级: S
    能力: 灭杀练气巅峰；可挡筑基一击（三天恢复）
    持有: 陆江仙（法鉴）
  月阙剑意:
    评级: S
    能力: 可击穿筑基防御
    持有: 李尺泾（已陨落）
  重海长鲸箓:
    评级: A
    能力: 真元恢复惊人，持续作战
    持有: 李通崖
  避死延生箓:
    评级: A
    能力: 预警致命危险；吞噬咒术（异变）
    持有: 李项平（已陨落/异变中）
  大衍天玄箓:
    评级: "至少金丹级"
    能力: 衍未来算玄机测前缘后续
    持有: 刘长迭→陆江仙取走
  青迟魔门玄光:
    评级: "紫府级"
    能力: 可阻住紫府之手
    持有: 青迟魔门（暗线）
  镜中造物:
    评级: A
    能力: 在镜中天地创造物体（月牙石小人）
    持有: 陆江仙（ch140觉醒）

