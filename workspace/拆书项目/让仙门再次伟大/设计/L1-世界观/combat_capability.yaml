# ============================================================================
# combat_capability.yaml
# 让魔门再次伟大 — 战力段位分级
# 基于前37章数据推断
# ============================================================================
# Scope: 让魔门再次伟大
# 基于前37章数据推断，后续章节可能补充或修订
# ============================================================================

metadata:
  universe: "让魔门再次伟大"
  based_on: "ch001-ch037"
  note: "所有段位均为基于原文证据的推断性分级，不代表全书终态。修仙侧段位大量为逻辑推断（前37章仙门战斗展示极少）。"

# ============================================================================
# 一、赤土武道段位
# ============================================================================
wu_dao:
  description: "赤土世界（大顺王朝）武道力量体系段位分级"
  reference: "ch002/ch009/ch025-ch028/ch031"
  
  tiers:
    - id: WD-0
      name: "凡人/黔首"
      rank_range: "0段"
      description: "没有任何武功修炼的普通平民，依靠体力劳动谋生。在力量体系中处于最底层，面对任何有武功者均无反抗能力。"
      examples:
        - "前村被屠的普通村民（ch004）"
        - "县城外食糙米沙砾的黔首（ch019）"
      evidence: "ch004陈皓彦屠村、ch019黔首生存状态"

    - id: WD-1
      name: "练武入门"
      rank_range: "1-3段"
      description: "刚刚开始接触武功修炼，已掌握基础呼吸搬运法或一门不入流武功（如铁牛功）。气血初步强化，可对抗2-3名普通壮汉。"
      examples:
        - "王平刚入白莲教时期（ch001前）"
        - "刘烨展示铁牛功圆满兵法『金枪不倒』（ch009）"
      evidence: "ch009刘烨展示铁牛功"

    - id: WD-2
      name: "外功单要素·小成"
      rank_range: "4-6段"
      description: "外功六要素之一（皮/肉/筋/骨/血/髓）修炼至小成以上。对应要素对应的身体部位获得显著强化。可轻松击败10名普通壮汉。"
      examples:
        - "谢石（白莲教底层骨干，ch013被王平一刀斩杀）"
      evidence: "ch013谢石vs王平战斗"

    - id: WD-3
      name: "外功多要素·大成"
      rank_range: "7-9段"
      description: "外功两至三项要素修炼至大成级别（如筋如龙+血如火）。具备跨层次战斗能力，装备（兵器等级）对战力影响显著。可同时对抗数十名普通军士。"
      examples:
        - "王平筋如龙圆满+血如至阳（ch012/ch015）"
        - "王平当街1v10（ch011）"
      evidence: "ch011当街战斗、ch012筋如龙圆满、ch015至阳血"

    - id: WD-4
      name: "外功圆满·内劲预备"
      rank_range: "10-15段"
      description: "外功六要素全部修炼至入品级别，完成七次质变（ch025）。肉身强度达到凡人极限。需要功体图才能突破至内劲层次。"
      examples:
        - "王平外功七次质变圆满（ch025）"
      evidence: "ch025『天鹏擒龙功体图』现世、外功圆满"

    - id: WD-5
      name: "内劲武师"
      rank_range: "16-25段"
      description: "修成功体图后开内劲，气血转化为内劲循环。内劲可外放隔空伤人，防御力和攻击力均大幅提升。内劲武师是县城级战力的中坚。"
      examples:
        - "王平一夜小周天开内劲（ch025-ch026）"
        - "寇豹（欲兽）≈内劲武师（ch034）"
      evidence: "ch025-ch026天鹏擒龙功、ch034『寇豹起码也是内劲武师级别』"

    - id: WD-6
      name: "封号武师"
      rank_range: "26-35段"
      description: "觉醒神意的内劲武师。神意是精神层面的领域技——意念压制可让对手『感觉身体被一座无形大山压住』（ch027），能将金翅大鹏鸟幻视化为监牢具象化。一人可镇压一县。"
      examples:
        - "徐秉正（神捕门，大鹏金翅鸟神意，ch027-ch028）"
      evidence: "ch027-ch028徐秉正实战、神意体系揭示"

    - id: WD-7
      name: "见神宗师"
      rank_range: "36-45段"
      description: "封号武师之上的境界。前37章无实战实例。理论上战力远超封号武师，可能具备更强神意或领域能力。须通过修炼更高深的功体图突破。"
      examples:
        - "【前37章未出现实战实例】"
      evidence: "ch027-ch028从封号武师→宗师的理论层级"

    - id: WD-8
      name: "武神"
      rank_range: "46-60段"
      description: "武道史上的传说级存在。第一位武神创造了神意体系（ch028），从此武道修炼才有『封号→神意』这一境界。实际战力规模不可考。"
      examples:
        - "【前37章未出现实战实例，仅传说提及】"
      evidence: "ch028『一位武神级的存在……创造出了【神意】体系』"

  # 特殊战力放大
  multipliers:
    - name: "百人捕快军阵"
      rank_range: "≈30-35段"
      description: "百人规模的气血共鸣军阵，可爆发封号武师级战力。但每轮冲击有减员代价，且需要训练有素。"
      evidence: "ch031百人捕快军阵≈封号武师级战力"
    
    - name: "天魔解体大法"
      rank_range: "自爆后≈临时提升10-15段"
      description: "自废武功换数倍内劲，苏家压箱底禁术。使用后面临功体尽废的风险。"
      evidence: "ch030-ch031天魔解体大法"

    - name: "穿云震天弓大成"
      rank_range: "破防能力≈WD-5级以上"
      description: "大成状态可破开内劲武师级的防御，远程威慑力极强。"
      evidence: "ch013+穿云震天弓破防设定"

# ============================================================================
# 二、仙门修仙段位
# ============================================================================
xian_men:
  description: "仙门世界修仙力量体系段位分级"
  reference: "ch033-ch037"
  note: "前37章仅5章仙门叙事，修仙高阶实战展示极少。大量段位为原文框架+逻辑推断。"
  
  tiers:
    - id: XM-0
      name: "凡人/无灵根者"
      rank_range: "0-1段"
      description: "无任何灵根资质，在仙门世界被当作人牲、力士材料或消耗品。肉身强度对等于赤土世界的普通凡人。"
      examples:
        - "仙门外门力士（ch005-ch007）"
        - "人牲/死人税提供者（ch033）"
      evidence: "ch005力士制度、ch033人牲/死人税"

    - id: XM-1
      name: "废灵根修士（六欲天大成）"
      rank_range: "5-12段"
      description: "通过六欲天自在成就法炼成废灵根的入门修士。可使用六欲神异（飞天/万钧/卸甲/吐纳/神足/蛟钺），但无法炼炁，上限有限。肉身得到欲兽增强。"
      examples:
        - "王平废灵根大成+四头欲兽（ch034-ch036）"
      evidence: "ch034废灵根大成、六大神异解锁"

    - id: XM-2
      name: "人劫期修士"
      rank_range: "13-30段"
      description: "渡劫三境第一境。四大特质：通灵识念（精神感知）、无漏真身（肉身无漏）、周天吐纳（灵气循环）、借炁显法（术法施展）。修仙正途的起步阶段。"
      examples:
        - "【前37章未出现明确的人劫期修士实战】"
      evidence: "ch034人劫期四大特质描述"

    - id: XM-3
      name: "天劫期修士"
      rank_range: "31-60段"
      description: "渡劫三境第二境。能力远超凡人想象，拥有更强的术法和渡劫经验。前37章未展示天劫期的具体战力表现。"
      examples:
        - "【前37章未出现实战实例】"
      evidence: "ch034渡劫三境框架"

    - id: XM-4
      name: "命劫期修士"
      rank_range: "61-100段"
      description: "渡劫三境最高境。渡尽三劫才能炼炁，命劫期大约是仙门中的中流砥柱级别。"
      examples:
        - "【前37章未出现实战实例】"
      evidence: "ch034渡劫三境框架"

    - id: XM-5
      name: "炼炁士"
      rank_range: "101-200段"
      description: "渡尽三劫后成功炼化天地灵炁的修士。战力与渡劫期有本质飞跃，具备真正的修仙神通。"
      examples:
        - "【前37章未出现实战实例】"
      evidence: "ch034『渡劫，炼炁，修真而登仙』法旨"

    - id: XM-6
      name: "修真者"
      rank_range: "201-500段"
      description: "炼炁之上，修真阶段。天尊法旨中『登仙』前的最后一阶。具体能力规模无法推断。"
      examples:
        - "【前37章未出现实战实例】"
      evidence: "ch034九字真言"

    - id: XM-7
      name: "登仙（真仙）"
      rank_range: "500+段"
      description: "仙道修行的终极目标。天尊法旨的最高指向。前37章未出现任何登仙层次的存在或战力表现。"
      examples:
        - "【前37章未出现实战实例】"
      evidence: "ch034『修真而登仙』"

  # 特殊战力
  special:
    - name: "力士（仙门傀儡/奴仆）"
      rank_range: "≈8-15段（≈WD-5~WD-6）"
      description: "仙门炼制的最低级人形傀儡。放到大顺可『轻轻松松打遍天下无敌手』，≈封号武师以下。"
      evidence: "ch007『力士放到大顺可轻轻松松打遍天下无敌手』"
    
    - name: "寇豹/欲兽（仙门妖兽）"
      rank_range: "≈16-25段（≈WD-5内劲武师）"
      description: "仙门豢养的妖兽/战斗兽。一头寇豹相当于内劲武师级战力。是仙门vs赤土的最重要的跨体系战力标尺。"
      evidence: "ch034『寇豹起码也是内劲武师级别』"

    - name: "六欲天魔旗（上品法器，器灵状态）"
      rank_range: "≈20-40段（潜在成长型）"
      description: "上品法器（ch036）。六欲天魔旗可炼化天魔，王平成为器灵后成长为『六欲天魔王』（ch037）。器灵修仙路径理论上不受灵根限制，可持续升级。"
      evidence: "ch036-ch037六欲天魔旗+器灵觉醒"

# ============================================================================
# 三、跨体系战力对比表
# ============================================================================
cross_system_comparison:
  description: "两大体系在同一战力标尺下的段位对照"
  reference: "ch007/ch034"
  
  mappings:
    - wu_dao: "凡人/黔首（WD-0）"
      xian_men: "凡人/无灵根者（XM-0）"
      note: "两大世界的普通人≈同级"
    
    - wu_dao: "练武入门~外功小成（WD-1~WD-2）"
      xian_men: "废灵根修士（XM-1）"
      note: "废灵根大成≈武道中层，略低于内劲武师"

    - wu_dao: "内劲武师（WD-5）"
      xian_men: "寇豹/欲兽（≈XM-2底层）"
      note: "ch034明确对标：寇豹≈内劲武师。此为跨体系唯一直接战力标尺"

    - wu_dao: "封号武师（WD-6）"
      xian_men: "人劫初期（≈XM-2）"
      note: "逻辑推断：力士≈赤土无敌（ch007），力士<人劫修士，因此封号武师≈人劫底层"

    - wu_dao: "见神宗师（WD-7）"
      xian_men: "人劫中期~天劫初期（XM-2~XM-3）"
      note: "逻辑推断：武道巅峰≈渡劫中低层"

    - wu_dao: "武神（WD-8·传说）"
      xian_men: "天劫期~命劫期（XM-3~XM-4）"
      note: "逻辑推断：武神传说级可能对标渡劫高层"

    - wu_dao: "【武道体系上限】"
      xian_men: "炼炁士及以上（XM-5+）"
      note: "ch034暗示：炼炁士以上的修仙者对标赤土世界即为降维打击"

# ============================================================================
# 四、前37章主角战力演进（时间线）
# ============================================================================
protagonist_progression:
  description: "王平在前37章的核心战力变化轨迹"
  
  milestones:
    - chapter: "ch001（起点）"
      rank: "WD-1 ≈ 1-2段"
      state: "无功法凡人，白莲教底层卧底，仅靠基本武艺和智力谋生"
    
    - chapter: "ch009-ch012"
      rank: "WD-2~WD-3 ≈ 4-8段"
      state: "铁牛功入门→大成；阎罗三魔刀圆满→筋如龙（真龙筋）"
      key_event: "ch012灵识觉醒"
    
    - chapter: "ch015"
      rank: "WD-3 ≈ 7-9段"
      state: "血如火（至阳血）+玄螭弓+灵识抄全本武功"
      key_event: "丹凤楼百人斩，获名『大龙枪』"
    
    - chapter: "ch018"
      rank: "WD-3~WD-4 ≈ 8-11段"
      state: "截胡素月莲华刀（名珍级兵器），战力因兵器提升"
      key_event: "截胡夺宝+莲华刀进化『斩月莲华』"
    
    - chapter: "ch021"
      rank: "WD-3~WD-4 ≈ 9-12段"
      state: "骨如虎（山君骨），外功四要素大成"
    
    - chapter: "ch025-ch026"
      rank: "WD-4~WD-5 ≈ 10-18段"
      state: "外功七次质变圆满→天鹏擒龙功体图→一夜小周天开内劲"
      key_event: "正式晋升内劲武师"
    
    - chapter: "ch027-ch028"
      rank: "WD-5 ≈ 16-22段"
      state: "首战封号武师徐秉正，灵识破神意+与日偕亡+一念花开合击"
      key_event: "以弱战强，未胜但未死"
    
    - chapter: "ch030-ch031"
      rank: "WD-5+天魔解体→临时WD-6级 ≈ 25-30段"
      state: "穿云震天弓大成+天魔解体自爆，单骑破军"
      key_event: "自毁功体换数倍内劲，孤胆赴死"
    
    - chapter: "ch034-ch036"
      rank: "XM-1（废灵根修士）≈ 5-10段（按修仙体系）"
      state: "废灵根大成+四头欲兽+六欲神异（飞天/万钧/卸甲/吐纳/神足/蛟钺）"
      key_event: "六欲天自在成就法修成废灵根"
    
    - chapter: "ch037（当前）"
      rank: "XM-1（六欲天魔王·器灵）≈ 10-20段（潜在成长型）"
      state: "肉身毁灭→六欲天魔旗器灵觉醒→五贼盗天功法真意持有者→蛰伏反噬"
      key_event: "器灵修仙路径（不受灵根限制），理论成长空间极大"
